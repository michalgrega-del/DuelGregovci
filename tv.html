@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

@keyframes category-pop{0%{opacity:0;transform:scale(.7) translateY(20px) rotateX(15deg)}60%{opacity:1;transform:scale(1.04) translateY(-3px)}100%{opacity:1;transform:scale(1) translateY(0)}}

@keyframes cat-shine{0%{left:-100%;opacity:0}50%{opacity:.3}100%{left:200%;opacity:0}}
@keyframes super-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
.anim-slide{animation:slide-up .6s ease-out}
.anim-pop{animation:scale-pop .5s ease-out}
.anim-score{animation:score-flash .5s ease-out}
.anim-pulse{animation:timer-pulse 1s ease-in-out infinite}
.anim-float{animation:float 3s ease-in-out infinite}
.anim-glow{animation:glow-pulse 2s ease-in-out infinite}
.anim-super{animation:super-pulse 1s ease-in-out infinite}
.confetti{position:fixed;width:12px;height:12px;border-radius:3px;animation:confetti-fall linear forwards;z-index:100}
.timer-ring{transition:stroke-dashoffset .95s linear}
.timeline-bar{transition:width .95s linear}

.standard-bg{background:linear-gradient(180deg,#0a0a1a,#0f172a,#0a0a1a)}
.cat-card{animation:category-pop .5s ease-out both;position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s}
.cat-card::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:cat-shine 3s ease-in-out infinite;animation-delay:inherit}

/* ═══════════════ QR CODE GENERATOR (lightweight) ═══════════════ */
function generateQRSvg(text,size){
    /* Use the qrcode.js API via a simple URL-encoded SVG approach
       We generate a QR code as an <img> pointing to a public QR API.
       Fallback: return an SVG placeholder with the URL text. */
    const url=`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&format=svg`;
    return `<img src="${url}" width="${size}" height="${size}" alt="QR" style="display:block"/>`;
}

/* ═══════════════ TV APP ═══════════════ */
function TVApp(){
const[data,setData]=useState(null);
const[waiting,setWaiting]=useState(true);
const[source,setSource]=useState('…');

useEffect(()=>{
    /* 1) Local same-device sync via BroadcastChannel */
    const ch=new BroadcastChannel('duel-game');
    ch.onmessage=e=>{
        const{type,data:d}=e.data;
        if(type==='WAITING'){setWaiting(true);setData(null);setSource('local')}
        else if(type==='UPDATE'){setWaiting(false);setData(d);setSource('local');if(d.theme)applyTheme(d.theme)}
    };

    /* 2) Cloud cross-device sync via Firestore */
    const unsub=db.collection('quiz_data').doc('game_state').onSnapshot(snap=>{
        if(!snap.exists)return;
        const msg=snap.data();
        if(!msg||!msg.type)return;
        console.log('[TV Cloud] Received:',msg.type);
        if(msg.type==='WAITING'){setWaiting(true);setData(null);setSource('cloud')}
        else if(msg.type==='UPDATE'&&msg.data){setWaiting(false);setData(msg.data);setSource('cloud');if(msg.data.theme)applyTheme(msg.data.theme)}
    },e=>console.warn('[TV Cloud] Listen error:',e));

    return()=>{ch.close();unsub();};
},[]);

const handleClick=()=>goFullscreen();

let content;
if(waiting||!data) content=<WaitingScreen source={source}/>;
else{
    const d=data;
    if(d.showRoundSummary) content=<RoundSummaryScreen d={d}/>;
    else if(d.over) content=<ResultsScreen d={d}/>;
    else if(d.round==='tiebreaker'&&(d.tbQ||d.tbWinner)) content=<TiebreakerScreen d={d}/>;
    else if((d.round===2||d.round===3)&&!d.selCat&&d.categories) content=<CategoryGridScreen d={d}/>;
    else content=<GameScreen d={d}/>;
}

return(
<div onClick={handleClick} className="w-full h-full">
    {content}
    {data&&data.feedback&&<FeedbackOverlay type={data.feedback} answer={data.answer}/>}
</div>
);
}

<p style={{color:'#94a3b8',marginBottom:'32px',fontSize:'14px'}}>Prihlás sa pre prístup</p>
{err&&<div style={{background:'#ef444420',border:'1px solid #ef4444',borderRadius:'12px',padding:'10px',color:'#ef4444',fontWeight:600,marginBottom:'16px'}}>{err}</div>}
<input value={user} onChange={e=>setUser(e.target.value)} placeholder="Meno" autoComplete="username" style={{width:'100%',padding:'14px 18px',borderRadius:'12px',border:'2px solid #475569',background:'#334155',color:'#fff',fontSize:'16px',marginBottom:'12px',outline:'none',boxSizing:'border-box'}} autoFocus/>
<div style={{position:'relative',marginBottom:'24px'}}>
<input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Heslo" type={show?'text':'password'} autoComplete="current-password" style={{width:'100%',padding:'14px 18px',paddingRight:'50px',borderRadius:'12px',border:'2px solid #475569',background:'#334155',color:'#fff',fontSize:'16px',outline:'none',boxSizing:'border-box'}}/>
<span onClick={()=>setShow(!show)} style={{position:'absolute',right:'14px',top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:'20px',userSelect:'none'}}>{show?'🙈':'👁️'}</span>
</div>
<button type="submit" style={{width:'100%',padding:'14px',borderRadius:'12px',background:'linear-gradient(135deg,#eab308,#f59e0b)',color:'#0f172a',fontSize:'18px',fontWeight:800,border:'none',cursor:'pointer',transition:'transform .2s',boxSizing:'border-box'}} onMouseOver={e=>e.target.style.transform='translateY(-2px)'} onMouseOut={e=>e.target.style.transform='none'}>Prihlásiť sa</button>
</form>
</div>
);}

/* ═══════════════ ROOT WITH AUTH GATE ═══════════════ */
function TVRoot(){
const[auth,setAuth]=useState(()=>sessionStorage.getItem('quiz_auth')==='1');
if(!auth)return <LoginScreen onLogin={()=>setAuth(true)}/>;
return <TVApp/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<TVRoot/>);
</script>
<script>
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!refreshing){refreshing=true;window.location.reload()}
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      console.log('[PWA] SW registered');
      setInterval(()=>reg.update(),60000);
    }).catch(err=>console.warn('[PWA] SW failed:',err));
  });
}
</script>
