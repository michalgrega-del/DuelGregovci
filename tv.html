<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUEL – TV v2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',system-ui,sans-serif;margin:0;overflow:hidden;cursor:none}
        html,body,#root{height:100%}

        @keyframes pulse-glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
        @keyframes slide-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scale-pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
        @keyframes score-flash{0%{transform:scale(1)}25%{transform:scale(1.25)}100%{transform:scale(1)}}
        @keyframes timer-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        @keyframes confetti-fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.3}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

        .anim-slide{animation:slide-up .5s ease-out}
        .anim-pop{animation:scale-pop .4s ease-out}
        .anim-score{animation:score-flash .5s ease-out}
        .anim-timer-pulse{animation:timer-pulse 1s ease-in-out infinite}
        .anim-float{animation:float 3s ease-in-out infinite}
        .timer-ring{transition:stroke-dashoffset .95s linear}
        .timeline-bar{transition:width .95s linear}
        .confetti{position:fixed;width:10px;height:10px;border-radius:2px;animation:confetti-fall linear forwards}

        .junior-bg{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
        .standard-bg{background:linear-gradient(180deg,#0a0a1a 0%,#0f172a 30%,#0a0a1a 100%)}
    </style>
    <script>
        tailwind.config={theme:{extend:{colors:{
            bg:'#0f172a',card:'#1e293b',card2:'#334155',
            accent:'#eab308',p1:'#3b82f6',p2:'#ef4444',ok:'#22c55e',err:'#ef4444',
        }}}}
    </script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

/* ─── BroadcastChannel ─── */
const ch=new BroadcastChannel('duel-game');

/* ─── Fullscreen ─── */
function goFullscreen(){
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
}

/* ─── Confetti ─── */
function spawnConfetti(){
    const colors=['#eab308','#3b82f6','#ef4444','#22c55e','#a855f7','#f97316'];
    for(let i=0;i<80;i++){
        const d=document.createElement('div');
        d.className='confetti';
        d.style.left=Math.random()*100+'vw';
        d.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
        d.style.animationDuration=(2+Math.random()*3)+'s';
        d.style.animationDelay=(Math.random()*2)+'s';
        d.style.width=(6+Math.random()*8)+'px';
        d.style.height=(6+Math.random()*8)+'px';
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),6000);
    }
}

/* ═══════════════ TV APP ═══════════════ */
function TVApp(){
    const[data,setData]=useState(null);
    const[waiting,setWaiting]=useState(true);
    const prevScoreRef=useRef({s1:0,s2:0});
    const[scoreAnim,setScoreAnim]=useState({s1:false,s2:false});

    useEffect(()=>{
        ch.onmessage=(e)=>{
            const{type,data:d}=e.data;
            if(type==='WAITING'){setWaiting(true);setData(null);return}
            if(type==='UPDATE'){
                setWaiting(false);
                setData(prev=>{
                    /* score animations */
                    if(prev){
                        if(d.s1!==prev.s1)setScoreAnim(a=>({...a,s1:true}));
                        if(d.s2!==prev.s2)setScoreAnim(a=>({...a,s2:true}));
                    }
                    return d;
                });
                if(d.over)spawnConfetti();
            }
        };
        document.addEventListener('click',goFullscreen,{once:true});
        document.addEventListener('keydown',e=>{if(e.key==='f'||e.key==='F')goFullscreen()},{once:true});
    },[]);

    /* clear score anim */
    useEffect(()=>{
        if(scoreAnim.s1||scoreAnim.s2){
            const t=setTimeout(()=>setScoreAnim({s1:false,s2:false}),500);
            return()=>clearTimeout(t);
        }
    },[scoreAnim]);

    if(waiting||!data) return <WaitingScreen/>;
    if(data.over) return <ResultsScreen d={data}/>;
    return <GameScreen d={data} scoreAnim={scoreAnim}/>;
}

/* ─── WAITING ─── */
function WaitingScreen(){
    return(
        <div className="junior-bg h-full flex flex-col items-center justify-center">
            <div className="anim-float">
                <h1 className="text-8xl font-black text-accent tracking-tight mb-4"
                    style={{textShadow:'0 0 60px rgba(234,179,8,.4)'}}>DUEL</h1>
            </div>
            <p className="text-slate-500 text-xl">Čakám na hru…</p>
            <p className="text-slate-700 text-sm mt-6">Klikni pre celú obrazovku</p>
        </div>
    );
}

/* ─── RESULTS ─── */
function ResultsScreen({d}){
    const wn=d.winner===1?d.p1?.name:d.p2?.name;
    const wc=d.winner===1?'text-blue-400':'text-red-400';
    const isJunior=d.diff==='junior';
    return(
        <div className={`h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'}`}>
            <div className="anim-pop text-center">
                <div className="text-8xl mb-6">🏆</div>
                <h2 className="text-2xl text-slate-400 font-semibold mb-2">Víťaz</h2>
                <h1 className={`text-7xl font-black ${wc} mb-8`} style={{textShadow:`0 0 40px ${d.winner===1?'rgba(59,130,246,.4)':'rgba(239,68,68,.4)'}`}}>{wn}</h1>
                <div className="flex items-center justify-center gap-12">
                    <div className="text-center">
                        <div className={`text-lg mb-2 ${d.winner===1?'text-accent':'text-slate-500'}`}>{d.p1?.name}</div>
                        <div className={`text-7xl font-black ${d.winner===1?'text-blue-400':'text-slate-600'}`}>{d.s1}</div>
                    </div>
                    <div className="text-4xl text-slate-700 font-bold">:</div>
                    <div className="text-center">
                        <div className={`text-lg mb-2 ${d.winner===2?'text-accent':'text-slate-500'}`}>{d.p2?.name}</div>
                        <div className={`text-7xl font-black ${d.winner===2?'text-red-400':'text-slate-600'}`}>{d.s2}</div>
                    </div>
                </div>
            </div>
        </div>
    );
}

/* ─── GAME ─── */
function GameScreen({d,scoreAnim}){
    const isJunior=d.diff==='junior';
    const isR1=d.round===1;
    const tSec=d.tSec||0;
    const tDur=d.tDur||10;

    /* timer */
    const timerFrac=tDur>0?tSec/tDur:1;
    const circ=2*Math.PI*54;
    const dashOff=circ*(1-timerFrac);
    const tCol=tSec<=3?'#ef4444':tSec<=6?'#eab308':'#22c55e';

    /* Player Card */
    const PlayerCard=({name,score,num,isActive,hasAnim})=>{
        const bc=num===1?'border-blue-500':'border-red-500';
        const bg=num===1?'from-blue-950/80 to-blue-950/20':'from-red-950/80 to-red-950/20';
        return(
            <div className={`w-52 rounded-2xl border-2 p-5 transition-all duration-500 ${
                isActive?`${bc} bg-gradient-to-b ${bg} shadow-2xl`:'border-slate-800 bg-black/20'}`}>
                {isActive&&(
                    <div className="text-center mb-2">
                        <span className={`text-xs font-bold uppercase tracking-widest ${
                            num===1?'text-blue-400':'text-red-400'} animate-pulse`}>● ODPOVEDÁ</span>
                    </div>
                )}
                <div className="text-center mb-3">
                    <div className={`w-3 h-3 rounded-full mx-auto mb-2 ${num===1?'bg-blue-500':'bg-red-500'}`}/>
                    <h3 className={`text-xl font-bold ${isActive?'text-white':'text-slate-400'}`}>{name}</h3>
                </div>
                <div className="text-center">
                    <div className={`text-6xl font-black transition-all ${hasAnim?'anim-score':''}
                        ${score<0?'text-red-400':num===1?'text-blue-400':'text-red-400'}`}>{score}</div>
                    <div className="text-xs text-slate-600 uppercase tracking-widest mt-1">bodov</div>
                </div>
            </div>
        );
    };

    return(
        <div className={`h-full flex flex-col ${isJunior?'junior-bg':'standard-bg'}`}>
            {/* Top bar */}
            <div className="flex items-center justify-between px-8 py-3 bg-black/40">
                <div className="flex items-center gap-4">
                    <span className="text-accent font-black text-2xl tracking-tight"
                        style={{textShadow:'0 0 20px rgba(234,179,8,.3)'}}>DUEL</span>
                    <span className="text-slate-600 text-lg">│</span>
                    <span className="text-slate-300 text-lg font-semibold">{d.roundName}</span>
                </div>
                <div className="flex items-center gap-4">
                    <span className="text-slate-400">Otázka {d.qNum}/{d.qTotal}</span>
                    <span className={`px-3 py-1 rounded-full text-xs font-bold ${
                        isJunior?'bg-purple-600/30 text-purple-300':d.diff==='level1'?'bg-blue-600/30 text-blue-300':'bg-red-600/30 text-red-300'}`}>
                        {d.diff==='junior'?'⭐ Junior':d.diff==='level1'?'🔥 Level 1':'💀 Level 2'}
                    </span>
                </div>
            </div>

            {/* R1 Timeline bar (depletes right → left) */}
            {isR1&&(
                <div className="h-3 bg-slate-900 w-full relative">
                    <div className="absolute inset-0 bg-slate-800"/>
                    <div className="absolute top-0 right-0 h-full bg-gradient-to-r from-red-500 via-yellow-400 to-green-400 timeline-bar"
                        style={{width:`${(tSec/tDur)*100}%`}}/>
                    {/* glow effect when low */}
                    {tSec<=15&&tSec>0&&(
                        <div className="absolute top-0 right-0 h-full bg-red-500/30 timeline-bar animate-pulse"
                            style={{width:`${(tSec/tDur)*100}%`}}/>
                    )}
                </div>
            )}

            {/* Main content */}
            <div className="flex-1 flex items-center justify-between px-8 gap-8">
                {/* Player 1 */}
                <PlayerCard name={d.p1?.name} score={d.s1} num={1} isActive={d.active===1} hasAnim={scoreAnim.s1}/>

                {/* Center: timer + question */}
                <div className="flex-1 flex flex-col items-center justify-center gap-5 max-w-2xl">
                    {/* R1 big countdown */}
                    {isR1&&d.tRun&&(
                        <div className="text-center mb-2">
                            <div className={`text-5xl font-black tabular-nums ${
                                tSec<=10?'text-red-400 anim-timer-pulse':tSec<=30?'text-yellow-400':'text-white'}`}>
                                {Math.floor(tSec/60)}:{(tSec%60).toString().padStart(2,'0')}
                            </div>
                            <div className="text-sm text-slate-500 mt-1">
                                {d.r1phase===1?d.p1?.name:d.p2?.name} odpovedá
                            </div>
                        </div>
                    )}

                    {/* R2/R3 timer circle */}
                    {!isR1&&(d.tRun||tSec<tDur)&&(
                        <div className="relative flex items-center justify-center">
                            <svg width="120" height="120" viewBox="0 0 120 120"
                                className={d.tRun&&tSec<=3?'anim-timer-pulse':''}>
                                <circle cx="60" cy="60" r="54" fill="none" stroke="#1e293b" strokeWidth="5"/>
                                <circle cx="60" cy="60" r="54" fill="none" stroke={tCol} strokeWidth="5"
                                    strokeDasharray={circ} strokeDashoffset={dashOff}
                                    strokeLinecap="round" className="timer-ring" transform="rotate(-90 60 60)"/>
                            </svg>
                            <span className={`absolute text-4xl font-black ${tSec<=3?'text-red-400':'text-white'}`}>{tSec}</span>
                        </div>
                    )}

                    {/* Points badge */}
                    <div className="flex items-center gap-2">
                        <span className="text-accent font-black text-3xl">{d.pts}</span>
                        <span className="text-slate-400 text-sm">bodov</span>
                    </div>

                    {/* Question */}
                    {d.q?(
                        <div className="anim-slide text-center w-full">
                            <span className={`text-sm font-semibold uppercase tracking-widest mb-3 block ${
                                isJunior?'text-purple-400':'text-accent/70'}`}>
                                {d.q.category}
                            </span>
                            <div className={`bg-black/50 border ${isJunior?'border-purple-500/30':'border-accent/20'}
                                rounded-2xl p-8 backdrop-blur-sm`}>
                                <p className="text-2xl font-bold leading-relaxed">{d.q.question}</p>
                            </div>
                        </div>
                    ):(
                        <div className="text-slate-600 text-lg">Čakám na otázku…</div>
                    )}

                    {/* Answer */}
                    {d.answer&&(
                        <div className="anim-pop">
                            <div className="bg-green-500/10 border border-green-500/30 rounded-xl px-8 py-4">
                                <span className="text-green-400 font-bold text-xl">✓ {d.answer}</span>
                            </div>
                        </div>
                    )}
                </div>

                {/* Player 2 */}
                <PlayerCard name={d.p2?.name} score={d.s2} num={2} isActive={d.active===2} hasAnim={scoreAnim.s2}/>
            </div>

            {/* Bottom bar */}
            <div className="px-8 py-2 bg-black/30 flex items-center justify-between text-xs text-slate-600">
                <span>DUEL v2 · {d.diff==='junior'?'Junior':d.diff==='level1'?'Level 1':'Level 2'}</span>
                {isR1&&!d.tRun&&<span className="text-slate-500">Čakám na štart odpočtu…</span>}
                <span>Stlač F pre celú obrazovku</span>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TVApp/>);
</script>
</body>
</html>
