<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vedomostný QUIZ 2026 – TV</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;overflow:hidden;cursor:none}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--text:#fff;--textSub:#94a3b8;--border:#475569}
.light{--bg:#f1f5f9;--card:#ffffff;--card2:#e2e8f0;--text:#0f172a;--textSub:#64748b;--border:#cbd5e1}
@keyframes slide-up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes scale-pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes score-flash{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes timer-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes confetti-fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.3}}
@keyframes glow-pulse{0%,100%{filter:drop-shadow(0 0 5px rgba(234,179,8,.3))}50%{filter:drop-shadow(0 0 25px rgba(234,179,8,.6))}}
@keyframes shine{0%{left:-100%}100%{left:200%}}
@keyframes category-pop{0%{opacity:0;transform:scale(.7) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes super-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
.anim-slide{animation:slide-up .6s ease-out}
.anim-pop{animation:scale-pop .5s ease-out}
.anim-score{animation:score-flash .5s ease-out}
.anim-pulse{animation:timer-pulse 1s ease-in-out infinite}
.anim-float{animation:float 3s ease-in-out infinite}
.anim-glow{animation:glow-pulse 2s ease-in-out infinite}
.anim-super{animation:super-pulse 1s ease-in-out infinite}
.confetti{position:fixed;width:12px;height:12px;border-radius:3px;animation:confetti-fall linear forwards;z-index:100}
.timer-ring{transition:stroke-dashoffset .95s linear}
.timeline-bar{transition:width .95s linear}
.junior-bg{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.standard-bg{background:linear-gradient(180deg,#0a0a1a,#0f172a,#0a0a1a)}
.cat-card{animation:category-pop .4s ease-out both}
@keyframes feedback-in{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
.feedback-overlay{animation:feedback-in .4s ease-out}
</style>
<script>
tailwind.config={theme:{extend:{colors:{
bg:'var(--bg)',card:'var(--card)',card2:'var(--card2)',
accent:'#eab308',p1:'#3b82f6',p2:'#ef4444',ok:'#22c55e',err:'#ef4444',
}}}}
</script>
</head>
<body style="background:var(--bg);color:var(--text)">
<div id="root" class="w-screen h-screen"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

/* ─── Constants ─── */
const ROUND_NAMES={1:'Rýchla runda',2:'Hlavná runda',3:'Finálová runda',tiebreaker:'Rozstrel'};
const CAT_LABELS={
dejiny:'Dejiny',veda:'Veda',sport:'Šport',kultura:'Kultúra',literatura:'Literatúra',
osobnosti:'Osobnosti',priroda:'Príroda',stroje:'Stroje & Technika',
doplnovacky:'Doplňovačky',presmycky:'Presmyčky',hudba:'Hudba',film:'Film',
matematika:'Matematika',historicke_podujatia:'Historické udalosti'
};
const CAT_ICONS={
dejiny:'📜',veda:'🔬',sport:'⚽',kultura:'🎭',literatura:'📚',
osobnosti:'👤',priroda:'🌿',stroje:'⚙️',doplnovacky:'✍️',
presmycky:'🔤',hudba:'🎵',film:'🎬',matematika:'🔢',
historicke_podujatia:'🏛️'
};
const CAT_COLORS={
dejiny:'from-amber-500/20 to-amber-600/5 border-amber-500/50',
veda:'from-cyan-500/20 to-cyan-600/5 border-cyan-500/50',
sport:'from-green-500/20 to-green-600/5 border-green-500/50',
kultura:'from-purple-500/20 to-purple-600/5 border-purple-500/50',
literatura:'from-rose-500/20 to-rose-600/5 border-rose-500/50',
osobnosti:'from-indigo-500/20 to-indigo-600/5 border-indigo-500/50',
priroda:'from-emerald-500/20 to-emerald-600/5 border-emerald-500/50',
stroje:'from-slate-500/20 to-slate-600/5 border-slate-500/50',
doplnovacky:'from-yellow-500/20 to-yellow-600/5 border-yellow-500/50',
presmycky:'from-pink-500/20 to-pink-600/5 border-pink-500/50',
hudba:'from-violet-500/20 to-violet-600/5 border-violet-500/50',
film:'from-red-500/20 to-red-600/5 border-red-500/50',
matematika:'from-blue-500/20 to-blue-600/5 border-blue-500/50',
historicke_podujatia:'from-orange-500/20 to-orange-600/5 border-orange-500/50',
};
const R1_TIME=90;
const R3_Q_PER_CAT=2;

/* ─── Helpers ─── */
function goFullscreen(){
const el=document.documentElement;
if(el.requestFullscreen)el.requestFullscreen();
else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
}
function applyTheme(t){
if(t==='light')document.body.classList.add('light');
else document.body.classList.remove('light');
}
function spawnConfetti(){
const colors=['#eab308','#3b82f6','#ef4444','#22c55e','#a855f7','#f97316','#ec4899','#06b6d4'];
for(let i=0;i<80;i++){
    const el=document.createElement('div');el.className='confetti';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[i%colors.length];
    el.style.width=Math.random()*10+6+'px';
    el.style.height=Math.random()*10+6+'px';
    el.style.animationDuration=Math.random()*3+2+'s';
    el.style.animationDelay=Math.random()*2+'s';
    el.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),6000);
}
}

/* ═══════════════ WAITING SCREEN ═══════════════ */
function WaitingScreen(){
return(
<div className="w-full h-full flex flex-col items-center justify-center standard-bg">
    <div className="anim-float">
        <h1 className="text-6xl font-black text-accent mb-4" style={{textShadow:'0 0 80px rgba(234,179,8,.4)'}}>Vedomostný QUIZ 2026</h1>
    </div>
    <p className="text-slate-500 text-xl">Rodinná vedomostná súťaž</p>
    <p className="text-slate-600 text-sm mt-4">Čaká sa na spustenie hry…</p>
</div>
);
}

/* ═══════════════ ROUND SUMMARY SCREEN ═══════════════ */
function RoundSummaryScreen({d}){
const isJunior=d.diff==='junior';
return(
<div className={`w-full h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'}`}>
    <div className="anim-pop text-center">
        <div className="text-5xl mb-4">📊</div>
        <h2 className="text-3xl text-slate-400 font-semibold mb-2">Koniec {d.summaryRound}. kola</h2>
        <h3 className="text-4xl font-black text-accent mb-8">{ROUND_NAMES[d.summaryRound]}</h3>
        <div className="flex items-center justify-center gap-16 mb-8">
            <div className="text-center">
                <div className="w-32 h-32 rounded-full border-4 border-blue-500 flex items-center justify-center bg-blue-500/10 mb-3 mx-auto">
                    <span className="text-7xl font-black text-blue-400">{d.s1}</span>
                </div>
                <div className="text-lg text-blue-400 font-bold">{d.p1?.name}</div>
                {d.stats&&(
                    <div className="text-sm mt-1">
                        <span className="text-green-400 font-bold">{d.stats[d.summaryRound===1?'r1':d.summaryRound===2?'r2':'r3']?.p1c || 0}✓</span>
                        {' · '}
                        <span className="text-red-400 font-bold">{d.stats[d.summaryRound===1?'r1':d.summaryRound===2?'r2':'r3']?.p1w || 0}✗</span>
                    </div>
                )}
            </div>
            <div className="text-5xl font-bold text-slate-700">:</div>
            <div className="text-center">
                <div className="w-32 h-32 rounded-full border-4 border-red-500 flex items-center justify-center bg-red-500/10 mb-3 mx-auto">
                    <span className="text-7xl font-black text-red-400">{d.s2}</span>
                </div>
                <div className="text-lg text-red-400 font-bold">{d.p2?.name}</div>
                {d.stats&&(
                    <div className="text-sm mt-1">
                        <span className="text-green-400 font-bold">{d.stats[d.summaryRound===1?'r1':d.summaryRound===2?'r2':'r3']?.p2c || 0}✓</span>
                        {' · '}
                        <span className="text-red-400 font-bold">{d.stats[d.summaryRound===1?'r1':d.summaryRound===2?'r2':'r3']?.p2w || 0}✗</span>
                    </div>
                )}
            </div>
        </div>
        {d.s1>d.s2&&<p className="text-2xl text-blue-400 font-bold anim-slide">🔵 {d.p1?.name} vedie!</p>}
        {d.s2>d.s1&&<p className="text-2xl text-red-400 font-bold anim-slide">🔴 {d.p2?.name} vedie!</p>}
        {d.s1===d.s2&&<p className="text-2xl text-accent font-bold anim-slide">⚖️ Vyrovnané!</p>}
    </div>
</div>
);
}

/* ═══════════════ CATEGORY GRID SCREEN ═══════════════ */
function CategoryGridScreen({d}){
const isJunior=d.diff==='junior';
const cats=d.categories||[];
return(
<div className={`w-full h-full flex flex-col ${isJunior?'junior-bg':'standard-bg'} overflow-hidden`}>
    {/* Header bar */}
    <div className="flex items-center justify-between px-6 py-3 bg-black/30">
        <div className="flex items-center gap-3">
            <span className="text-accent font-black text-xl anim-glow">QUIZ 2026</span>
            <span className="text-slate-600">│</span>
            <span className="text-white font-semibold text-lg">{ROUND_NAMES[d.round]}</span>
        </div>
        <span className="text-slate-400">Otázka {d.qNum}/{d.qTotal}</span>
    </div>

    {/* Active player indicator */}
    {(()=>{
        const isR3=d.round===3;
        const picker=d.picker||d.active;
        const pickerName=picker===1?d.p1?.name:d.p2?.name;
        const answererName=d.active===1?d.p1?.name:d.p2?.name;
        return(<div className="text-center py-3">
            <span className={`text-3xl font-bold ${picker===1?'text-blue-400':'text-red-400'}`}>
                {picker===1?'🔵':'🔴'} {pickerName}
            </span>
            <span className="text-slate-400 text-2xl ml-3">{isR3?'vyberá okruh pre':'vyberá okruh'}</span>
            {isR3&&<span className={`text-3xl font-bold ml-3 ${d.active===1?'text-blue-400':'text-red-400'}`}>{answererName}</span>}
        </div>);
    })()}

    {/* Category grid */}
    <div className="flex-1 flex items-center justify-center px-8 pb-6">
        {cats.length===0?<p className="text-accent text-3xl font-black py-8">Všetky okruhy boli použité!</p>:
        <div className="grid grid-cols-2 gap-4 max-w-3xl w-full">
            {cats.map((c,i)=>{
                const cqc=d.catQCounts||{};
                const remaining=d.round===3?R3_Q_PER_CAT-(cqc[c]||0):null;
                return(
                <div key={c}
                    className={`cat-card p-6 rounded-2xl border-2 bg-gradient-to-br ${CAT_COLORS[c]||'from-slate-500/20 to-slate-600/5 border-slate-500/50'}`}
                    style={{animationDelay:i*0.05+'s'}}>
                    <div className="flex items-center gap-4">
                        <span className="text-5xl">{CAT_ICONS[c]||'❓'}</span>
                        <span className="font-bold text-2xl">{CAT_LABELS[c]||c}</span>
                        {remaining!==null&&<span className="ml-auto text-lg font-bold text-accent bg-black/40 rounded-full px-3 py-1">{remaining}/{R3_Q_PER_CAT}</span>}
                    </div>
                </div>
                );
            })}
        </div>}
    </div>

    {/* Score bar */}
    <div className="flex items-center justify-between px-6 py-3 bg-black/40">
        <div className="flex items-center gap-3">
            <span className={`font-bold text-lg ${d.active===1?'text-blue-400':'text-slate-500'}`}>{d.p1?.name}</span>
            <span className={`text-3xl font-black ${d.s1<0?'text-red-400':'text-blue-400'}`}>{d.s1}</span>
        </div>
        <div className="flex items-center gap-3">
            <span className={`text-3xl font-black ${d.s2<0?'text-red-400':'text-red-400'}`}>{d.s2}</span>
            <span className={`font-bold text-lg ${d.active===2?'text-red-400':'text-slate-500'}`}>{d.p2?.name}</span>
        </div>
    </div>
</div>
);
}

/* ═══════════════ TIEBREAKER SCREEN ═══════════════ */
function TiebreakerScreen({d}){
const isJunior=d.diff==='junior';

/* If tbWinner is set, show the tiebreaker winner screen */
if(d.tbWinner){
    const winName=d.tbWinner===1?d.p1?.name:d.p2?.name;
    const winColor=d.tbWinner===1?'text-blue-400':'text-red-400';
    return(
    <div className={`w-full h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'}`}>
        <div className="anim-pop text-center">
            <div className="text-8xl mb-4">⚡</div>
            <h2 className="text-3xl text-slate-400 font-semibold mb-2">Víťaz rozstrelu</h2>
            <h1 className={`text-6xl font-black ${winColor} mb-6`}>{winName}!</h1>
            <div className="flex items-center justify-center gap-12 mt-4">
                <div className="text-center">
                    <div className="text-lg text-blue-400 font-bold mb-2">🔵 {d.p1?.name}</div>
                    <div className="text-3xl font-black text-blue-300">{d.s1}</div>
                </div>
                <div className="text-4xl font-bold text-slate-700">:</div>
                <div className="text-center">
                    <div className="text-lg text-red-400 font-bold mb-2">🔴 {d.p2?.name}</div>
                    <div className="text-3xl font-black text-red-300">{d.s2}</div>
                </div>
            </div>
        </div>
    </div>
    );
}

return(
<div className={`w-full h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'}`}>
    <div className="anim-pop text-center max-w-2xl px-6">
        <div className="text-6xl mb-3">⚡</div>
        <h2 className="text-4xl font-black text-accent mb-6">Rozstrel</h2>
        <p className="text-slate-400 mb-6 text-lg">Jedna otázka – najbližšia odpoveď vyhráva!</p>
        {d.tbQ&&(
            <div className="anim-slide">
                <div className="bg-black/50 border-2 border-accent/30 rounded-3xl p-10 mb-6">
                    <p className="text-5xl font-bold leading-relaxed">{d.tbQ.question}</p>
                </div>
                {d.tbQ.answer&&(
                    <div className="anim-pop">
                        <div className="bg-green-500/10 border border-green-500/30 rounded-xl px-6 py-3 mb-4">
                            <span className="text-green-400 font-bold text-xl">✓ Správna odpoveď: {d.tbQ.answer}</span>
                        </div>
                    </div>
                )}
            </div>
        )}
        <div className="flex items-center justify-center gap-12 mt-4">
            <div className="text-center">
                <div className="text-lg text-blue-400 font-bold mb-2">🔵 {d.p1?.name}</div>
                {d.tb1?<div className="text-3xl font-black text-blue-300 bg-blue-500/10 border border-blue-500/30 rounded-xl px-6 py-2">{d.tb1}</div>
                :<div className="text-xl text-slate-600">…</div>}
            </div>
            <div className="text-center">
                <div className="text-lg text-red-400 font-bold mb-2">🔴 {d.p2?.name}</div>
                {d.tb2?<div className="text-3xl font-black text-red-300 bg-red-500/10 border border-red-500/30 rounded-xl px-6 py-2">{d.tb2}</div>
                :<div className="text-xl text-slate-600">…</div>}
            </div>
        </div>
    </div>
</div>
);
}

/* ═══════════════ RESULTS SCREEN ═══════════════ */
function ResultsScreen({d}){
const isJunior=d.diff==='junior';
const confettiRef=useRef(false);
useEffect(()=>{
    if(!confettiRef.current){confettiRef.current=true;spawnConfetti();}
},[]);
const wn=d.winner===1?d.p1?.name:d.p2?.name;
const wc=d.winner===1?'text-blue-400':'text-red-400';
const ts=d.stats||{r1:{p1c:0,p1w:0,p2c:0,p2w:0},r2:{p1c:0,p1w:0,p2c:0,p2w:0},r3:{p1c:0,p1w:0,p2c:0,p2w:0}};
const p1tc=ts.r1.p1c+ts.r2.p1c+ts.r3.p1c,p1tw=ts.r1.p1w+ts.r2.p1w+ts.r3.p1w;
const p2tc=ts.r1.p2c+ts.r2.p2c+ts.r3.p2c,p2tw=ts.r1.p2w+ts.r2.p2w+ts.r3.p2w;
return(
<div className={`w-full h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'} overflow-auto`}>
    <div className="anim-pop text-center px-8 py-6 max-w-3xl">
        <div className="text-8xl mb-4">🏆</div>
        <h2 className="text-2xl text-slate-400 font-semibold mb-2">Víťaz súťaže</h2>
        <h1 className={`text-6xl font-black ${wc} mb-6`}>{wn}!</h1>

        <div className="flex items-center justify-center gap-16 mb-8">
            <div className="text-center">
                <div className={`w-36 h-36 rounded-full border-4 ${d.winner===1?'border-blue-400 bg-blue-500/20 anim-glow':'border-slate-700 bg-black/20'} flex items-center justify-center mb-2 mx-auto`}>
                    <span className="text-6xl font-black text-blue-400">{d.s1}</span>
                </div>
                <div className="text-lg text-blue-400 font-bold">{d.p1?.name}</div>
            </div>
            <div className="text-5xl font-bold text-slate-700">:</div>
            <div className="text-center">
                <div className={`w-36 h-36 rounded-full border-4 ${d.winner===2?'border-red-400 bg-red-500/20 anim-glow':'border-slate-700 bg-black/20'} flex items-center justify-center mb-2 mx-auto`}>
                    <span className="text-6xl font-black text-red-400">{d.s2}</span>
                </div>
                <div className="text-lg text-red-400 font-bold">{d.p2?.name}</div>
            </div>
        </div>

        {/* Statistics table */}
        <div className="bg-black/40 border border-slate-700 rounded-2xl p-6 mb-4 max-w-xl mx-auto">
            <h3 className="text-xl font-bold text-accent mb-4">📊 Štatistiky súťaže</h3>
            <table className="w-full text-base">
                <thead>
                    <tr className="text-slate-400 text-sm uppercase">
                        <th className="text-left py-2 px-3">Kolo</th>
                        <th className="py-2 px-3 text-center text-blue-400">{d.p1?.name}</th>
                        <th className="py-2 px-3 text-center text-red-400">{d.p2?.name}</th>
                    </tr>
                </thead>
                <tbody>
                    {[{name:'1. Rýchla',k:'r1'},{name:'2. Hlavná',k:'r2'},{name:'3. Finálová',k:'r3'}].map(r=>(
                        <tr key={r.k} className="border-t border-slate-700">
                            <td className="py-2 px-3 font-semibold text-slate-300">{r.name}</td>
                            <td className="py-2 px-3 text-center">
                                <span className="text-green-400 font-bold">{ts[r.k].p1c}✓</span>
                                {' '}
                                <span className="text-red-400 font-bold">{ts[r.k].p1w}✗</span>
                            </td>
                            <td className="py-2 px-3 text-center">
                                <span className="text-green-400 font-bold">{ts[r.k].p2c}✓</span>
                                {' '}
                                <span className="text-red-400 font-bold">{ts[r.k].p2w}✗</span>
                            </td>
                        </tr>
                    ))}
                    <tr className="border-t-2 border-accent/30 font-bold text-lg">
                        <td className="py-3 px-3 text-accent">Celkovo</td>
                        <td className="py-3 px-3 text-center">
                            <span className="text-green-400">{p1tc}✓</span>
                            {' '}
                            <span className="text-red-400">{p1tw}✗</span>
                        </td>
                        <td className="py-3 px-3 text-center">
                            <span className="text-green-400">{p2tc}✓</span>
                            {' '}
                            <span className="text-red-400">{p2tw}✗</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
);
}

/* ═══════════════ GAME SCREEN (QUESTION VISIBLE) ═══════════════ */
function GameScreen({d}){
const isJunior=d.diff==='junior';
const isR1=d.round===1;
const tDur=d.tDur||10;
const timerFrac=tDur>0?d.tSec/tDur:1;
const circ=2*Math.PI*54;
const dashOff=circ*(1-timerFrac);
const tCol=d.tSec<=3?'#ef4444':d.tSec<=6?'#eab308':'#22c55e';

/* R1 timer */
const r1frac=(d.r1timer||0)/R1_TIME;
const r1circ=2*Math.PI*54;
const r1dashOff=r1circ*(1-r1frac);
const r1Col=(d.r1timer||0)<=10?'#ef4444':(d.r1timer||0)<=20?'#eab308':'#22c55e';

const [prevS1,setPrevS1]=useState(d.s1);
const [prevS2,setPrevS2]=useState(d.s2);
const [flashP1,setFlashP1]=useState(false);
const [flashP2,setFlashP2]=useState(false);

useEffect(()=>{if(d.s1!==prevS1){setFlashP1(true);setPrevS1(d.s1);setTimeout(()=>setFlashP1(false),500)}},[d.s1]);
useEffect(()=>{if(d.s2!==prevS2){setFlashP2(true);setPrevS2(d.s2);setTimeout(()=>setFlashP2(false),500)}},[d.s2]);

/* Player card */
const PlayerCard=({num,name,score,isActive,flash})=>(
<div className={`flex flex-col items-center justify-center w-48 rounded-2xl border-2 p-4 transition-all duration-300 ${
    isActive?(num===1?'border-blue-500 bg-blue-950/60 shadow-lg shadow-blue-500/30':'border-red-500 bg-red-950/60 shadow-lg shadow-red-500/30')
    :'border-slate-800 bg-black/20'}`}>
    {isActive&&<span className={`text-xs font-bold uppercase tracking-widest mb-2 ${num===1?'text-blue-400':'text-red-400'} animate-pulse`}>● ODPOVEDÁ</span>}
    {d.passing&&isActive&&<span className="text-xs font-bold text-yellow-400 uppercase tracking-widest mb-1 anim-super">⚡ SUPER</span>}
    <h3 className={`text-lg font-bold mb-2 ${isActive?'text-white':'text-slate-400'}`}>{name}</h3>
    <div className={`text-6xl font-black ${flash?'anim-score':''} ${score<0?'text-red-400':num===1?'text-blue-400':'text-red-400'}`}>{score}</div>
</div>
);

return(
<div className={`w-full h-full flex flex-col ${isJunior?'junior-bg':'standard-bg'} overflow-hidden`}>
    {/* Top bar */}
    <div className="flex items-center justify-between px-6 py-3 bg-black/30">
        <div className="flex items-center gap-3">
            <span className="text-accent font-black text-xl anim-glow">QUIZ 2026</span>
            <span className="text-slate-600">│</span>
            <span className="text-white font-semibold text-lg">{d.roundName||ROUND_NAMES[d.round]}</span>
        </div>
        <span className="text-slate-400">
            {isR1?`${d.r1phase===1?d.p1?.name:d.p2?.name}`:`Otázka ${d.qNum}/${d.qTotal}`}
        </span>
    </div>

    {/* R1 timeline bar */}
    {isR1&&d.r1tRun&&(
        <div className="px-6 py-1 bg-black/20">
            <div className="h-3 rounded-full overflow-hidden bg-slate-800">
                <div className="h-full rounded-full timeline-bar" style={{width:((d.r1timer/R1_TIME)*100)+'%',background:r1Col}}/>
            </div>
        </div>
    )}

    {/* Main area */}
    <div className="flex-1 flex items-center justify-between px-6 gap-6">
        {/* P1 */}
        <PlayerCard num={1} name={d.p1?.name} score={d.s1} isActive={d.active===1} flash={flashP1}/>

        {/* Center */}
        <div className="flex-1 flex flex-col items-center justify-center max-w-4xl gap-5">
            {/* R1: 90s timer circle */}
            {isR1&&d.r1tRun&&(
                <div className="relative flex items-center justify-center">
                    <svg width="120" height="120" viewBox="0 0 120 120" className={(d.r1timer||0)<=10?'anim-pulse':''}>
                        <circle cx="60" cy="60" r="54" fill="none" stroke="#1e293b" strokeWidth="5"/>
                        <circle cx="60" cy="60" r="54" fill="none" stroke={r1Col} strokeWidth="5"
                            strokeDasharray={r1circ} strokeDashoffset={r1dashOff} strokeLinecap="round"
                            className="timer-ring" transform="rotate(-90 60 60)"/>
                    </svg>
                    <span className={`absolute text-4xl font-black ${(d.r1timer||0)<=10?'text-red-400':'text-white'}`}>{d.r1timer||0}</span>
                </div>
            )}

            {/* R2/R3 Timer */}
            {!isR1&&(d.tRun||d.tSec<tDur)&&(
                <div className="relative flex items-center justify-center">
                    <svg width="120" height="120" viewBox="0 0 120 120" className={d.tRun&&d.tSec<=3?'anim-pulse':''}>
                        <circle cx="60" cy="60" r="54" fill="none" stroke="#1e293b" strokeWidth="5"/>
                        <circle cx="60" cy="60" r="54" fill="none" stroke={tCol} strokeWidth="5"
                            strokeDasharray={circ} strokeDashoffset={dashOff} strokeLinecap="round"
                            className="timer-ring" transform="rotate(-90 60 60)"/>
                    </svg>
                    <span className={`absolute text-4xl font-black ${d.tSec<=3?'text-red-400':'text-white'}`}>{d.tSec}</span>
                </div>
            )}

            {/* R1 info */}
            {isR1&&<div className="text-center text-slate-400 text-2xl">{d.r1phase===1?d.p1?.name:d.p2?.name} odpovedá · <span className="text-accent font-bold">10</span> bodov</div>}

            {/* Passing indicator */}
            {d.passing&&(
                <div className="bg-yellow-500/20 border-2 border-yellow-500/50 rounded-xl px-6 py-2 anim-super">
                    <span className="text-yellow-400 font-black text-xl">⚡ ODPOVEĎ SUPER</span>
                </div>
            )}

            {/* Points badge (R2/R3) */}
            {!isR1&&d.q&&(
                <div className="flex items-center gap-2">
                    <span className="text-accent font-black text-5xl">{d.pts}</span>
                    <span className="text-slate-400 text-xl">bodov</span>
                </div>
            )}

            {/* Question */}
            {d.q?(
                <div className="anim-slide text-center w-full">
                    <span className={`text-2xl font-semibold uppercase tracking-widest mb-3 block ${isJunior?'text-purple-400':'text-accent/70'}`}>
                        {d.q.category}
                    </span>
                    <div className={`bg-black/50 border-2 ${isJunior?'border-purple-500/30':'border-accent/20'} rounded-3xl p-10`}>
                        <p className="font-bold text-5xl leading-relaxed">{d.q.question}</p>
                    </div>
                </div>
            ):<div className="text-slate-600 text-2xl">Čakám na otázku…</div>}

            {/* Answer reveal */}
            {d.answer&&(
                <div className="anim-pop">
                    <div className="bg-green-500/10 border-2 border-green-500/30 rounded-3xl px-8 py-5">
                        <span className="text-green-400 font-bold text-4xl">✓ {d.answer}</span>
                    </div>
                </div>
            )}
        </div>

        {/* P2 */}
        <PlayerCard num={2} name={d.p2?.name} score={d.s2} isActive={d.active===2} flash={flashP2}/>
    </div>

    {/* Bottom bar */}
    <div className="flex items-center justify-center px-6 py-2 bg-black/20">
        <span className="text-slate-600 text-sm">Vedomostný QUIZ 2026</span>
    </div>
</div>
);
}

/* ═══════════════ FEEDBACK OVERLAY ═══════════════ */
function FeedbackOverlay({type,answer}){
if(!type)return null;
const ok=type==='correct';
return(
<div className={`fixed inset-0 z-50 flex flex-col items-center justify-center pointer-events-none feedback-overlay ${ok?'bg-green-500/90':'bg-red-500/90'}`}>
    <span className="text-[200px] leading-none text-white">{ok?'✓':'✗'}</span>
    <h1 className="text-7xl font-black text-white mt-4">{ok?'SPRÁVNE!':'NESPRÁVNE!'}</h1>
    {answer&&<p className="text-5xl text-white/90 font-bold mt-4">{answer}</p>}
</div>
);
}

/* ═══════════════ TV APP ═══════════════ */
function TVApp(){
const[data,setData]=useState(null);
const[waiting,setWaiting]=useState(true);

useEffect(()=>{
    const ch=new BroadcastChannel('duel-game');
    ch.onmessage=e=>{
        const{type,data:d}=e.data;
        if(type==='WAITING'){setWaiting(true);setData(null)}
        else if(type==='UPDATE'){setWaiting(false);setData(d);if(d.theme)applyTheme(d.theme)}
    };
    return()=>ch.close();
},[]);

const handleClick=()=>goFullscreen();

let content;
if(waiting||!data) content=<WaitingScreen/>;
else{
    const d=data;
    if(d.showRoundSummary) content=<RoundSummaryScreen d={d}/>;
    else if(d.over) content=<ResultsScreen d={d}/>;
    else if(d.round==='tiebreaker'&&(d.tbQ||d.tbWinner)) content=<TiebreakerScreen d={d}/>;
    else if((d.round===2||d.round===3)&&!d.selCat&&d.categories) content=<CategoryGridScreen d={d}/>;
    else content=<GameScreen d={d}/>;
}

return(
<div onClick={handleClick} className="w-full h-full">
    {content}
    {data&&data.feedback&&<FeedbackOverlay type={data.feedback} answer={data.answer}/>}
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<TVApp/>);
</script>
</body>
</html>
