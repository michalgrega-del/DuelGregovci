<body class="bg-bg text-white min-h-screen">

    <script type="text/babel">
// ================================================================
//  DUEL – Moderátor (React SPA)
// ================================================================
const { useState, useReducer, useContext, createContext, useEffect, useRef, useCallback, useMemo } = React;

// ────────────── CONSTANTS ──────────────
const ROUND_NAMES = { 1:'Rýchla runda', 2:'Striedavá runda', 3:'Súperova voľba', tiebreaker:'Rozstrel' };
const DIFF_LABELS = { junior:'Junior (7–12)', level1:'Level 1 (13–18)', level2:'Level 2 (18–99)' };
const CAT_LABELS = {
    dejiny:'Dejiny', veda:'Veda', sport:'Šport', kultura:'Kultúra', literatura:'Literatúra',
    osobnosti:'Osobnosti', priroda:'Príroda', stroje:'Stroje & Technika',
    doplnovacky:'Doplňovačky', presmycky:'Presmyčky', hudba:'Hudba', film:'Film',
    matematika:'Matematika', historicke_podujatia:'Historické udalosti'
};
const PTS = [10, 20, 30, 40, 50];

// ────────────── STORAGE ──────────────
const S = {
    g(k, d=null){ try{ const v=localStorage.getItem('duel_'+k); return v?JSON.parse(v):d; }catch{return d;} },
    s(k, v){ try{ localStorage.setItem('duel_'+k,JSON.stringify(v)); }catch(e){console.warn(e);} }
};

// ────────────── AUDIO (Web Audio API) ──────────────
const SFX = (()=>{
    let c=null;
    const i=()=>{ if(!c) c=new(window.AudioContext||window.webkitAudioContext)(); if(c.state==='suspended')c.resume(); return c; };
    const osc=(freq,type,dur,vol=0.15,t=0)=>{
        const x=i(), o=x.createOscillator(), g=x.createGain();
        o.connect(g); g.connect(x.destination);
        o.type=type; o.frequency.value=freq;
        g.gain.setValueAtTime(vol, x.currentTime+t);
        g.gain.exponentialRampToValueAtTime(0.001, x.currentTime+t+dur);
        o.start(x.currentTime+t); o.stop(x.currentTime+t+dur);
    };
    return {
        enabled: true,
        tick(){ if(!this.enabled)return; osc(880,'sine',0.06,0.12); },
        tickLow(){ if(!this.enabled)return; osc(440,'sine',0.12,0.25); },
        buzzer(){ if(!this.enabled)return; osc(120,'sawtooth',0.8,0.35); },
        correct(){ if(!this.enabled)return; [523,659,784].forEach((f,i)=>osc(f,'sine',0.25,0.18,i*0.1)); },
        wrong(){ if(!this.enabled)return; const x=i(),o=x.createOscillator(),g=x.createGain();
            o.connect(g);g.connect(x.destination);o.type='square';o.frequency.value=200;
            g.gain.setValueAtTime(0.2,x.currentTime);o.frequency.linearRampToValueAtTime(80,x.currentTime+0.35);
            g.gain.exponentialRampToValueAtTime(0.001,x.currentTime+0.4);o.start();o.stop(x.currentTime+0.4); },
        fanfare(){ if(!this.enabled)return; [392,494,587,784,1047].forEach((f,i)=>osc(f,'triangle',0.45,0.2,i*0.13)); },
    };
})();

// ────────────── BROADCAST ──────────────
const tvCh = new BroadcastChannel('duel-game');
const sendTV = (type, data) => tvCh.postMessage({type, data});

// ────────────── QUESTION HELPERS ──────────────
function pickQ(diff, usedIds, cat=null, type=null){
    let pool = QUESTIONS_DB.filter(q =>
        q.difficulty===diff && !usedIds.has(q.id) &&
        (cat?q.category===cat:true) && (type?q.type===type:q.type!=='tiebreaker'));
    if(!pool.length) pool = QUESTIONS_DB.filter(q =>
        q.difficulty===diff && (cat?q.category===cat:true) && (type?q.type===type:q.type!=='tiebreaker'));
    return pool.length ? pool[Math.floor(Math.random()*pool.length)] : null;
}
function getCats(diff){
    const s=new Set(); QUESTIONS_DB.filter(q=>q.difficulty===diff&&q.type!=='tiebreaker').forEach(q=>s.add(q.category)); return [...s];
}

// ────────────── REDUCER ──────────────
const init = {
    screen:'home', players:S.g('players',[]), history:S.g('history',[]),
    settings:S.g('settings',{timer:10,sound:true}),
    // setup
    gameDate:new Date().toISOString().slice(0,10), p1:null, p2:null, diff:'junior',
    // active game
    round:1, qNum:0, curQ:null, usedIds:new Set(),
    s1:0, s2:0, active:1, tRun:false, tSec:10,
    pts:10, passed:false, revealed:false, answered:false,
    gameOn:false, over:false, winner:null, selCat:null,
    tb1:'', tb2:'',
};

function reducer(st, a){
    switch(a.type){
    case 'NAV': return {...st, screen:a.to};
    // ── Players ──
    case 'ADD_P':{
        const ps=[...st.players,{id:Date.now(),name:a.name,age:a.age,ts:new Date().toISOString()}];
        S.s('players',ps); return {...st,players:ps}; }
    case 'EDIT_P':{
        const ps=st.players.map(p=>p.id===a.id?{...p,name:a.name,age:a.age}:p);
        S.s('players',ps); return {...st,players:ps}; }
    case 'DEL_P':{
        const ps=st.players.filter(p=>p.id!==a.id);
        S.s('players',ps); return {...st,players:ps}; }
    // ── Setup ──
    case 'SETUP': return {...st,...a.d};
    // ── Start Game ──
    case 'START_GAME':{
        const u=new Set(), q=pickQ(st.diff,u); if(q) u.add(q.id);
        return {...st, screen:'game',gameOn:true,over:false,round:1,qNum:0,curQ:q,
            usedIds:u,s1:0,s2:0,active:1,tRun:false,tSec:st.settings.timer,
            pts:10,passed:false,revealed:false,answered:false,winner:null,selCat:null,tb1:'',tb2:''}; }
    // ── Game Controls ──
    case 'SET_ACTIVE': return {...st,active:a.p};
    case 'SET_PTS': return {...st,pts:a.v};
    case 'T_START': return {...st,tRun:true,tSec:st.settings.timer};
    case 'T_TICK':{ const n=st.tSec-1; return n<=0?{...st,tSec:0,tRun:false}:{...st,tSec:n}; }
    case 'T_STOP': return {...st,tRun:false};
    case 'REVEAL': return {...st,revealed:true};
    case 'CORRECT':{
        const p=a.p||st.active;
        return {...st, s1:p===1?st.s1+st.pts:st.s1, s2:p===2?st.s2+st.pts:st.s2,
            answered:true, tRun:false}; }
    case 'WRONG':{
        const p=a.p||st.active;
        return {...st, s1:p===1?st.s1-st.pts:st.s1, s2:p===2?st.s2-st.pts:st.s2,
            tRun:false, passed:false}; }
    case 'PASS':
        return {...st, active:st.active===1?2:1, passed:true, tSec:st.settings.timer};
    case 'NO_POINTS':
        return {...st, answered:true, tRun:false};
    // ── Next Question / Round ──
    case 'NEXT_Q':{
        const nq=st.qNum+1;
        if(nq>=5){ // round over
            const nr=st.round<3?st.round+1:'done';
            if(nr==='done'){
                if(st.s1===st.s2){ // tiebreaker
                    const u2=new Set(st.usedIds), q=pickQ(st.diff,u2,null,'tiebreaker'); if(q)u2.add(q.id);
                    return {...st,round:'tiebreaker',qNum:0,curQ:q,usedIds:u2,active:1,tRun:false,
                        tSec:st.settings.timer,pts:10,passed:false,revealed:false,answered:false,selCat:null,tb1:'',tb2:''};
                }
                const w=st.s1>st.s2?1:2;
                return {...st,over:true,gameOn:false,winner:w,screen:'results'};
            }
            // new round
            const u2=new Set(st.usedIds); let q=null;
            if(nr!==3){ q=pickQ(st.diff,u2); if(q)u2.add(q.id); }
            return {...st,round:nr,qNum:0,curQ:q,usedIds:u2,
                active:nr===2?1:2, tRun:false,tSec:st.settings.timer,
                pts:10,passed:false,revealed:false,answered:false,selCat:null};
        }
        // next question same round
        const u2=new Set(st.usedIds); let q=null, na=st.active;
        if(st.round===2){ na=nq%2===0?1:2; q=pickQ(st.diff,u2); }
        else if(st.round===3){ na=nq%2===0?1:2; q=null; }
        else { q=pickQ(st.diff,u2); }
        if(q) u2.add(q.id);
        return {...st,qNum:nq,curQ:q,usedIds:u2,active:na,tRun:false,
            tSec:st.settings.timer,passed:false,revealed:false,answered:false,selCat:null};
    }
    case 'SEL_CAT':{
        const u2=new Set(st.usedIds), q=pickQ(st.diff,u2,a.cat); if(q)u2.add(q.id);
        return {...st,curQ:q,usedIds:u2,selCat:a.cat}; }
    // ── Tiebreaker ──
    case 'TB_GUESS': return {...st,[a.p===1?'tb1':'tb2']:a.v};
    case 'TB_RESOLVE':{
        const correct=parseFloat(st.curQ.answer), g1=parseFloat(st.tb1), g2=parseFloat(st.tb2);
        const d1=Math.abs(g1-correct), d2=Math.abs(g2-correct);
        let w; if(d1<d2)w=1; else if(d2<d1)w=2; else w=Math.random()<0.5?1:2;
        return {...st,over:true,gameOn:false,winner:w,revealed:true,screen:'results'}; }
    // ── Save & End ──
    case 'SAVE':{
        const r={id:Date.now(),date:st.gameDate,p1:st.p1,p2:st.p2,s1:st.s1,s2:st.s2,
            diff:st.diff,winner:st.winner===1?st.p1.name:st.p2.name,winnerId:st.winner===1?st.p1.id:st.p2.id};
        const h=[...st.history,r]; S.s('history',h); return {...st,history:h}; }
    case 'END_GAME':
        return {...st,gameOn:false,over:false,screen:'home',curQ:null,tRun:false};
    case 'UPD_SETTINGS':{
        const s={...st.settings,...a.s}; S.s('settings',s); SFX.enabled=s.sound; return {...st,settings:s}; }
    case 'DEL_HIST':{ const h=st.history.filter(x=>x.id!==a.id); S.s('history',h); return {...st,history:h}; }
    case 'CLR_HIST':{ S.s('history',[]); return {...st,history:[]}; }
    default: return st;
    }
}

// ────────────── CONTEXT ──────────────
const Ctx = createContext();
function Provider({children}){
    const [st,dp]=useReducer(reducer,init);
    const timerRef=useRef(null);

    // Timer
    useEffect(()=>{
        if(st.tRun){ timerRef.current=setInterval(()=>dp({type:'T_TICK'}),1000); return()=>clearInterval(timerRef.current); }
        else { if(timerRef.current)clearInterval(timerRef.current); }
    },[st.tRun]);

    // Timer sounds
    useEffect(()=>{
        if(!st.tRun) return;
        if(st.tSec>3) SFX.tick();
        else if(st.tSec>0) SFX.tickLow();
        else if(st.tSec===0) SFX.buzzer();
    },[st.tSec,st.tRun]);

    // TV sync
    useEffect(()=>{
        if(!st.gameOn && st.screen!=='results'){
            sendTV('WAITING',{msg:'Čakám na hru…'}); return;
        }
        sendTV('UPDATE',{
            screen:st.screen, p1:st.p1, p2:st.p2, s1:st.s1, s2:st.s2,
            round:st.round, roundName:ROUND_NAMES[st.round], qNum:st.qNum+1,
            q:st.curQ?{question:st.curQ.question,category:CAT_LABELS[st.curQ.category]||st.curQ.category,type:st.curQ.type}:null,
            answer:st.revealed?st.curQ?.answer:null, active:st.active, tRun:st.tRun,
            tSec:st.tSec, tDur:st.settings.timer, pts:st.pts, diff:st.diff,
            over:st.over, winner:st.winner, answered:st.answered,
        });
    },[st.screen,st.s1,st.s2,st.round,st.curQ,st.tSec,st.tRun,st.active,st.gameOn,st.over,st.revealed,st.answered,st.winner,st.pts,st.qNum]);

    // Sound init
    useEffect(()=>{ SFX.enabled=st.settings.sound; },[]);

    return <Ctx.Provider value={{st,dp}}>{children}</Ctx.Provider>;
}
const use$ = ()=>useContext(Ctx);

// ════════════════════════════════════════════════════
//   UI COMPONENTS
// ════════════════════════════════════════════════════

// ── Reusable ──
const Btn=({children,onClick,cls='',disabled=false,...p})=>(
    <button onClick={onClick} disabled={disabled}
        className={`px-4 py-2 rounded-lg font-semibold transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed ${cls}`} {...p}>
        {children}
    </button>
);
const Card=({children,cls=''})=><div className={`bg-card rounded-xl p-5 ${cls}`}>{children}</div>;

// ════════════ HOME SCREEN ════════════
function HomeScreen(){
    const {dp}=use$();
    return (
        <div className="flex flex-col items-center justify-center min-h-screen gap-6 p-6">
            <h1 className="text-7xl font-black tracking-tight text-accent mb-2" style={{textShadow:'0 0 40px rgba(234,179,8,0.3)'}}>DUEL</h1>
            <p className="text-slate-400 text-lg mb-8">Vedomostná súťaž pre rodinu</p>
            <div className="flex flex-col gap-3 w-72">
                <Btn cls="bg-accent text-black hover:bg-yellow-400 text-lg py-3" onClick={()=>dp({type:'NAV',to:'setup'})}>🎮 Nová hra</Btn>
                <Btn cls="bg-card hover:bg-card2 border border-slate-600" onClick={()=>dp({type:'NAV',to:'players'})}>👤 Hráči</Btn>
                <Btn cls="bg-card hover:bg-card2 border border-slate-600" onClick={()=>dp({type:'NAV',to:'leaderboard'})}>🏆 Rebríček</Btn>
                <Btn cls="bg-card hover:bg-card2 border border-slate-600" onClick={()=>dp({type:'NAV',to:'hist'})}>📋 História</Btn>
                <Btn cls="bg-card hover:bg-card2 border border-slate-600" onClick={()=>dp({type:'NAV',to:'settings'})}>⚙️ Nastavenia</Btn>
            </div>
        </div>
    );
}

// ════════════ PLAYERS SCREEN ════════════
function PlayersScreen(){
    const {st,dp}=use$();
    const [name,setName]=useState('');
    const [age,setAge]=useState('');
    const [editId,setEditId]=useState(null);

    const save=()=>{
        if(!name.trim()) return;
        if(editId){ dp({type:'EDIT_P',id:editId,name:name.trim(),age:parseInt(age)||0}); setEditId(null); }
        else { dp({type:'ADD_P',name:name.trim(),age:parseInt(age)||0}); }
        setName(''); setAge('');
    };
    const startEdit=(p)=>{ setEditId(p.id); setName(p.name); setAge(p.age+''); };
    const cancel=()=>{ setEditId(null); setName(''); setAge(''); };

    return (
        <div className="max-w-xl mx-auto p-6">
            <button onClick={()=>dp({type:'NAV',to:'home'})} className="text-slate-400 hover:text-white mb-4 flex items-center gap-1">← Späť</button>
            <h2 className="text-3xl font-bold mb-6">👤 Správa hráčov</h2>
            <Card cls="mb-6">
                <h3 className="font-semibold mb-3">{editId?'Upraviť hráča':'Pridať hráča'}</h3>
                <div className="flex gap-2">
                    <input value={name} onChange={e=>setName(e.target.value)} placeholder="Meno"
                        className="flex-1 bg-card2 rounded-lg px-3 py-2 outline-none focus:ring-2 ring-accent" onKeyDown={e=>e.key==='Enter'&&save()}/>
                    <input value={age} onChange={e=>setAge(e.target.value)} placeholder="Vek" type="number"
                        className="w-20 bg-card2 rounded-lg px-3 py-2 outline-none focus:ring-2 ring-accent"/>
                    <Btn cls="bg-accent text-black hover:bg-yellow-400" onClick={save}>{editId?'Uložiť':'Pridať'}</Btn>
                    {editId && <Btn cls="bg-card2 hover:bg-slate-600" onClick={cancel}>Zrušiť</Btn>}
                </div>
            </Card>
            {st.players.length===0 ? <p className="text-slate-500 text-center">Zatiaľ žiadni hráči. Pridajte prvého hráča.</p> :
            <div className="space-y-2">
                {st.players.map(p=>(
                    <div key={p.id} className="bg-card rounded-lg p-3 flex items-center justify-between">
                        <div>
                            <span className="font-semibold">{p.name}</span>
                            <span className="text-slate-400 ml-2 text-sm">{p.age} rokov</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>startEdit(p)} className="text-blue-400 hover:text-blue-300 text-sm">✏️ Upraviť</button>
                            <button onClick={()=>{if(confirm(`Odstrániť hráča ${p.name}?`))dp({type:'DEL_P',id:p.id})}}
                                className="text-red-400 hover:text-red-300 text-sm">🗑️ Odstrániť</button>
                        </div>
                    </div>
                ))}
            </div>}
        </div>
    );
}

// ════════════ SETUP SCREEN ════════════
function SetupScreen(){
    const {st,dp}=use$();
    const [p1id,setP1]=useState(st.p1?.id||'');
    const [p2id,setP2]=useState(st.p2?.id||'');
    const [diff,setDiff]=useState(st.diff);
    const [date,setDate]=useState(st.gameDate);

    const canStart = p1id && p2id && p1id!==p2id;
    const start=()=>{
        const pl1=st.players.find(p=>p.id===+p1id);
        const pl2=st.players.find(p=>p.id===+p2id);
        if(!pl1||!pl2) return;
        dp({type:'SETUP',d:{p1:{id:pl1.id,name:pl1.name},p2:{id:pl2.id,name:pl2.name},diff,gameDate:date}});
        dp({type:'START_GAME'});
    };

    return (
        <div className="max-w-lg mx-auto p-6">
            <button onClick={()=>dp({type:'NAV',to:'home'})} className="text-slate-400 hover:text-white mb-4 flex items-center gap-1">← Späť</button>
            <h2 className="text-3xl font-bold mb-6">🎮 Nastavenie hry</h2>
            {st.players.length<2 ? (
                <Card>
                    <p className="text-slate-400 mb-3">Na hru sú potrební minimálne 2 hráči.</p>
                    <Btn cls="bg-accent text-black" onClick={()=>dp({type:'NAV',to:'players'})}>Pridať hráčov</Btn>
                </Card>
            ) : (
                <Card cls="space-y-5">
                    <div>
                        <label className="block text-sm text-slate-400 mb-1">Dátum</label>
                        <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                            className="w-full bg-card2 rounded-lg px-3 py-2 outline-none focus:ring-2 ring-accent"/>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm text-slate-400 mb-1">🔵 Hráč 1</label>
                            <select value={p1id} onChange={e=>setP1(e.target.value)}
                                className="w-full bg-card2 rounded-lg px-3 py-2 outline-none focus:ring-2 ring-accent">
                                <option value="">– Vyber –</option>
                                {st.players.map(p=><option key={p.id} value={p.id}>{p.name} ({p.age}r)</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm text-slate-400 mb-1">🔴 Hráč 2</label>
                            <select value={p2id} onChange={e=>setP2(e.target.value)}
                                className="w-full bg-card2 rounded-lg px-3 py-2 outline-none focus:ring-2 ring-accent">
                                <option value="">– Vyber –</option>
                                {st.players.map(p=><option key={p.id} value={p.id}>{p.name} ({p.age}r)</option>)}
                            </select>
                        </div>
                    </div>
                    {p1id && p2id && p1id===p2id && <p className="text-red-400 text-sm">Vyber rôznych hráčov!</p>}
                    <div>
                        <label className="block text-sm text-slate-400 mb-2">Obtiažnosť</label>
                        <div className="flex gap-2">
                            {Object.entries(DIFF_LABELS).map(([k,v])=>(
                                <button key={k} onClick={()=>setDiff(k)}
                                    className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${diff===k?'bg-accent text-black':'bg-card2 hover:bg-slate-600'}`}>
                                    {v}
                                </button>
                            ))}
                        </div>
                    </div>
                    <Btn cls="w-full bg-accent text-black hover:bg-yellow-400 text-lg py-3" onClick={start} disabled={!canStart}>
                        🚀 Štart hry
                    </Btn>
                </Card>
            )}
        </div>
    );
}

// ════════════ GAME SCREEN ════════════
function GameScreen(){
    const {st,dp}=use$();
    const isTB = st.round==='tiebreaker';

    const chooser = st.active===1?2:1; // who picks category in Round 3

    // ── Header ──
    const header = (
        <div className="bg-card border-b border-slate-700 px-4 py-3 flex items-center justify-between">
            <div className="flex items-center gap-4">
                <button onClick={()=>{if(confirm('Ukončiť hru? Výsledky sa neuložia.'))dp({type:'END_GAME'})}}
                    className="text-slate-400 hover:text-white text-sm">✕ Ukončiť</button>
                <div>
                    <span className="text-accent font-bold">Kolo {typeof st.round==='number'?st.round+'/3':''}: {ROUND_NAMES[st.round]}</span>
                    <span className="text-slate-400 ml-3">Otázka {st.qNum+1}/5</span>
                </div>
            </div>
            <span className="text-sm text-slate-400">{DIFF_LABELS[st.diff]}</span>
        </div>
    );

    // ── Player Cards ──
    const playerCard = (num, name, score, isActive) => (
        <div className={`rounded-xl p-4 border-2 transition-all duration-300 ${
            isActive ? (num===1?'border-p1 bg-blue-950/50 shadow-lg shadow-blue-500/20':'border-p2 bg-red-950/50 shadow-lg shadow-red-500/20')
            : 'border-slate-700 bg-card'}`}>
            <div className="flex items-center gap-2 mb-2">
                <span className={`w-3 h-3 rounded-full ${num===1?'bg-p1':'bg-p2'} ${isActive?'animate-pulse':''}`}/>
                <span className="font-semibold">{name}</span>
                {isActive && <span className="text-xs bg-accent/20 text-accent px-2 py-0.5 rounded">AKTÍVNY</span>}
            </div>
            <div className={`text-4xl font-black ${score<0?'text-red-400':num===1?'text-p1':'text-p2'}`}>{score}</div>
            <div className="text-xs text-slate-500 mt-1">bodov</div>
            {!isTB && !st.answered && (
                <div className="flex gap-2 mt-3">
                    {!isActive && st.round===1 && <Btn cls="bg-card2 hover:bg-slate-600 text-xs py-1 px-2"
                        onClick={()=>dp({type:'SET_ACTIVE',p:num})}>Odpovedá</Btn>}
                    <Btn cls="bg-ok/20 text-ok hover:bg-ok/30 text-xs py-1 px-2"
                        onClick={()=>{dp({type:'CORRECT',p:num});SFX.correct();}} disabled={!isActive && st.round!==1}>✓</Btn>
                    <Btn cls="bg-err/20 text-err hover:bg-err/30 text-xs py-1 px-2"
                        onClick={()=>{dp({type:'WRONG',p:num});SFX.wrong();}} disabled={!isActive && st.round!==1}>✗</Btn>
                </div>
            )}
        </div>
    );

    // ── Timer Display ──
    const timerColor = st.tSec<=3 ? 'text-red-400' : st.tSec<=6 ? 'text-yellow-400' : 'text-white';

    // ── Category Picker (Round 3) ──
    const catPicker = st.round===3 && !st.selCat && (
        <Card cls="mt-4">
            <p className="text-sm text-slate-400 mb-3">
                <span className={`font-bold ${chooser===1?'text-p1':'text-p2'}`}>
                    {chooser===1?st.p1.name:st.p2.name}
                </span> vyberá kategóriu pre{' '}
                <span className={`font-bold ${st.active===1?'text-p1':'text-p2'}`}>
                    {st.active===1?st.p1.name:st.p2.name}
                </span>
            </p>
            <div className="grid grid-cols-3 gap-2">
                {getCats(st.diff).map(c=>(
                    <Btn key={c} cls="bg-card2 hover:bg-accent hover:text-black text-sm py-2"
                        onClick={()=>dp({type:'SEL_CAT',cat:c})}>
                        {CAT_LABELS[c]||c}
                    </Btn>
                ))}
            </div>
        </Card>
    );

    // ── Tiebreaker UI ──
    const tbUI = isTB && st.curQ && (
        <Card cls="mt-4 space-y-4">
            <div className="text-center">
                <span className="text-accent font-bold text-lg">⚡ Rozstrel</span>
                <p className="text-slate-400 text-sm mt-1">Oba hráči zadajú číselnú odpoveď. Najbližšia k správnej odpovedi vyhráva.</p>
            </div>
            <div className="bg-card2 rounded-lg p-4">
                <p className="text-slate-400 text-xs mb-1">{CAT_LABELS[st.curQ.category]||st.curQ.category}</p>
                <p className="text-xl font-semibold">{st.curQ.question}</p>
            </div>
            <div className="grid grid-cols-2 gap-4">
                <div>
                    <label className="text-p1 text-sm font-semibold block mb-1">{st.p1.name}</label>
                    <input type="number" value={st.tb1} onChange={e=>dp({type:'TB_GUESS',p:1,v:e.target.value})}
                        className="w-full bg-card2 rounded-lg px-3 py-2 outline-none focus:ring-2 ring-p1 text-lg"/>
                </div>
                <div>
                    <label className="text-p2 text-sm font-semibold block mb-1">{st.p2.name}</label>
                    <input type="number" value={st.tb2} onChange={e=>dp({type:'TB_GUESS',p:2,v:e.target.value})}
                        className="w-full bg-card2 rounded-lg px-3 py-2 outline-none focus:ring-2 ring-p2 text-lg"/>
                </div>
            </div>
            <Btn cls="w-full bg-accent text-black hover:bg-yellow-400 py-3"
                onClick={()=>{dp({type:'TB_RESOLVE'});SFX.fanfare();}}
                disabled={!st.tb1||!st.tb2}>
                🏆 Vyhodnotiť rozstrel
            </Btn>
            {st.revealed && <p className="text-center text-slate-400">Správna odpoveď: <span className="text-accent font-bold">{st.curQ.answer}</span></p>}
        </Card>
    );

    // ── Question Area ──
    const questionArea = !isTB && st.curQ && (
        <Card cls="mt-4">
            <div className="flex items-center justify-between mb-2">
                <span className="text-accent text-xs font-semibold uppercase tracking-wider">{CAT_LABELS[st.curQ.category]||st.curQ.category}</span>
                <span className="text-xs text-slate-500">{st.curQ.type==='complete_sentence'?'Doplňovačka':st.curQ.type==='complete_name'?'Doplňte meno':st.curQ.type==='anagram'?'Presmyčka':''}</span>
            </div>
            <p className="text-xl font-semibold mb-4 leading-relaxed">{st.curQ.question}</p>
            <div className="bg-card2 rounded-lg p-3">
                {st.revealed ? (
                    <p className="text-ok font-bold text-lg">✓ {st.curQ.answer}</p>
                ) : (
                    <button onClick={()=>dp({type:'REVEAL'})} className="text-slate-400 hover:text-white transition-colors">
                        🔒 Klikni pre zobrazenie odpovede
                    </button>
                )}
            </div>
        </Card>
    );

    // ── Controls ──
    const controls = !isTB && (
        <div className="mt-4 space-y-3">
            {/* Point value */}
            <div className="flex items-center gap-2">
                <span className="text-sm text-slate-400 w-16">Body:</span>
                <div className="flex gap-1">
                    {PTS.map(v=>(
                        <button key={v} onClick={()=>dp({type:'SET_PTS',v})}
                            className={`w-12 h-10 rounded-lg font-bold text-sm transition-all ${
                                st.pts===v?'bg-accent text-black scale-105':'bg-card hover:bg-card2'}`}>
                            {v}
                        </button>
                    ))}
                </div>
            </div>
            {/* Timer */}
            <div className="flex items-center gap-3">
                <span className="text-sm text-slate-400 w-16">Čas:</span>
                <span className={`text-3xl font-black w-16 text-center ${timerColor}`}>{st.tSec}</span>
                {!st.tRun ? (
                    <Btn cls="bg-ok/20 text-ok hover:bg-ok/30" onClick={()=>dp({type:'T_START'})} disabled={st.answered}>▶ Štart</Btn>
                ) : (
                    <Btn cls="bg-err/20 text-err hover:bg-err/30" onClick={()=>dp({type:'T_STOP'})}>⏸ Stop</Btn>
                )}
            </div>
            {/* Action buttons */}
            <div className="flex flex-wrap gap-2">
                {!st.passed && !st.answered && (
                    <Btn cls="bg-purple-600/30 text-purple-300 hover:bg-purple-600/50" onClick={()=>dp({type:'PASS'})}>
                        ↔ Postúpiť súperovi
                    </Btn>
                )}
                <Btn cls="bg-slate-600/30 text-slate-300 hover:bg-slate-600/50" onClick={()=>{dp({type:'NO_POINTS'})}}
                    disabled={st.answered}>
                    ⊘ Bez bodov
                </Btn>
                <Btn cls="bg-accent/20 text-accent hover:bg-accent/30" onClick={()=>dp({type:'NEXT_Q'})}
                    disabled={!st.answered && !st.passed}>
                    Ďalšia otázka →
                </Btn>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen flex flex-col">
            {header}
            <div className="flex-1 p-4 max-w-4xl mx-auto w-full">
                {/* Score cards */}
                <div className="grid grid-cols-2 gap-4">
                    {playerCard(1, st.p1?.name, st.s1, st.active===1)}
                    {playerCard(2, st.p2?.name, st.s2, st.active===2)}
                </div>
                {/* Category picker for Round 3 */}
                {catPicker}
                {/* Question */}
                {questionArea}
                {/* Tiebreaker */}
                {tbUI}
                {/* Controls */}
                {st.curQ && controls}
            </div>
        </div>
    );
}

// ════════════ RESULTS SCREEN ════════════
function ResultsScreen(){
    const {st,dp}=use$();
    const [saved,setSaved]=useState(false);
    const winnerName = st.winner===1?st.p1?.name:st.p2?.name;

    const doSave=()=>{ dp({type:'SAVE'}); setSaved(true); SFX.fanfare(); };

    return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6">
            <div className="text-6xl mb-4">🏆</div>
            <h2 className="text-4xl font-black text-accent mb-2">Víťaz: {winnerName}!</h2>
            <div className="flex gap-8 my-6">
                <div className="text-center">
                    <div className={`text-sm ${st.winner===1?'text-accent':'text-slate-400'}`}>{st.p1?.name}</div>
                    <div className={`text-5xl font-black ${st.winner===1?'text-p1':'text-slate-500'}`}>{st.s1}</div>
                </div>
                <div className="text-slate-600 text-3xl font-bold self-center">:</div>
                <div className="text-center">
                    <div className={`text-sm ${st.winner===2?'text-accent':'text-slate-400'}`}>{st.p2?.name}</div>
                    <div className={`text-5xl font-black ${st.winner===2?'text-p2':'text-slate-500'}`}>{st.s2}</div>
                </div>
            </div>
            <div className="flex gap-3 mt-4">
                {!saved ? (
                    <Btn cls="bg-ok text-white hover:bg-green-600 py-3 px-6" onClick={doSave}>💾 Uložiť výsledok</Btn>
                ) : (
                    <span className="text-ok font-semibold">✓ Výsledok uložený</span>
                )}
                <Btn cls="bg-card hover:bg-card2 border border-slate-600 py-3 px-6" onClick={()=>dp({type:'NAV',to:'setup'})}>🔄 Nová hra</Btn>
                <Btn cls="bg-card hover:bg-card2 border border-slate-600 py-3 px-6" onClick={()=>dp({type:'END_GAME'})}>🏠 Domov</Btn>
            </div>
        </div>
    );
}

// ════════════ LEADERBOARD SCREEN ════════════
function LeaderboardScreen(){
    const {st,dp}=use$();
    const [filterDiff,setFilter]=useState('all');

    const filtered = filterDiff==='all' ? st.history : st.history.filter(h=>h.diff===filterDiff);

    // Count wins per player
    const wins = {};
    filtered.forEach(h=>{
        const w = h.winner;
        wins[w] = (wins[w]||0) + 1;
    });
    const sorted = Object.entries(wins).sort((a,b)=>b[1]-a[1]);

    const exportXLS=()=>{
        const data = sorted.map(([name,count],i)=>({'Poradie':i+1,'Hráč':name,'Víťazstvá':count}));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Rebríček');
        XLSX.writeFile(wb, `DUEL_Rebricek_${new Date().toISOString().slice(0,10)}.xlsx`);
    };

    return (
        <div className="max-w-xl mx-auto p-6">
            <button onClick={()=>dp({type:'NAV',to:'home'})} className="text-slate-400 hover:text-white mb-4 flex items-center gap-1">← Späť</button>
            <div className="flex items-center justify-between mb-6">
                <h2 className="text-3xl font-bold">🏆 Rebríček</h2>
                {sorted.length>0 && <Btn cls="bg-ok/20 text-ok hover:bg-ok/30 text-sm" onClick={exportXLS}>📥 Excel</Btn>}
            </div>
            {/* Filter */}
            <div className="flex gap-2 mb-4">
                <button onClick={()=>setFilter('all')} className={`px-3 py-1 rounded-lg text-sm ${filterDiff==='all'?'bg-accent text-black':'bg-card2 hover:bg-slate-600'}`}>Všetky</button>
                {Object.entries(DIFF_LABELS).map(([k,v])=>(
                    <button key={k} onClick={()=>setFilter(k)} className={`px-3 py-1 rounded-lg text-sm ${filterDiff===k?'bg-accent text-black':'bg-card2 hover:bg-slate-600'}`}>{v}</button>
                ))}
            </div>
            {sorted.length===0 ? <p className="text-slate-500 text-center py-8">Žiadne výsledky.</p> : (
                <div className="space-y-2">
                    {sorted.map(([name,count],i)=>(
                        <div key={name} className="bg-card rounded-lg p-3 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className={`text-2xl font-black w-10 text-center ${i===0?'text-yellow-400':i===1?'text-slate-300':i===2?'text-orange-400':'text-slate-500'}`}>
                                    {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'.'}
                                </span>
                                <span className="font-semibold">{name}</span>
                            </div>
                            <span className="text-accent font-bold text-lg">{count} {count===1?'výhra':count<5?'výhry':'výhier'}</span>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

// ════════════ HISTORY SCREEN ════════════
function HistoryScreen(){
    const {st,dp}=use$();
    return (
        <div className="max-w-2xl mx-auto p-6">
            <button onClick={()=>dp({type:'NAV',to:'home'})} className="text-slate-400 hover:text-white mb-4 flex items-center gap-1">← Späť</button>
            <div className="flex items-center justify-between mb-6">
                <h2 className="text-3xl font-bold">📋 História hier</h2>
                {st.history.length>0 && (
                    <Btn cls="bg-err/20 text-err hover:bg-err/30 text-sm"
                        onClick={()=>{if(confirm('Vymazať celú históriu?'))dp({type:'CLR_HIST'})}}>🗑️ Vymazať všetko</Btn>
                )}
            </div>
            {st.history.length===0 ? <p className="text-slate-500 text-center py-8">Žiadne odohrané hry.</p> : (
                <div className="space-y-2">
                    {[...st.history].reverse().map(h=>(
                        <div key={h.id} className="bg-card rounded-lg p-4">
                            <div className="flex items-center justify-between mb-1">
                                <span className="text-sm text-slate-400">{h.date} · {DIFF_LABELS[h.diff]||h.diff}</span>
                                <button onClick={()=>dp({type:'DEL_HIST',id:h.id})} className="text-slate-500 hover:text-red-400 text-xs">✕</button>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className={`font-semibold ${h.winner===h.p1.name?'text-accent':''}`}>{h.p1.name}</span>
                                <span className="text-p1 font-bold">{h.s1}</span>
                                <span className="text-slate-600">:</span>
                                <span className="text-p2 font-bold">{h.s2}</span>
                                <span className={`font-semibold ${h.winner===h.p2.name?'text-accent':''}`}>{h.p2.name}</span>
                                <span className="ml-auto text-accent text-sm">🏆 {h.winner}</span>
                            </div>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

// ════════════ SETTINGS SCREEN ════════════
function SettingsScreen(){
    const {st,dp}=use$();
    const [timer,setTimer]=useState(st.settings.timer);

    return (
        <div className="max-w-lg mx-auto p-6">
            <button onClick={()=>dp({type:'NAV',to:'home'})} className="text-slate-400 hover:text-white mb-4 flex items-center gap-1">← Späť</button>
            <h2 className="text-3xl font-bold mb-6">⚙️ Nastavenia</h2>
            <Card cls="space-y-5">
                <div>
                    <label className="text-sm text-slate-400 block mb-2">Dĺžka časovača (sekundy)</label>
                    <div className="flex items-center gap-3">
                        <input type="range" min="5" max="30" value={timer} onChange={e=>setTimer(+e.target.value)}
                            className="flex-1 accent-yellow-400"/>
                        <span className="text-accent font-bold w-10 text-center">{timer}s</span>
                    </div>
                    <Btn cls="bg-accent text-black hover:bg-yellow-400 mt-2 text-sm" onClick={()=>dp({type:'UPD_SETTINGS',s:{timer}})}>Uložiť</Btn>
                </div>
                <div className="flex items-center justify-between">
                    <span>Zvukové efekty</span>
                    <button onClick={()=>dp({type:'UPD_SETTINGS',s:{sound:!st.settings.sound}})}
                        className={`w-14 h-7 rounded-full transition-colors ${st.settings.sound?'bg-ok':'bg-slate-600'} relative`}>
                        <span className={`absolute top-0.5 w-6 h-6 bg-white rounded-full transition-transform ${st.settings.sound?'left-7':'left-0.5'}`}/>
                    </button>
                </div>
                <div className="pt-4 border-t border-slate-700">
                    <p className="text-sm text-slate-400 mb-1">Databáza otázok</p>
                    <p className="text-lg font-bold">{QUESTIONS_DB.length} otázok</p>
                    <p className="text-xs text-slate-500">
                        Junior: {QUESTIONS_DB.filter(q=>q.difficulty==='junior').length} ·
                        Level 1: {QUESTIONS_DB.filter(q=>q.difficulty==='level1').length} ·
                        Level 2: {QUESTIONS_DB.filter(q=>q.difficulty==='level2').length}
                    </p>
                </div>
            </Card>
        </div>
    );
}

// ════════════ APP ════════════
function App(){
    const {st}=use$();
    switch(st.screen){
        case 'home': return <HomeScreen/>;
        case 'players': return <PlayersScreen/>;
        case 'setup': return <SetupScreen/>;
        case 'game': return <GameScreen/>;
        case 'results': return <ResultsScreen/>;
        case 'leaderboard': return <LeaderboardScreen/>;
        case 'hist': return <HistoryScreen/>;
        case 'settings': return <SettingsScreen/>;
        default: return <HomeScreen/>;
    }
}

// ════════════ RENDER ════════════
ReactDOM.createRoot(document.getElementById('root')).render(
    <Provider><App/></Provider>
);
    </script>
</body>
