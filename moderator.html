function pickRoundCats(diff,scope,n=10){
    let base;
    if(scope&&scope.startsWith('group:')){
      const gid=+scope.split(':')[1];
      base=[...new Set(QUESTIONS_DB.filter(q=>q.group===gid&&q.type!=='tiebreaker').map(q=>q.category))];

  _subs:{},
  listen(k,cb){
    if(this._subs[k])return;
    this._subs[k]=db.collection('quiz_data').doc(k).onSnapshot(snap=>{
      if(!snap.exists){
        /* Firestore empty → bootstrap from localStorage */
        const local=this.g(k);
        if(local&&(Array.isArray(local)?local.length>0:Object.keys(local).length>0)){
          console.log('[Cloud] Bootstrap: pushing local',k,'to Firestore');

      if(d&&d.value!==undefined){
        console.log('[Cloud] Received:',k);
        try{localStorage.setItem('duel_'+k,JSON.stringify(d.value))}catch(e){}
        if(cb)cb(d.value);

    },e=>console.warn('[Cloud] Listen error:',k,e));

const SFX=(()=>{
let c=null;
const i=()=>{if(!c)c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==='suspended')c.resume();return c};
const osc=(freq,type,dur,vol=.15,t=0)=>{
    const x=i(),o=x.createOscillator(),g=x.createGain();
    o.connect(g);g.connect(x.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,x.currentTime+t);
    g.gain.exponentialRampToValueAtTime(.001,x.currentTime+t+dur);
    o.start(x.currentTime+t);o.stop(x.currentTime+t+dur);
};
return{
    enabled:true,
    tick(){if(!this.enabled)return;osc(880,'sine',.06,.12)},
    tickLow(){if(!this.enabled)return;osc(440,'sine',.12,.25)},

    wrong(){if(!this.enabled)return;const x=i(),o=x.createOscillator(),g=x.createGain();

    fanfare(){if(!this.enabled)return;[392,494,587,784,1047].forEach((f,j)=>osc(f,'triangle',.45,.2,j*.13))},

        [523,659,784,1047].forEach((f,k)=>osc(f,'sine',1.2,.2,5+k*.04));
        [262,330,392].forEach(f=>osc(f,'triangle',1.2,.1,5));
    },
    roundEnd(){if(!this.enabled)return;
        [523,659,784,1047,1319].forEach((f,j)=>osc(f,'sine',.35,.16,j*.12));
        [523,784,1047].forEach(f=>osc(f,'sine',.9,.14,.7));
        [262,392].forEach(f=>osc(f,'triangle',.9,.08,.7));
    },
    winner(){if(!this.enabled)return;
        const m=[[523,.18],[523,.1],[523,.1],[659,.28],[587,.18],[659,.18],[784,.45]];
        let t=0;m.forEach(([f,d])=>{osc(f,'sine',d+.1,.22,t);osc(f/2,'triangle',d+.1,.1,t);t+=d+.04});
        [523,659,784,1047].forEach(f=>{osc(f,'sine',1.5,.17,t);osc(f/2,'triangle',1.5,.08,t)});
        /* Applause effect – white noise bursts */
        this.applause(.8,t+.3);
    },
    applause(dur=1.5,delay=0){if(!this.enabled)return;
        const x=i(),buf=x.createBuffer(1,x.sampleRate*dur,x.sampleRate),d=buf.getChannelData(0);
        for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*(.15+.1*Math.sin(j/800));
        const src=x.createBufferSource(),g=x.createGain(),f=x.createBiquadFilter();
        src.buffer=buf;f.type='bandpass';f.frequency.value=3000;f.Q.value=.5;

        g.gain.setValueAtTime(.18,x.currentTime+delay+dur-.3);
        g.gain.linearRampToValueAtTime(0,x.currentTime+delay+dur);

const TTS=(()=>{

        _vc=vs.find(v=>/^sk/i.test(v.lang)&&/female|žen|zen|woman|zuzana/i.test(v.name))

            ||vs.find(v=>/^cs/i.test(v.lang))
            ||null;
    } else {
        _vc=vs.find(v=>/^sk/i.test(v.lang)&&/male|mu[zž]/i.test(v.name)&&!/female/i.test(v.name))
            ||vs.find(v=>/^sk/i.test(v.lang))
            ||vs.find(v=>/^cs/i.test(v.lang)&&/male|mu[zž]|zden[eě]k/i.test(v.name)&&!/female/i.test(v.name))

if(typeof speechSynthesis!=='undefined'){
    speechSynthesis.onvoiceschanged=()=>{_vc=null;_pick()};
    try{speechSynthesis.getVoices();_pick()}catch(e){}
}
const speak=(text)=>{
    if(!_on||!text)return;
    /* Stop any running audio/speech */
    _stopCurrent();
    const u=new SpeechSynthesisUtterance(text);
    const v=_pick();if(v)u.voice=v;
    u.lang='sk-SK';u.rate=0.92;u.pitch=0.8;u.volume=1;

};
const after=(fn,ms=2000)=>{_cancelTimer();_tmr=setTimeout(()=>{const t=typeof fn==='function'?fn():fn;speak(t)},ms)};
const _cancelTimer=()=>{if(_tmr){clearTimeout(_tmr);_tmr=null}};
const _stopCurrent=()=>{
    _cancelTimer();
    if(typeof speechSynthesis!=='undefined')speechSynthesis.cancel();
    if(_audio){try{_audio.pause();_audio.currentTime=0}catch(e){}_audio=null}
};
const stop=_stopCurrent;
return{get enabled(){return _on},set enabled(v){_on=!!v;if(!v)stop()},speak,after,stop,cancel:_cancelTimer,
    setGender(g){_gender=g||'male';_vc=null;_pick()}};
})();

function getRecentUsedIds(){

const ids=new Set();
hist.slice(-10).forEach(h=>{if(h.usedQIds)h.usedQIds.forEach(id=>ids.add(id))});
return ids;
}
function _scopeFilter(scope){
  if(scope==='mix')return ()=>true;
  if(scope&&scope.startsWith('group:')){
    const gid=+scope.split(':')[1];
    return q=>q.group===gid;
  }
  return q=>q.scope===scope;
}
function pickQ(diff,usedIds,cat=null,type=null,scope='sk'){
const _sf=_scopeFilter(scope);
/* Primárny pool: správna obtiažnosť + nepoužité */
let pool=QUESTIONS_DB.filter(q=>q.difficulty===diff&&_sf(q)&&!usedIds.has(q.id)&&(cat?q.category===cat:true)&&(type?q.type===type:q.type!=='tiebreaker'));
/* Ak v danej obtiažnosti nie sú, skús ľubovoľnú obtiažnosť (ale stále nepoužité!) */
if(!pool.length)pool=QUESTIONS_DB.filter(q=>_sf(q)&&!usedIds.has(q.id)&&(cat?q.category===cat:true)&&(type?q.type===type:q.type!=='tiebreaker'));
if(!pool.length){console.warn('[QUIZ] Žiadne nové otázky pre:',{diff,cat,type,scope});return null;}
return pool[Math.floor(Math.random()*pool.length)];
}
function getCats(diff,round,roundCats,scope){
const _sf=_scopeFilter(scope);
if(roundCats&&roundCats.length)return roundCats.filter(c=>QUESTIONS_DB.some(q=>q.difficulty===diff&&q.category===c&&_sf(q)&&q.type!=='tiebreaker'));
if(scope&&scope.startsWith('group:')){
  const gid=+scope.split(':')[1];
  const cats=[...new Set(QUESTIONS_DB.filter(q=>q.group===gid&&q.type!=='tiebreaker').map(q=>q.category))];
  return cats.filter(c=>QUESTIONS_DB.some(q=>q.difficulty===diff&&q.category===c&&_sf(q)&&q.type!=='tiebreaker'));
}
const base=scope==='mix'?[...new Set([...SK_CATS,...SVET_CATS])]:(SCOPE_CATS[scope||'sk']||SK_CATS);
return base.filter(c=>QUESTIONS_DB.some(q=>q.difficulty===diff&&q.category===c&&_sf(q)&&q.type!=='tiebreaker'));
}

const s={...st.settings,...a.s};S.s('settings',s);SFX.enabled=s.sound;
if(a.s.theme!==undefined)applyTheme(a.s.theme);
return{...st,settings:s}}
case 'DEL_HIST':{const h=st.history.filter(x=>x.id!==a.id);S.s('history',h);return{...st,history:h}}
case 'CLR_HIST':{S.s('history',[]);return{...st,history:[]}}

/* ── JUMP to any round (manual override) ── */
case 'JUMP_ROUND':{
const target=a.round; /* 1, 2, 3, or 'tiebreaker' */
const base={...st,screen:'game',gameOn:true,over:false,winner:null,tbWinner:null,
    showRoundSummary:false,summaryRound:null,tRun:false,tSec:R2_TIMER,r1tRun:false,
    selCat:null,usedCats:[],catQCounts:{},pts:10,revealed:false,answered:false,passing:false};
if(target===1){
    const u2=new Set(st.usedIds),q=pickQ('junior',u2,null,null,st.scope);if(q)u2.add(q.id);
    return{...base,round:1,qNum:0,curQ:q,usedIds:u2,active:1,originalActive:1,
        r1phase:1,r1qCount:0,r1timer:R1_TIME,roundCats:[]}
}
if(target===2){
    const rc2=pickRoundCats(st.diff,st.scope,10);
    return{...base,round:2,qNum:0,curQ:null,active:1,originalActive:1,r1phase:2,r1qCount:0,r1timer:0,roundCats:rc2}
}
if(target===3){
    const rc3=pickRoundCats(st.diff,st.scope,10);
    return{...base,round:3,qNum:0,curQ:null,active:2,originalActive:2,r1phase:2,r1qCount:0,r1timer:0,roundCats:rc3}
}
if(target==='tiebreaker'){
    const u2=new Set(st.usedIds),q=pickQ(st.diff,u2,null,'tiebreaker',st.scope);if(q)u2.add(q.id);
    return{...base,round:'tiebreaker',qNum:0,curQ:q,usedIds:u2,active:1,
        r1phase:2,r1qCount:0,r1timer:0,tb1:'',tb2:''}
}
return st;
}

/* Force end R1 – fallback when auto-advance fails */
case 'FORCE_R1_END':
return{...st,showRoundSummary:true,summaryRound:1,r1tRun:false,curQ:null,answered:false,revealed:false};

/* ── Cloud sync incoming ── */
case '_CLOUD_PLAYERS':return st.gameOn?st:{...st,players:a.v||[]};
case '_CLOUD_HISTORY':return st.gameOn?st:{...st,history:a.v||[]};
case '_CLOUD_SETTINGS':{
    const s=a.v||st.settings;
    SFX.enabled=s.sound;
    if(s.theme!==undefined)applyTheme(s.theme);
    return{...st,settings:s};
}

default:return st;
}
}

/* ═══════════════ GAME SAVE / RESUME ═══════════════ */
const GAME_SAVE_KEY='duel_game_save';
function serializeGameState(st){
  /* Convert Set → Array, strip _undoStack (too big), keep everything else */
  const o={...st, usedIds:[...st.usedIds], _undoStack:[]};
  return JSON.stringify(o);
}
function deserializeGameState(json){
  try{
    const o=JSON.parse(json);
    o.usedIds=new Set(o.usedIds||[]);
    o._undoStack=[];
    /* timers must restart stopped */
    o.tRun=false;o.r1tRun=false;
    return o;
  }catch{return null}
}
function getSavedGame(){
  try{const j=localStorage.getItem(GAME_SAVE_KEY);return j?deserializeGameState(j):null}catch{return null}
}
function clearSavedGame(){try{localStorage.removeItem(GAME_SAVE_KEY)}catch{}}

/* ═══════════════ CONTEXT ═══════════════ */
const Ctx=createContext();
function Provider({children}){
const[st,dp]=useReducer(reducer,init);
const r1Ref=useRef(null);
const timerRef=useRef(null);

/* R1 90-second timer */
useEffect(()=>{
    if(st.r1tRun&&st.round===1){
        r1Ref.current=setInterval(()=>dp({type:'R1_TICK'}),1000);
        return()=>clearInterval(r1Ref.current);
    }else{if(r1Ref.current){clearInterval(r1Ref.current);r1Ref.current=null}}
},[st.r1tRun,st.round]);

/* R1 timer sounds */
useEffect(()=>{
    if(!st.r1tRun||st.round!==1)return;
    if(st.r1timer>5)SFX.tick();else if(st.r1timer>0)SFX.tickLow();else if(st.r1timer===0)SFX.buzzer();
},[st.r1timer,st.r1tRun,st.round]);

/* R2/R3 Timer */
useEffect(()=>{
    if(st.tRun&&st.round!==1){
        timerRef.current=setInterval(()=>dp({type:'T_TICK'}),1000);
        return()=>clearInterval(timerRef.current);
    }else{if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null}}
},[st.tRun,st.round]);

/* R2/R3 Timer sounds */
useEffect(()=>{
    if(!st.tRun||st.round===1)return;
    if(st.tSec>3)SFX.tick();else if(st.tSec>0)SFX.tickLow();else if(st.tSec===0)SFX.buzzer();
},[st.tSec,st.tRun,st.round]);

/* Round-end & winner sounds */
useEffect(()=>{if(st.showRoundSummary){SFX.roundEnd();SFX.applause(1.2,.6)}},[st.showRoundSummary]);
useEffect(()=>{if(st.over)SFX.winner()},[st.over]);
/* Drum roll when tiebreaker starts */
useEffect(()=>{if(st.round==='tiebreaker'&&st.curQ&&!st.revealed)SFX.drumRoll(2)},[st.round,st.curQ?.id]);
/* Auto-clear feedback overlay after 2.5s */
useEffect(()=>{
    if(st.feedback){const t=setTimeout(()=>dp({type:'CLEAR_FEEDBACK'}),2500);return()=>clearTimeout(t)}
},[st.feedback]);

/* TV sync */
useEffect(()=>{
    if(st.testMode)return;
    if(!st.gameOn&&st.screen!=='results'&&!st.showRoundSummary){
        sendTV('WAITING',{});return;
    }
    const r2c=st.settings?.r2count||R2_COUNT_DEFAULT,r3c=st.settings?.r3count||R3_COUNT_DEFAULT;
    const TIMER=st.settings?.timer||R2_TIMER_DEFAULT;
    const allCats=getCats(st.diff,st.round,st.roundCats,st.scope);
    const availCats=allCats.filter(c=>!st.usedCats.includes(c));
    const showQOnTV=(st.round===1&&st.r1tRun)||st.tRun||st.answered||st.passing||st.tSec<TIMER;
    const r3picker=st.round===3?(st.active===1?2:1):st.active;
    const payload={
        screen:st.screen,p1:st.p1,p2:st.p2,s1:st.s1,s2:st.s2,
        round:st.round,roundName:ROUND_NAMES[st.round],
        qNum:st.round===1?st.r1qCount+1:st.qNum+1,
        qTotal:st.round===1?R1_MAX_Q:st.round===2?r2c:r3c,
        q:showQOnTV&&st.curQ?{question:st.curQ.question,category:CAT_LABELS[st.curQ.category]||st.curQ.category,
            catKey:st.curQ.category,type:st.curQ.type,img:st.curQ.img||null}:null,
        answer:st.revealed?st.curQ?.answer:null,
        active:st.active,picker:r3picker,tRun:st.tRun,tSec:st.tSec,tDur:TIMER,
        pts:st.pts,diff:st.diff,
        over:st.over,winner:st.winner,answered:st.answered,
        r1phase:st.r1phase,r1timer:st.r1timer,r1tRun:st.r1tRun,r1Total:R1_TIME,
        selCat:st.selCat,
        showRoundSummary:st.showRoundSummary,summaryRound:st.summaryRound,
        stats:st.stats,categories:availCats,usedCats:st.usedCats,catQCounts:st.catQCounts||{},
        passing:st.passing,originalActive:st.originalActive,
        tb1:st.tb1,tb2:st.tb2,tbWinner:st.tbWinner,tbQ:st.round==='tiebreaker'&&st.curQ?{question:st.curQ.question,answer:st.revealed?st.curQ.answer:null,img:st.curQ.img||null}:null,
        theme:st.settings.theme||'dark',
        feedback:st.feedback,
        scope:st.scope||'sk',
    };
    sendTV('UPDATE',payload);
});

useEffect(()=>{
    SFX.enabled=st.settings.sound;
    applyTheme(st.settings.theme||'dark');
},[]);

/* ── Cloud sync: listen for remote changes ── */
useEffect(()=>{
    console.log('[Cloud] Starting Firestore listeners…');
    S.listen('players',(val)=>{dp({type:'_CLOUD_PLAYERS',v:val})});
    S.listen('history',(val)=>{dp({type:'_CLOUD_HISTORY',v:val})});
    S.listen('settings',(val)=>{dp({type:'_CLOUD_SETTINGS',v:val})});
},[]);

/* ── Auto-save game state to localStorage ── */
useEffect(()=>{
    if(st.gameOn&&!st.testMode){
        try{localStorage.setItem(GAME_SAVE_KEY,serializeGameState(st))}catch(e){console.warn('[Save] Error:',e)}
    }
    /* Clear save when game ends */
    if(!st.gameOn&&st.screen!=='game'){clearSavedGame()}
},[st.gameOn,st.round,st.qNum,st.s1,st.s2,st.answered,st.active,st.selCat,st.showRoundSummary,st.over,st.screen]);

return <Ctx.Provider value={{st,dp}}>{children}</Ctx.Provider>;
}
const use$=()=>useContext(Ctx);

/* ─── REUSABLE ─── */

<button onClick={onClick} disabled={disabled}
    className={`px-4 py-2 rounded-xl font-semibold transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed active:scale-95 ${cls}`}{...p}>{children}</button>
);

        <Card><p style={{color:'var(--textSub)'}} className="mb-3">Minimálne 2 hráči.</p>
        <Btn cls="bg-accent text-black" onClick={()=>dp({type:'NAV',to:'players'})}>Pridať hráčov</Btn></Card>

            <div>
                <label className="block text-sm mb-1" style={{color:'var(--textSub)'}}>Dátum</label>

            </div>
            <div className="grid grid-cols-2 gap-4">
                <div>
                    <label className="block text-sm mb-1" style={{color:'var(--textSub)'}}>🔵 Hráč 1</label>
                    <select value={p1id} onChange={e=>setP1(e.target.value)}
                        className="w-full rounded-xl px-3 py-2 outline-none focus:ring-2 ring-accent" style={{background:'var(--inputBg)',color:'var(--text)'}}>
                        <option value="">– Vyber –</option>
                        {st.players.map(p=><option key={p.id} value={p.id}>{p.name} ({p.age}r)</option>)}
                    </select>
                </div>
                <div>
                    <label className="block text-sm mb-1" style={{color:'var(--textSub)'}}>🔴 Hráč 2</label>
                    <select value={p2id} onChange={e=>setP2(e.target.value)}
                        className="w-full rounded-xl px-3 py-2 outline-none focus:ring-2 ring-accent" style={{background:'var(--inputBg)',color:'var(--text)'}}>
                        <option value="">– Vyber –</option>
                        {st.players.map(p=><option key={p.id} value={p.id}>{p.name} ({p.age}r)</option>)}
                    </select>
                </div>
            </div>
            {p1id&&p2id&&p1id===p2id&&<p className="text-red-400 text-sm">Vyber rôznych hráčov!</p>}
            <div>
                <label className="block text-sm mb-2" style={{color:'var(--textSub)'}}>Rozsah otázok</label>
                <div className="flex gap-2 flex-wrap">
                    <button onClick={()=>setScope('sk')}
                        className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${scope==='sk'?'bg-accent text-black shadow-lg shadow-yellow-500/20':'hover:opacity-80'}`}
                        style={scope!=='sk'?{background:'var(--card2)'}:{}}>🇸🇰 SK</button>
                    <button onClick={()=>setScope('svet')}

                        style={scope!=='svet'?{background:'var(--card2)'}:{}}>🌍 SVET</button>
                    <button onClick={()=>setScope('mix')}
                        className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${scope==='mix'?'bg-accent text-black shadow-lg shadow-yellow-500/20':'hover:opacity-80'}`}
                        style={scope!=='mix'?{background:'var(--card2)'}:{}}>🔀 MIX</button>
                    {groups.length>0&&<button onClick={()=>setScope('group:'+(selGroup||groups[0].id))}
                        className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${isGroupScope?'bg-purple-600 text-white shadow-lg shadow-purple-500/20':'hover:opacity-80'}`}
                        style={!isGroupScope?{background:'var(--card2)'}:{}}>📦 SKUPINA</button>}
                </div>
                {isGroupScope&&(
                  <div className="mt-2">
                    <select value={activeGroupId||''} onChange={e=>setScope('group:'+e.target.value)}
                      className="w-full rounded-xl px-3 py-2 outline-none focus:ring-2 ring-purple-400 text-sm font-semibold" style={{background:'var(--inputBg)',color:'var(--text)'}}>
                      {groups.map(g=><option key={g.id} value={g.id}>📦 {g.name} ({g.cats.length} tém, {QUESTIONS_DB.filter(q=>q.group===g.id).length} otázok)</option>)}
                    </select>
                    {activeGroup&&<p className="text-xs mt-1" style={{color:'var(--textSub)'}}>Témy: {activeGroup.cats.map(c=>c.icon+' '+c.label).join(', ')} · <b>{grpQCount}</b> otázok</p>}
                    {grpQCount<10&&<p className="text-xs text-yellow-400 mt-1">⚠️ Málo otázok v skupine – odporúčame min. 30</p>}
                  </div>
                )}
            </div>
            <div>
                <label className="block text-sm mb-2" style={{color:'var(--textSub)'}}>Počet kôl</label>
                <div className="flex gap-2">
                    {[1,2,3].map(v=>(
                        <button key={v} onClick={()=>setRounds(v)}
                            className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${rounds===v?'bg-accent text-black shadow-lg shadow-yellow-500/20':'hover:opacity-80'}`}
                            style={rounds!==v?{background:'var(--card2)'}:{}}>
                            {v} {v===1?'kolo':'kolá'}</button>
                    ))}
                </div>
                <p className="text-xs mt-1" style={{color:'var(--textSub)'}}>{rounds===1?'Len rýchla runda (90s)':rounds===2?'Rýchla + hlavná runda':'Všetky 3 kolá'}</p>
            </div>
            <div>
                <label className="block text-sm mb-2" style={{color:'var(--textSub)'}}>Hlas moderátora (TTS)</label>
                <div className="flex gap-2">
                    <button onClick={()=>setVoiceGender('male')}
                        className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${voiceGender==='male'?'bg-blue-600 text-white shadow-lg':'hover:opacity-80'}`}
                        style={voiceGender!=='male'?{background:'var(--card2)'}:{}}>🧑 Mužský</button>
                    <button onClick={()=>setVoiceGender('female')}
                        className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${voiceGender==='female'?'bg-pink-600 text-white shadow-lg':'hover:opacity-80'}`}
                        style={voiceGender!=='female'?{background:'var(--card2)'}:{}}>👩 Ženský</button>
                </div>
            </div>
            <div>
                <label className="block text-sm mb-2" style={{color:'var(--textSub)'}}>Obtiažnosť (kolo 2 a 3)</label>
                <div className="flex gap-2">
                    {Object.entries(DIFF_LABELS).map(([k,v])=>(
                        <button key={k} onClick={()=>setDiff(k)}
                            className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${diff===k?'bg-accent text-black shadow-lg shadow-yellow-500/20':'hover:opacity-80'}`}
                            style={diff!==k?{background:'var(--card2)'}:{}}>{v}</button>
                    ))}
                </div>
            </div>
            <div className="flex gap-3">
                <Btn cls="flex-1 bg-gradient-to-r from-yellow-500 to-amber-500 text-black hover:from-yellow-400 hover:to-amber-400 text-lg py-3 shadow-lg shadow-yellow-500/20" onClick={()=>doStart(false)} disabled={!canStart}>
                    🚀 Štart hry</Btn>
                <Btn cls="bg-purple-600 text-white hover:bg-purple-500 py-3 px-5" onClick={()=>doStart(true)} disabled={!canStart}>
                    🧪 Test</Btn>
            </div>

        </Card>
    )}
</div>
);
}

/* ════════════ CATEGORY GRID (R2/R3) ════════════ */
function CategoryGrid({cats,onPick,activePlayer,answererName,isR3,catQCounts}){
return(
<div>
    <p className="text-center mb-4">
        <span className={`font-bold text-xl ${activePlayer===1?'text-p1':'text-p2'}`}>
            {activePlayer===1?'🔵':'🔴'} {activePlayer===1?'Hráč 1':'Hráč 2'}
        </span>
        <span style={{color:'var(--textSub)'}} className="ml-2 text-lg">{isR3?'🎯 vyberá okruh pre':'🎯 vyberá okruh'}</span>
        {isR3&&answererName&&<span className={`font-bold text-xl ml-2 px-3 py-1 rounded-xl ${activePlayer===1?'bg-red-500/20 text-p2':'bg-blue-500/20 text-p1'}`}>➡️ {answererName}</span>}
    </p>
    {cats.length===0?<p className="text-center text-accent text-lg font-bold py-8">Všetky okruhy boli použité!</p>:
    <div className="grid grid-cols-2 gap-3">
        {cats.map(c=>{
            const used=catQCounts?.[c]||0;
            const remaining=isR3?R3_Q_PER_CAT-used:1;
            return(
            <button key={c} onClick={()=>onPick(c)}
                className={`cat-card p-5 rounded-2xl border-2 bg-gradient-to-br text-left relative ${CAT_COLORS[c]||'from-slate-500/20 to-slate-600/5 border-slate-500/50'}`}>
                <div className="flex items-center gap-3">
                    <span className="text-3xl">{CAT_ICONS[c]||'❓'}</span>
                    <span className="font-bold text-base">{CAT_LABELS[c]||c}</span>
                </div>
                {isR3&&<span className="absolute top-2 right-3 text-xs font-bold bg-accent/20 text-accent px-2 py-0.5 rounded-lg">
                    {remaining}/{R3_Q_PER_CAT}
                </span>}
            </button>
            );
        })}
    </div>}
</div>
);
}

/* ════════════ EMBEDDED TV (test mode) ════════════ */
function EmbeddedTV(){
const{st}=use$();
const isJunior=st.diff==='junior';
const r2c=st.settings?.r2count||R2_COUNT_DEFAULT,r3c=st.settings?.r3count||R3_COUNT_DEFAULT;
const TIMER=st.settings?.timer||R2_TIMER_DEFAULT;
const qNum=st.round===1?st.r1qCount+1:st.qNum+1;
const qTotal=st.round===1?R1_MAX_Q:st.round===2?r2c:r3c;
const allCats=getCats(st.diff,st.round,st.roundCats,st.scope);
const availCats=allCats.filter(c=>!st.usedCats.includes(c));
const embIsR3=st.round===3;
const embPicker=embIsR3?(st.active===1?2:1):st.active;
const embPickerName=embPicker===1?st.p1?.name:st.p2?.name;
const embAnswererName=st.active===1?st.p1?.name:st.p2?.name;
const embShowQ=(st.round===1&&st.r1tRun)||st.tRun||st.answered||st.passing||st.tSec<TIMER;

if(!st.gameOn&&st.screen!=='results'&&!st.showRoundSummary)return(
    <div className={`h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'}`}>
        <div className="anim-float text-center"><h1 className="text-4xl font-black text-accent">Vedomostný QUIZ 2026</h1></div>
        <p className="text-slate-500 mt-4 text-sm">Čakám na hru…</p>
    </div>
);

/* Round Summary */
if(st.showRoundSummary)return(
    <div className={`h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'}`}>
        <div className="anim-pop text-center">
            <h2 className="text-xl text-slate-400 font-semibold mb-2">Koniec {st.summaryRound}. kola</h2>
            <h3 className="text-2xl font-bold text-accent mb-6">{ROUND_NAMES[st.summaryRound]}</h3>
            <div className="flex items-center justify-center gap-8">
                <div className="text-center">
                    <div className="text-sm text-blue-400 mb-1">{st.p1?.name}</div>
                    <div className="text-5xl font-black text-blue-400">{st.s1}</div>
                </div>
                <div className="text-3xl text-slate-700 font-bold">:</div>
                <div className="text-center">
                    <div className="text-sm text-red-400 mb-1">{st.p2?.name}</div>
                    <div className="text-5xl font-black text-red-400">{st.s2}</div>
                </div>
            </div>
            {st.s1>st.s2&&<p className="mt-4 text-blue-400 font-bold">🔵 {st.p1?.name} vedie!</p>}
            {st.s2>st.s1&&<p className="mt-4 text-red-400 font-bold">🔴 {st.p2?.name} vedie!</p>}
            {st.s1===st.s2&&<p className="mt-4 text-accent font-bold">⚖️ Remíza!</p>}
        </div>
    </div>
);

/* Results */
if(st.over||st.screen==='results'){
    const wn=st.winner===1?st.p1?.name:st.p2?.name;
    const wc=st.winner===1?'text-p1':'text-p2';
    const ts=st.stats;
    const p1tc=ts.r1.p1c+ts.r2.p1c+ts.r3.p1c,p1tw=ts.r1.p1w+ts.r2.p1w+ts.r3.p1w;
    const p2tc=ts.r1.p2c+ts.r2.p2c+ts.r3.p2c,p2tw=ts.r1.p2w+ts.r2.p2w+ts.r3.p2w;
    return(
        <div className={`h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'} overflow-auto`}>
            <div className="anim-pop text-center p-4">
                <div className="text-5xl mb-3">🏆</div>
                <h2 className="text-lg text-slate-400 mb-1">Víťaz súťaže</h2>
                <h1 className={`text-4xl font-black ${wc} mb-4`}>{wn}</h1>
                <div className="flex items-center justify-center gap-8 mb-6">
                    <div className="text-center"><div className="text-xs text-blue-400 mb-1">{st.p1?.name}</div><div className="text-4xl font-black text-blue-400">{st.s1}</div></div>
                    <div className="text-2xl text-slate-700">:</div>
                    <div className="text-center"><div className="text-xs text-red-400 mb-1">{st.p2?.name}</div><div className="text-4xl font-black text-red-400">{st.s2}</div></div>
                </div>
                <table className="mx-auto text-sm border-collapse">
                    <thead><tr className="text-slate-400"><th className="px-3 py-1"></th><th className="px-3 py-1 text-blue-400">{st.p1?.name}</th><th className="px-3 py-1 text-red-400">{st.p2?.name}</th></tr></thead>
                    <tbody>
                        <tr><td className="px-3 py-1 text-slate-500">Správne</td><td className="px-3 py-1 text-green-400 font-bold text-center">{p1tc}</td><td className="px-3 py-1 text-green-400 font-bold text-center">{p2tc}</td></tr>
                        <tr><td className="px-3 py-1 text-slate-500">Nesprávne</td><td className="px-3 py-1 text-red-400 font-bold text-center">{p1tw}</td><td className="px-3 py-1 text-red-400 font-bold text-center">{p2tw}</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    );
}

/* Tiebreaker */
if(st.round==='tiebreaker'&&st.curQ){
    const tbWnName=st.tbWinner===1?st.p1?.name:st.tbWinner===2?st.p2?.name:null;
    if(st.tbWinner)return(
        <div className={`h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'}`}>
            <div className="anim-pop text-center max-w-lg p-4">
                <div className="text-6xl mb-4">🏆</div>
                <h2 className="text-xl text-slate-400 mb-2">Víťaz rozstrelu</h2>
                <h1 className={`text-5xl font-black ${st.tbWinner===1?'text-p1':'text-p2'} mb-4`}>
                    {st.tbWinner===1?'🔵':'🔴'} {tbWnName}!
                </h1>
                {st.revealed&&<p className="text-green-400 font-bold text-lg mb-2">Správna odpoveď: {st.curQ.answer}</p>}
                <div className="flex items-center justify-center gap-6 text-sm text-slate-400">
                    <span>🔵 {st.p1?.name}: {st.tb1}</span>
                    <span>🔴 {st.p2?.name}: {st.tb2}</span>
                </div>
            </div>
        </div>
    );
    return(
    <div className={`h-full flex flex-col items-center justify-center ${isJunior?'junior-bg':'standard-bg'}`}>
        <div className="anim-slide text-center max-w-lg p-4">
            <h2 className="text-2xl font-bold text-accent mb-4">⚡ Rozstrel</h2>
            <div className="bg-black/40 border border-accent/20 rounded-2xl p-6 mb-4">
                <p className="text-2xl font-bold">{st.curQ.question}</p>
                {st.curQ.img&&<div className="mt-3 flex justify-center"><img src={st.curQ.img} alt="" className="max-h-36 rounded-xl" style={{objectFit:'contain'}}/></div>}
            </div>
            {st.revealed&&<p className="text-green-400 font-bold text-lg">Správna odpoveď: {st.curQ.answer}</p>}
        </div>
    </div>
    );
}

/* Category picker TV display */
if((st.round===2||st.round===3)&&!st.selCat)return(
    <div className={`h-full flex flex-col ${isJunior?'junior-bg':'standard-bg'} overflow-auto`}>
        <div className="flex items-center justify-between px-4 py-2 bg-black/30 text-xs">
            <div className="flex items-center gap-2">
                <span className="text-accent font-black text-sm">QUIZ 2026</span>
                <span className="text-slate-500">│</span>
                <span className="text-slate-300">{ROUND_NAMES[st.round]}</span>
            </div>
            <span className="text-slate-400">Otázka {qNum}/{qTotal}</span>
        </div>
        <div className="flex-1 flex flex-col items-center justify-center p-4">
            <p className="text-xl mb-4">
                <span className={`font-bold ${embPicker===1?'text-blue-400':'text-red-400'}`}>
                    {embPickerName}
                </span>
                <span className="text-slate-400 ml-2">{embIsR3?'vyberá okruh pre':'vyberá okruh'}</span>
                {embIsR3&&<span className={`font-bold ml-2 ${st.active===1?'text-blue-400':'text-red-400'}`}>{embAnswererName}</span>}
            </p>
            {availCats.length===0?<p className="text-accent text-xl font-bold py-8">Všetky okruhy použité!</p>:
            <div className="grid grid-cols-2 gap-3 max-w-2xl w-full">
                {availCats.map(c=>{
                    const used=st.catQCounts?.[c]||0;
                    const remaining=embIsR3?R3_Q_PER_CAT-used:1;
                    return(
                    <div key={c} className={`p-5 rounded-2xl border-2 bg-gradient-to-br relative ${CAT_COLORS[c]||'from-slate-500/20 to-slate-600/5 border-slate-500/50'}`}>
                        <div className="flex items-center gap-3">
                            <span className="text-3xl">{CAT_ICONS[c]||'❓'}</span>
                            <span className="font-bold text-lg">{CAT_LABELS[c]||c}</span>
                        </div>
                        {embIsR3&&<span className="absolute top-2 right-3 text-xs font-bold bg-accent/20 text-accent px-2 py-0.5 rounded-lg">
                            {remaining}/{R3_Q_PER_CAT}
                        </span>}
                    </div>
                    );
                })}
            </div>}
        </div>
    </div>
);

/* Active game (question shown) */
const timerFrac=TIMER>0?st.tSec/TIMER:1;
const circ=2*Math.PI*42;
const dashOff=circ*(1-timerFrac);
const tCol=st.tSec<=3?'#ef4444':st.tSec<=6?'#eab308':'#22c55e';
/* R1 timer display */
const r1frac=st.r1timer/R1_TIME;
const r1dashOff=circ*(1-r1frac);
const r1Col=st.r1timer<=10?'#ef4444':st.r1timer<=20?'#eab308':'#22c55e';

return(
    <div className={`h-full flex flex-col ${isJunior?'junior-bg':'standard-bg'} overflow-hidden`}>
        <div className="flex items-center justify-between px-4 py-2 bg-black/30 text-xs">
            <div className="flex items-center gap-2">
                <span className="text-accent font-black text-sm">QUIZ 2026</span>
                <span className="text-slate-500">│</span>
                <span className="text-slate-300">{ROUND_NAMES[st.round]}</span>
            </div>
            <span className="text-slate-400">{st.round===1?`${st.r1phase===1?st.p1?.name:st.p2?.name}`:`Otázka ${qNum}/${qTotal}`}</span>
        </div>
        <div className="flex-1 flex items-center justify-between px-4 py-2 gap-4">
            {/* P1 */}
            <div className={`w-36 rounded-xl border-2 p-3 ${st.active===1?'border-p1 bg-blue-950/50 shadow-lg':'border-slate-800 bg-black/20'}`}>
                {st.active===1&&<div className="text-center mb-1"><span className="text-[10px] font-bold text-p1 animate-pulse">● ODPOVEDÁ</span></div>}
                <div className="text-center mb-1"><h3 className={`text-sm font-bold ${st.active===1?'text-white':'text-slate-400'}`}>{st.p1?.name}</h3></div>
                <div className="text-center"><div className={`text-4xl font-black ${st.s1<0?'text-red-400':'text-p1'}`}>{st.s1}</div></div>
            </div>
            {/* Center */}
            <div className="flex-1 flex flex-col items-center justify-center gap-4 max-w-2xl">
                {/* R1: 90s timer */}
                {st.round===1&&st.r1tRun&&(
                    <div className="relative flex items-center justify-center">
                        <svg width="80" height="80" viewBox="0 0 96 96" className={st.r1timer<=10?'anim-pulse':''}>
                            <circle cx="48" cy="48" r="42" fill="none" stroke="#1e293b" strokeWidth="4"/>
                            <circle cx="48" cy="48" r="42" fill="none" stroke={r1Col} strokeWidth="4"
                                strokeDasharray={circ} strokeDashoffset={r1dashOff} strokeLinecap="round" className="timer-ring" transform="rotate(-90 48 48)"/>
                        </svg>
                        <span className={`absolute text-2xl font-black ${st.r1timer<=10?'text-red-400':'text-white'}`}>{st.r1timer}</span>
                    </div>
                )}
                {/* R2/R3 timer */}
                {st.round!==1&&st.round!=='tiebreaker'&&(st.tRun||st.tSec<TIMER)&&(
                    <div className="relative flex items-center justify-center">
                        <svg width="80" height="80" viewBox="0 0 96 96" className={st.tRun&&st.tSec<=3?'anim-pulse':''}>
                            <circle cx="48" cy="48" r="42" fill="none" stroke="#1e293b" strokeWidth="4"/>
                            <circle cx="48" cy="48" r="42" fill="none" stroke={tCol} strokeWidth="4"
                                strokeDasharray={circ} strokeDashoffset={dashOff} strokeLinecap="round" className="timer-ring" transform="rotate(-90 48 48)"/>
                        </svg>
                        <span className={`absolute text-2xl font-black ${st.tSec<=3?'text-red-400':'text-white'}`}>{st.tSec}</span>
                    </div>
                )}
                {st.round===1&&<div className="text-center text-sm text-slate-400">{st.r1phase===1?st.p1?.name:st.p2?.name} odpovedá · 10 bodov</div>}
                {st.round!==1&&st.curQ&&<div className="flex items-center gap-1"><span className="text-accent font-black text-xl">{st.pts}</span><span className="text-slate-400 text-xs">b</span></div>}
                {st.passing&&<div className="text-center text-yellow-400 font-bold text-sm animate-pulse">⚡ ODPOVEĎ SUPER</div>}
                {embShowQ&&st.curQ?(
                    <div className="anim-slide text-center w-full">
                        <span className={`text-base font-semibold uppercase tracking-widest mb-2 block ${isJunior?'text-purple-400':'text-accent/70'}`}>
                            {CAT_LABELS[st.curQ.category]||st.curQ.category}
                        </span>
                        <div className={`bg-black/40 border ${isJunior?'border-purple-500/30':'border-accent/20'} rounded-2xl p-6`}>
                            <p className="font-bold text-3xl leading-relaxed">{st.curQ.question}</p>
                            {st.curQ.img&&<div className="mt-4 flex justify-center"><img src={st.curQ.img} alt="" className="max-h-40 rounded-xl" style={{objectFit:'contain'}}/></div>}
                        </div>
                    </div>
                ):<div className="text-slate-600 text-base">Čakám na otázku…</div>}
                {st.revealed&&st.curQ&&(
                    <div className="anim-pop"><div className="bg-ok/10 border border-ok/30 rounded-xl px-5 py-3"><span className="text-ok font-bold text-xl">✓ {st.curQ.answer}</span></div></div>
                )}
            </div>
            {/* P2 */}
            <div className={`w-36 rounded-xl border-2 p-3 ${st.active===2?'border-p2 bg-red-950/50 shadow-lg':'border-slate-800 bg-black/20'}`}>

                <div className="text-center mb-1"><h3 className={`text-sm font-bold ${st.active===2?'text-white':'text-slate-400'}`}>{st.p2?.name}</h3></div>
                <div className="text-center"><div className={`text-4xl font-black ${st.s2<0?'text-red-400':'text-p2'}`}>{st.s2}</div></div>
            </div>
        </div>
    </div>
);
}

/* ════════════ GAME SCREEN ════════════ */
function GameScreen(){
/* ═══ ALL HOOKS – MUST be at the very top, NEVER after a conditional return ═══ */
const{st,dp}=use$();
const[ptsConfirmed,setPtsConfirmed]=useState(false);
const[showRoundSwitcher,setShowRoundSwitcher]=useState(false);
const[ttsOn,setTtsOn]=useState(false);
const stRef=useRef(st);stRef.current=st;
const allCats=useMemo(()=>getCats(st.diff,st.round,st.roundCats,st.scope),[st.diff,st.round,st.roundCats,st.scope]);
useEffect(()=>{setPtsConfirmed(false)},[st.qNum,st.round,st.selCat]);
useEffect(()=>{
    TTS.enabled=ttsOn;
    if(ttsOn){/* unlock speech synthesis (Safari) */
        try{const u=new SpeechSynthesisUtterance('');u.volume=0;speechSynthesis.speak(u);speechSynthesis.cancel()}catch(e){}
    }
    return()=>TTS.stop();
},[ttsOn]);
const[showAnswer,setShowAnswer]=useState(false);
useEffect(()=>{setShowAnswer(false)},[st.curQ?.id,st.qNum,st.round]);
/* Keyboard shortcuts */
useEffect(()=>{
    const h=(e)=>{
        if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
        const s=stRef.current;
        const k=e.key;
        if(k==='c'||k==='C'){
            if(s.round===1&&s.r1tRun&&!s.answered){SFX.correct();dp({type:'CORRECT'});dp({type:'NEXT_Q'})}
            else if((s.round===2||s.round===3)&&s.curQ&&!s.answered){SFX.correct();dp({type:'CORRECT'})}
        }else if(k==='n'||k==='N'){
            if(s.round===1&&s.r1tRun&&!s.answered){SFX.wrong();dp({type:'WRONG'});dp({type:'NEXT_Q'})}
            else if((s.round===2||s.round===3)&&s.curQ&&!s.answered){SFX.wrong();dp({type:'WRONG'})}
        }else if(k==='d'||k==='D'){
            if(s.round===1&&s.r1tRun){dp({type:'SKIP'});dp({type:'NEXT_Q'})}
        }else if(k===' '){
            e.preventDefault();
            if(s.round===1&&!s.r1tRun&&s.curQ)dp({type:'R1_START'});
        }else if(k==='ArrowRight'){
            if(s.answered)dp({type:'NEXT_Q'});
        }else if(k==='u'||k==='U'){
            if(s._undoStack?.length)dp({type:'UNDO'});
        }else if(k==='r'||k==='R'){
            if(!s.revealed&&s.curQ)dp({type:'REVEAL'});
        }else if(k==='s'||k==='S'){
            if(!s.passing&&(s.round===2||s.round===3)&&s.curQ&&!s.answered)dp({type:'PASS_SUPER'});
        }else if(k==='a'||k==='A'){
            setShowAnswer(v=>!v);
        }
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
},[]);
/* ═══ END OF HOOKS – no more useState/useEffect/useMemo below this line ═══ */

const openTVWindow=()=>{const L=window.screen.width;window.open('tv.html','QUIZ_TV',`width=1920,height=1080,left=${L},top=0,menubar=no,toolbar=no`)};
const isTB=st.round==='tiebreaker';
const isR1=st.round===1;
const isR2=st.round===2;
const isR3=st.round===3;
const qTotal=isR1?R1_MAX_Q:isR2?(st.settings?.r2count||R2_COUNT_DEFAULT):(st.settings?.r3count||R3_COUNT_DEFAULT);
const qDisplay=isR1?st.r1qCount+1:st.qNum+1;
const availCats=allCats.filter(c=>!st.usedCats.includes(c));

/* ── Handlers ── */
const r1Start=()=>{dp({type:'R1_START'});TTS.speak(st.curQ?.question)};
const r1Correct=()=>{SFX.correct();dp({type:'CORRECT'});dp({type:'NEXT_Q'});
    TTS.after(()=>{const s=stRef.current;return s.round===1&&s.r1tRun?s.curQ?.question:null},1000)};
const r1Wrong=()=>{SFX.wrong();dp({type:'WRONG'});dp({type:'NEXT_Q'});
    TTS.after(()=>{const s=stRef.current;return s.round===1&&s.r1tRun?s.curQ?.question:null},1000)};
const r1Skip=()=>{dp({type:'SKIP'});dp({type:'NEXT_Q'});
    TTS.after(()=>{const s=stRef.current;return s.round===1&&s.r1tRun?s.curQ?.question:null},1000)};
const r2Correct=()=>{SFX.correct();dp({type:'CORRECT'})};
const r2Wrong=()=>{SFX.wrong();dp({type:'WRONG'})};
const r2Super=()=>{TTS.stop();dp({type:'PASS_SUPER'})};
const forceEndR1=()=>{TTS.stop();dp({type:'FORCE_R1_END'})};
const jumpTo=(r)=>{
    TTS.stop();
    dp({type:'JUMP_ROUND',round:r});

};

/* ── Reusable jump buttons ── */

        <Btn cls="text-xs py-1 px-3 hover:opacity-80" style={{background:'var(--card2)'}} onClick={()=>jumpTo(2)}>🎯 2. kolo</Btn>
        <Btn cls="text-xs py-1 px-3 hover:opacity-80" style={{background:'var(--card2)'}} onClick={()=>jumpTo(3)}>🏁 3. kolo</Btn>

);

/* ── Stuck detection ── */
const r1StuckDetected=isR1&&!st.showRoundSummary&&!st.r1tRun&&(

/* ═══════════════════════════════════════════════════════

let gameView=null;

                <div className="flex items-center justify-center gap-12 mb-6">
                    <div className="text-center">
                        <div className="text-sm text-p1 font-semibold mb-1">🔵 {st.p1?.name}</div>
                        <div className="text-6xl font-black text-p1">{st.s1}</div>
                        <div className="text-xs mt-2"><span className="text-green-400 font-bold">{rd.p1c}✓</span> <span className="text-red-400 font-bold">{rd.p1w}✗</span></div>
                    </div>
                    <div className="text-4xl font-bold" style={{color:'var(--border)'}}>:</div>
                    <div className="text-center">
                        <div className="text-sm text-p2 font-semibold mb-1">🔴 {st.p2?.name}</div>
                        <div className="text-6xl font-black text-p2">{st.s2}</div>
                        <div className="text-xs mt-2"><span className="text-green-400 font-bold">{rd.p2c}✓</span> <span className="text-red-400 font-bold">{rd.p2w}✗</span></div>
                    </div>
                </div>
                {st.s1>st.s2&&<p className="text-p1 font-bold text-lg mb-4">🔵 {st.p1?.name} vedie!</p>}
                {st.s2>st.s1&&<p className="text-p2 font-bold text-lg mb-4">🔴 {st.p2?.name} vedie!</p>}
                {st.s1===st.s2&&<p className="text-accent font-bold text-lg mb-4">⚖️ Remíza!</p>}
                <Btn cls="bg-gradient-to-r from-yellow-500 to-amber-500 text-black hover:from-yellow-400 hover:to-amber-400 text-lg py-3 px-8 shadow-lg shadow-yellow-500/20"
                    onClick={()=>jumpTo(2)}>
                    ▶ Pokračovať do 2. kola
                </Btn>
                {jumpBtns}
            </div>
        </div>
    );
}

/* ── B) Round Summary ── */
else if(st.showRoundSummary){
    const rk=st.summaryRound===1?'r1':st.summaryRound===2?'r2':'r3';
    const rd=st.stats[rk]||{p1c:0,p1w:0,p2c:0,p2w:0};
    gameView=(
        <div className="flex flex-col items-center justify-center min-h-[60vh] p-6">
            <div className="anim-pop text-center">
                <h2 className="text-2xl font-bold mb-1" style={{color:'var(--textSub)'}}>Koniec {st.summaryRound}. kola</h2>
                <h3 className="text-3xl font-black text-accent mb-6">{ROUND_NAMES[st.summaryRound]}</h3>

                        <div className="text-sm text-p1 font-semibold mb-1">🔵 {st.p1?.name}</div>
                        <div className="text-6xl font-black text-p1">{st.s1}</div>
                        <div className="text-xs mt-2"><span className="text-green-400 font-bold">{rd.p1c}✓</span> <span className="text-red-400 font-bold">{rd.p1w}✗</span></div>
                    </div>
                    <div className="text-4xl font-bold" style={{color:'var(--border)'}}>:</div>
                    <div className="text-center">
                        <div className="text-sm text-p2 font-semibold mb-1">🔴 {st.p2?.name}</div>
                        <div className="text-6xl font-black text-p2">{st.s2}</div>
                        <div className="text-xs mt-2"><span className="text-green-400 font-bold">{rd.p2c}✓</span> <span className="text-red-400 font-bold">{rd.p2w}✗</span></div>
                    </div>
                </div>
                {st.s1>st.s2&&<p className="text-p1 font-bold text-lg mb-4">🔵 {st.p1?.name} vedie!</p>}

                {st.s1===st.s2&&<p className="text-accent font-bold text-lg mb-4">⚖️ Remíza!</p>}
                <Btn cls="bg-gradient-to-r from-yellow-500 to-amber-500 text-black hover:from-yellow-400 hover:to-amber-400 text-lg py-3 px-8 shadow-lg shadow-yellow-500/20"

                {jumpBtns}

}

/* ── C) Normal Game ── */
else{

    const header=(
        <>

        <div className="px-4 py-1 flex items-center justify-center gap-3 text-xs border-b flex-wrap hide-mobile" style={{background:'rgba(0,0,0,.15)',borderColor:'var(--border)',color:'var(--textSub)'}}>
            <span><span className="kbd">C</span> Správne</span>

            <span><span className="kbd">R</span> Odkryť</span>

        </div>
        </>

        <div className={`rounded-2xl p-4 border-2 transition-all duration-300 ${

                {av&&<span className="text-2xl">{av}</span>}

                {isActive&&<span className="text-[10px] bg-accent/20 text-accent px-2 py-0.5 rounded-lg font-bold">ODPOVEDÁ</span>}
                {st.passing&&isActive&&<span className="text-[10px] bg-yellow-500/20 text-yellow-400 px-2 py-0.5 rounded-lg font-bold">SUPER</span>}

            {isActiveAndR1&&st.r1tRun&&(

                        <span className="text-accent font-black text-4xl w-20 text-center">{st.pts}</span>

                            <button key={v} onClick={()=>dp({type:'SET_PTS',v})}

    );

    /* Question area */
    const questionArea=!isTB&&st.curQ&&(ptsConfirmed||isR1||st.tRun||st.answered||st.passing)&&(
        <Card cls="mt-3 anim-slide">
            <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2">
                    <span className="text-2xl">{CAT_ICONS[st.curQ.category]||'❓'}</span>
                    <span className="text-accent text-base font-bold uppercase tracking-wider">{CAT_LABELS[st.curQ.category]||st.curQ.category}</span>
                </div>
                {(isR2||isR3)&&<span className="text-accent font-black text-xl">{st.pts} b</span>}
            </div>
            <p className="text-xl font-semibold mb-4 leading-relaxed">{st.curQ.question}</p>
            {st.curQ.img&&<div className="mb-4 flex justify-center"><img src={st.curQ.img} alt="" className="max-h-48 rounded-xl shadow-lg border border-white/10" style={{objectFit:'contain'}}/></div>}
            <div className="rounded-xl p-3 mb-3 cursor-pointer select-none" style={{background:'var(--card2)'}} onClick={()=>setShowAnswer(v=>!v)} title="Klikni pre odkrytie/skrytie odpovede">
                <p className={`text-ok font-bold text-xl transition-all ${showAnswer?'':'blur-sm'}`}>✓ {st.curQ.answer}</p>
                {!showAnswer&&<p className="text-xs text-center mt-1" style={{color:'var(--textSub)'}}>👁️ Klikni alebo stlač <span className="kbd">A</span> pre odkrytie</p>}
            </div>

            ):(
                <p className="text-xs text-accent text-center">✓ Odpoveď zobrazená na TV</p>
            )}

    const timerColor=st.tSec<=3?'text-red-400':st.tSec<=6?'text-yellow-400':'text-accent';
    const timerDisplay=(isR2||isR3)&&!isTB&&st.curQ&&(st.tRun||st.tSec<TIMER||st.answered)&&(

            {st.passing&&<span className="text-yellow-400 font-bold text-sm">⚡ ODPOVEĎ SUPER</span>}

    const nextBtn=!isTB&&(

                Ďalšia otázka →</Btn>
        </div>
    );

    /* Tiebreaker */
    const tbWn=st.tbWinner===1?st.p1?.name:st.tbWinner===2?st.p2?.name:null;
    const tbUI=isTB&&st.curQ&&(
        <Card cls="mt-3 space-y-4">
            <div className="text-center">
                <span className="text-3xl">⚡</span>
                <h3 className="text-xl font-bold text-accent">Rozstrel</h3>

    const roundSwitcher=(
        <div className="mt-3">

                        ⚡ 1. Rýchla runda</Btn>
                    <Btn cls={`text-sm py-2 px-4 ${st.round===2?'bg-accent text-black font-bold':'hover:opacity-80'}`}
                        style={st.round!==2?{background:'var(--card2)'}:{}} onClick={()=>jumpTo(2)}>
                        🎯 2. Hlavná runda</Btn>
                    <Btn cls={`text-sm py-2 px-4 ${st.round===3?'bg-accent text-black font-bold':'hover:opacity-80'}`}
                        style={st.round!==3?{background:'var(--card2)'}:{}} onClick={()=>jumpTo(3)}>

                    <Btn cls={`text-sm py-2 px-4 ${st.round==='tiebreaker'?'bg-accent text-black font-bold':'hover:opacity-80'}`}

    gameView=(
        <div className="min-h-screen flex flex-col">
            {header}
            <div className="flex-1 p-4 max-w-4xl mx-auto w-full overflow-y-auto">
                <div className="grid grid-cols-2 gap-4">
                    {playerCard(1,st.p1?.name,st.s1,st.active===1)}

/* ═══ FINAL RENDER – single return point ═══ */
if(st.testMode){
    const isCentered=r1StuckDetected||st.showRoundSummary;
    return(
        <div className="h-screen flex flex-col">
            <div className="bg-purple-900/50 border-b border-purple-500/30 px-4 py-1 flex items-center justify-between">
                <span className="text-purple-300 font-bold text-sm">🧪 TESTOVACÍ REŽIM</span>
                <Btn cls="bg-purple-600/30 text-purple-200 hover:bg-purple-600/50 text-xs py-0.5 px-2"
                    onClick={()=>dp({type:'SET_TEST',v:false})}>📺 Produkcia</Btn>
            </div>
            <div className="flex-1 flex overflow-hidden">
                <div className={`w-1/2 ${isCentered?'flex items-center justify-center':'flex flex-col'} overflow-y-auto border-r`} style={{background:'var(--bg)',borderColor:'var(--border)'}}>
                    {gameView}
                </div>
                <div className="w-1/2 relative overflow-hidden">
                    <EmbeddedTV/>
                    {st.feedback&&(
                        <div className={`absolute inset-0 z-50 flex flex-col items-center justify-center pointer-events-none ${st.feedback==='correct'?'bg-green-500/85':'bg-red-500/85'}`}
                            style={{animation:'scale-pop .4s ease-out'}}>
                            <span className="text-[80px]">{st.feedback==='correct'?'✓':'✗'}</span>
                            <h1 className="text-3xl font-black text-white">{st.feedback==='correct'?'SPRÁVNE!':'NESPRÁVNE!'}</h1>
                            {st.curQ&&<p className="text-xl text-white/90 font-bold mt-2">{st.curQ.answer}</p>}
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

if(r1StuckDetected||st.showRoundSummary){
    return <div className="min-h-screen flex items-center justify-center">{gameView}</div>;
}
return gameView;
}

/* ════════════ LEADERBOARD ════════════ */
function LeaderboardScreen(){
const{st,dp}=use$();
const[filterDiff,setFilter]=useState('all');
const[view,setView]=useState('simple'); /* simple | detailed */
const filtered=filterDiff==='all'?st.history:st.history.filter(h=>h.diff===filterDiff);
const wins={};
filtered.forEach(h=>{wins[h.winner]=(wins[h.winner]||0)+1});
const sorted=Object.entries(wins).sort((a,b)=>b[1]-a[1]);
/* Enhanced per-player stats */
const pStats=useMemo(()=>{
    const ps={};
    filtered.forEach(h=>{
        const proc=(p,isP1)=>{
            if(!p?.name)return;
            if(!ps[p.name])ps[p.name]={games:0,wins:0,pts:0,correct:0,wrong:0};
            const s=ps[p.name];s.games++;
            if(h.winner===p.name)s.wins++;
            s.pts+=isP1?h.s1:h.s2;
            if(h.stats){['r1','r2','r3'].forEach(rk=>{
                s.correct+=(h.stats[rk]?.[isP1?'p1c':'p2c'])||0;
                s.wrong+=(h.stats[rk]?.[isP1?'p1w':'p2w'])||0;
            })}
        };
        proc(h.p1,true);proc(h.p2,false);
    });
    return Object.entries(ps).sort((a,b)=>b[1].wins-a[1].wins||b[1].pts-a[1].pts);
},[filtered]);
const exportXLS=()=>{
    const data=sorted.map(([name,count],i)=>({'Poradie':i+1,'Hráč':name,'Víťazstvá':count}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Rebríček');
    XLSX.writeFile(wb,`DUEL_Rebricek_${new Date().toISOString().slice(0,10)}.xlsx`);
};
return(
<div className="max-w-xl mx-auto p-6">
    <button onClick={()=>dp({type:'NAV',to:'home'})} style={{color:'var(--textSub)'}} className="hover:text-accent mb-4">← Späť</button>
    <div className="flex items-center justify-between mb-6">
        <h2 className="text-3xl font-bold">🏆 Rebríček</h2>
        {sorted.length>0&&<Btn cls="bg-ok/20 text-ok hover:bg-ok/30 text-sm" onClick={exportXLS}>📥 Excel</Btn>}
    </div>
    <div className="flex gap-2 mb-4 flex-wrap">
        <button onClick={()=>setFilter('all')} className={`px-3 py-1 rounded-xl text-sm font-semibold ${filterDiff==='all'?'bg-accent text-black':''}`}
            style={filterDiff!=='all'?{background:'var(--card2)'}:{}}>Všetky</button>
        {Object.entries(DIFF_LABELS).map(([k,v])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`px-3 py-1 rounded-xl text-sm font-semibold ${filterDiff===k?'bg-accent text-black':''}`}
                style={filterDiff!==k?{background:'var(--card2)'}:{}}>{v}</button>
        ))}
    </div>
    <div className="flex gap-2 mb-4">
        <button onClick={()=>setView('simple')} className={`px-3 py-1 rounded-xl text-sm font-semibold ${view==='simple'?'bg-accent text-black':''}`}
            style={view!=='simple'?{background:'var(--card2)'}:{}}>Jednoduchý</button>
        <button onClick={()=>setView('detailed')} className={`px-3 py-1 rounded-xl text-sm font-semibold ${view==='detailed'?'bg-accent text-black':''}`}
            style={view!=='detailed'?{background:'var(--card2)'}:{}}>Podrobný</button>
    </div>
    {view==='detailed'&&pStats.length>0?(
    <Card cls="overflow-x-auto">
        <table className="w-full text-sm">
            <thead>
                <tr style={{color:'var(--textSub)'}} className="text-xs uppercase">
                    <th className="text-left py-2 px-2">#</th>
                    <th className="text-left py-2 px-2">Hráč</th>
                    <th className="py-2 px-2 text-center">Hry</th>
                    <th className="py-2 px-2 text-center">🏆</th>
                    <th className="py-2 px-2 text-center">Win%</th>
                    <th className="py-2 px-2 text-center">Priemer</th>
                    <th className="py-2 px-2 text-center">✓</th>
                    <th className="py-2 px-2 text-center">✗</th>
                </tr>
            </thead>
            <tbody>
                {pStats.map(([name,s],i)=>(
                    <tr key={name} className="border-t" style={{borderColor:'var(--border)'}}>
                        <td className="py-2 px-2 font-black" style={{color:i===0?'#eab308':i===1?'#94a3b8':i===2?'#f97316':'var(--textSub)'}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.'}</td>
                        <td className="py-2 px-2 font-semibold">{name}</td>
                        <td className="py-2 px-2 text-center" style={{color:'var(--textSub)'}}>{s.games}</td>
                        <td className="py-2 px-2 text-center text-accent font-bold">{s.wins}</td>
                        <td className="py-2 px-2 text-center font-bold" style={{color:s.games?(s.wins/s.games>=0.6?'#22c55e':s.wins/s.games>=0.4?'#eab308':'#ef4444'):'var(--textSub)'}}>{s.games?Math.round(s.wins/s.games*100):0}%</td>
                        <td className="py-2 px-2 text-center" style={{color:'var(--textSub)'}}>{s.games?Math.round(s.pts/s.games):0}</td>
                        <td className="py-2 px-2 text-center text-green-400 font-bold">{s.correct}</td>
                        <td className="py-2 px-2 text-center text-red-400 font-bold">{s.wrong}</td>
                    </tr>
                ))}
            </tbody>
        </table>

/* ════════════ QUESTION EDITOR ════════════ */
function QuestionEditorScreen(){
const{st,dp}=use$();
const fileRef=useRef(null);
const[questions,setQuestions]=useState(()=>[...QUESTIONS_DB]);
const[search,setSearch]=useState('');
const[fCat,setFCat]=useState('');
const[fDiff,setFDiff]=useState('');
const[fScope,setFScope]=useState('');
const[fType,setFType]=useState('');
const[fImg,setFImg]=useState('');
const[fGroup,setFGroup]=useState('');
const[editorTab,setEditorTab]=useState('questions'); /* questions | groups */
const[groups,setGroupsState]=useState(()=>loadGroups());
const setGroups=(g)=>{saveGroups(g);setGroupsState(g)};
const[grpModal,setGrpModal]=useState(null); /* null | {id?,name} */
const[catModal,setCatModal]=useState(null); /* null | {groupId,key?,label,icon} */const[page,setPage]=useState(0);
const[showModal,setShowModal]=useState(false);
const[editQ,setEditQ]=useState(null);
const[toast,setToast]=useState('');
const PG=30;

const allCats=useMemo(()=>{const s=new Set(questions.map(q=>q.category));return[...s].sort()},[questions]);

const filtered=useMemo(()=>questions.filter(q=>{
  if(search){const s=search.toLowerCase();if(!q.question.toLowerCase().includes(s)&&!q.answer.toLowerCase().includes(s)&&!String(q.id).includes(s))return false}
  if(fCat&&q.category!==fCat)return false;
  if(fDiff&&q.difficulty!==fDiff)return false;
  if(fScope&&q.scope!==fScope)return false;
  if(fType&&q.type!==fType)return false;
  if(fImg==='yes'&&!q.img)return false;
  if(fImg==='no'&&q.img)return false;
  if(fGroup&&String(q.group||'')!==fGroup)return false;
  return true;
}),[questions,search,fCat,fDiff,fScope,fType,fImg,fGroup]);

const totalPg=Math.ceil(filtered.length/PG);
const pageQ=filtered.slice(page*PG,(page+1)*PG);

const flash=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),3000)};

/* Persist: mutate shared QUESTIONS_DB array in place + save to localStorage */
const persist=(qs)=>{
  QUESTIONS_DB.length=0;qs.forEach(q=>QUESTIONS_DB.push(q));
  window.QUESTIONS_DB=QUESTIONS_DB;
  try{localStorage.setItem('duel_questions_db',JSON.stringify(qs))}catch(e){console.warn(e)}
  setQuestions([...qs]);
};

const nextId=()=>questions.reduce((m,q)=>Math.max(m,q.id),0)+1;

const saveQ=(q)=>{
  let qs;
  if(editQ&&editQ.id){qs=questions.map(o=>o.id===editQ.id?{...q,id:editQ.id}:o)}
  else{qs=[...questions,{...q,id:nextId()}]}
  persist(qs);setShowModal(false);setEditQ(null);
  flash(editQ&&editQ.id?'✅ Otázka upravená':'✅ Otázka pridaná');
};

const deleteQ=(id)=>{if(!confirm('Odstrániť otázku #'+id+'?'))return;persist(questions.filter(q=>q.id!==id));flash('🗑️ Otázka odstránená')};

const handleImport=(e)=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(evt)=>{
    try{
      const wb=XLSX.read(evt.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws);
      let base=nextId();
      const imp=data.map((r,i)=>({
        id:base+i,
        question:r.question||r.otazka||r['otázka']||r.Question||'',
        answer:r.answer||r.odpoved||r['odpoveď']||r.Answer||'',
        category:r.category||r.kategoria||r['kategória']||r.Category||'zaujimavosti_sk',
        difficulty:r.difficulty||r.obtaznost||r['obtiažnosť']||r.Difficulty||'level1',
        scope:r.scope||r.rozsah||r.Scope||'sk',
        type:r.type||r.typ||r.Type||'normal',
        ...(r.img||r.obrazok||r['obrázok']?{img:r.img||r.obrazok||r['obrázok']}:{}),
      })).filter(q=>q.question&&q.answer);
      if(imp.length){persist([...questions,...imp]);flash(`✅ Importovaných ${imp.length} otázok`)}
      else flash('⚠️ Žiadne platné otázky v súbore');
    }catch(err){flash('❌ Chyba: '+err.message)}
  };
  reader.readAsArrayBuffer(file);e.target.value='';
};

const handleExport=()=>{
  const data=filtered.map(q=>({id:q.id,question:q.question,answer:q.answer,category:q.category,category_label:CAT_LABELS[q.category]||q.category,difficulty:q.difficulty,scope:q.scope,type:q.type,img:q.img||''}));
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Otázky');
  XLSX.writeFile(wb,`DUEL_Otazky_${new Date().toISOString().slice(0,10)}.xlsx`);
};

const resetToOriginal=()=>{
  if(!confirm('Obnoviť pôvodnú databázu otázok? Všetky zmeny budú stratené!'))return;
  localStorage.removeItem('duel_questions_db');
  flash('♻️ Obnovené – načítajte stránku znova (Ctrl+R)');
};

const stats=useMemo(()=>({
  total:questions.length,
  sk:questions.filter(q=>q.scope==='sk').length,
  svet:questions.filter(q=>q.scope==='svet').length,
  junior:questions.filter(q=>q.difficulty==='junior').length,
  level1:questions.filter(q=>q.difficulty==='level1').length,
  level2:questions.filter(q=>q.difficulty==='level2').length,
  img:questions.filter(q=>q.img).length,
  tb:questions.filter(q=>q.type==='tiebreaker').length,
}),[questions]);

/* Duplicate detection */
const duplicates=useMemo(()=>{
  const seen=new Map();const dupes=new Set();
  questions.forEach(q=>{const k=q.question.toLowerCase().trim();if(seen.has(k)){dupes.add(q.id);dupes.add(seen.get(k))}else seen.set(k,q.id)});
  return dupes;
},[questions]);

return(
<div className="max-w-7xl mx-auto p-4">
  {/* Toast */}
  {toast&&<div className="fixed top-4 right-4 z-50 px-4 py-2 rounded-xl text-sm font-semibold shadow-lg animate-bounce" style={{background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)'}}>{toast}</div>}

  {/* Header */}
  <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
    <div className="flex items-center gap-3">
      <button onClick={()=>dp({type:'NAV',to:'home'})} style={{color:'var(--textSub)'}} className="hover:text-accent transition-colors text-lg">← Späť</button>
      <h2 className="text-2xl font-bold">✏️ Editor otázok</h2>
      <span className="text-sm px-2 py-0.5 rounded-full bg-accent/20 text-accent font-mono">{questions.length}</span>
    </div>
    <div className="flex flex-wrap gap-2">
      <Btn cls="bg-green-600 text-white text-sm hover:bg-green-500" onClick={()=>{setEditQ({});setShowModal(true)}}>➕ Nová</Btn>
      <Btn cls="bg-blue-600 text-white text-sm hover:bg-blue-500" onClick={()=>fileRef.current?.click()}>📥 Import</Btn>
      <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleImport} className="hidden"/>
      <Btn cls="bg-purple-600 text-white text-sm hover:bg-purple-500" onClick={handleExport}>📤 Export ({filtered.length})</Btn>
      <Btn cls="bg-red-600/30 text-red-400 text-sm border border-red-500/30 hover:bg-red-600/50" onClick={resetToOriginal}>♻️ Reset</Btn>
    </div>
  </div>

  {/* Tabs */}
  <div className="flex gap-1 mb-4 border-b pb-2" style={{borderColor:'var(--border)'}}>
    <button onClick={()=>setEditorTab('questions')} className={`px-4 py-2 rounded-t-xl font-bold text-sm transition-all ${editorTab==='questions'?'bg-accent text-black':'hover:opacity-80'}`} style={editorTab!=='questions'?{color:'var(--textSub)'}:{}}>📋 Otázky</button>
    <button onClick={()=>setEditorTab('groups')} className={`px-4 py-2 rounded-t-xl font-bold text-sm transition-all ${editorTab==='groups'?'bg-purple-600 text-white':'hover:opacity-80'}`} style={editorTab!=='groups'?{color:'var(--textSub)'}:{}}>📦 Skupiny ({groups.length})</button>
  </div>

  {/* ═══ GROUPS TAB ═══ */}
  {editorTab==='groups'&&(<div>
    <div className="flex items-center justify-between mb-4">
      <p style={{color:'var(--textSub)'}} className="text-sm">Vytvor si vlastné skupiny s témami a otázkami. Pri nastavení hry zvoľ „📦 Skupina".</p>
      <Btn cls="bg-purple-600 text-white text-sm hover:bg-purple-500" onClick={()=>setGrpModal({name:''})}>➕ Nová skupina</Btn>
    </div>
    {groups.length===0&&<Card><p className="text-center py-8" style={{color:'var(--textSub)'}}>Žiadne skupiny. Vytvor prvú!</p></Card>}
    {groups.map(g=>{
      const gqs=questions.filter(q=>q.group===g.id);
      return(
      <Card key={g.id} cls="mb-4">
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-3">
            <span className="text-2xl">📦</span>
            <div>
              <h3 className="text-lg font-bold">{g.name}</h3>
              <p className="text-xs" style={{color:'var(--textSub)'}}>{g.cats.length} tém · {gqs.length} otázok</p>
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={()=>setGrpModal({id:g.id,name:g.name})} className="text-blue-400 hover:text-blue-300 text-sm" title="Premenovať">✏️</button>
            <button onClick={()=>{if(!confirm('Odstrániť skupinu „'+g.name+'" a všetky jej otázky?'))return;
              persist(questions.filter(q=>q.group!==g.id));setGroups(groups.filter(x=>x.id!==g.id));flash('🗑️ Skupina odstránená')}}
              className="text-red-400 hover:text-red-300 text-sm" title="Odstrániť">🗑️</button>

          <option value="">Všetky</option>

      <div>

      <div>
        <label className="text-xs block mb-1" style={{color:'var(--textSub)'}}>Typ</label>
        <select value={fType} onChange={e=>{setFType(e.target.value);setPage(0)}} className="rounded-lg px-2 py-2 text-sm outline-none" style={{background:'var(--inputBg)',color:'var(--text)'}}>

      <div>

        <select value={fImg} onChange={e=>{setFImg(e.target.value);setPage(0)}} className="rounded-lg px-2 py-2 text-sm outline-none" style={{background:'var(--inputBg)',color:'var(--text)'}}>

        <label className="text-xs block mb-1" style={{color:'var(--textSub)'}}>Skupina</label>
        <select value={fGroup} onChange={e=>{setFGroup(e.target.value);setPage(0)}} className="rounded-lg px-2 py-2 text-sm outline-none" style={{background:'var(--inputBg)',color:'var(--text)'}}>

      </div>}
      {(search||fCat||fDiff||fScope||fType||fImg||fGroup)&&<Btn cls="text-xs text-red-400 hover:text-red-300" onClick={()=>{setSearch('');setFCat('');setFDiff('');setFScope('');setFType('');setFImg('');setFGroup('');setPage(0)}}>✕ Zrušiť filtre</Btn>}
    </div>
    <div className="mt-2 text-xs" style={{color:'var(--textSub)'}}>Zobrazených: <b>{filtered.length}</b> z {questions.length}{duplicates.size>0&&<span className="text-yellow-400 ml-2">⚠️ {duplicates.size} potenciálnych duplikátov</span>}</div>
  </Card>

  {/* Questions table */}
  <div className="rounded-2xl border overflow-hidden" style={{background:'var(--card)',borderColor:'var(--border)'}}>
    <div className="overflow-x-auto">
      <table className="w-full text-sm">
        <thead>
          <tr style={{background:'rgba(255,255,255,0.03)'}}>
            <th className="px-3 py-2 text-left font-semibold" style={{color:'var(--textSub)',width:'50px'}}>ID</th>
            <th className="px-3 py-2 text-left font-semibold" style={{color:'var(--textSub)'}}>Otázka</th>
            <th className="px-3 py-2 text-left font-semibold" style={{color:'var(--textSub)',width:'180px'}}>Odpoveď</th>
            <th className="px-3 py-2 text-left font-semibold" style={{color:'var(--textSub)',width:'140px'}}>Kategória</th>
            <th className="px-3 py-2 text-center font-semibold" style={{color:'var(--textSub)',width:'80px'}}>Diff</th>
            <th className="px-3 py-2 text-center font-semibold" style={{color:'var(--textSub)',width:'60px'}}>Scope</th>
            <th className="px-3 py-2 text-center font-semibold" style={{color:'var(--textSub)',width:'90px'}}>Akcie</th>
          </tr>
        </thead>
        <tbody>
          {pageQ.map(q=>(
            <tr key={q.id} className="border-t hover:bg-white/5 transition-colors" style={{borderColor:'var(--border)'}}>
              <td className="px-3 py-2 font-mono text-xs" style={{color:'var(--textSub)'}}>{q.id}{q.img&&' 🖼️'}{q.type==='tiebreaker'&&' ⚡'}{duplicates.has(q.id)&&<span className="text-yellow-400" title="Možný duplikát"> ⚠️</span>}</td>
              <td className="px-3 py-2">
                <div className="line-clamp-2">{q.question}</div>
                {q.img&&<img src={q.img} className="mt-1 h-8 rounded" alt="" onError={e=>{e.target.style.display='none'}}/>}
              </td>
              <td className="px-3 py-2 font-semibold text-green-400">{q.answer}</td>
              <td className="px-3 py-2 text-xs">{CAT_ICONS[q.category]||'❓'} {CAT_LABELS[q.category]||q.category}</td>
              <td className="px-3 py-2 text-center"><span className={`text-xs px-1.5 py-0.5 rounded-full ${q.difficulty==='junior'?'bg-green-500/20 text-green-400':q.difficulty==='level1'?'bg-yellow-500/20 text-yellow-400':'bg-red-500/20 text-red-400'}`}>{q.difficulty==='junior'?'J':q.difficulty==='level1'?'L1':'L2'}</span></td>
              <td className="px-3 py-2 text-center text-xs">{q.group?'📦':q.scope==='sk'?'🇸🇰':'🌍'}</td>
              <td className="px-3 py-2 text-center">
                <button onClick={()=>{setEditQ({...q});setShowModal(true)}} className="text-blue-400 hover:text-blue-300 mr-2" title="Upraviť">✏️</button>
                <button onClick={()=>deleteQ(q.id)} className="text-red-400 hover:text-red-300" title="Odstrániť">🗑️</button>
              </td>
            </tr>
          ))}
          {pageQ.length===0&&<tr><td colSpan="7" className="text-center py-8" style={{color:'var(--textSub)'}}>Žiadne otázky nenájdené</td></tr>}
        </tbody>
      </table>
    </div>
    {/* Pagination */}
    {totalPg>1&&(
      <div className="flex items-center justify-between px-4 py-3 border-t" style={{borderColor:'var(--border)'}}>
        <Btn cls="text-sm" style={{color:'var(--textSub)'}} onClick={()=>setPage(Math.max(0,page-1))} disabled={page===0}>← Predošlá</Btn>
        <div className="flex gap-1 flex-wrap justify-center">
          {Array.from({length:Math.min(totalPg,10)},(_,i)=>{
            let p;
            if(totalPg<=10)p=i;
            else if(page<5)p=i;
            else if(page>totalPg-6)p=totalPg-10+i;
            else p=page-5+i;
            return <button key={p} onClick={()=>setPage(p)} className={`w-8 h-8 rounded-lg text-xs font-semibold transition-colors ${p===page?'bg-accent text-black':'hover:bg-white/10'}`}>{p+1}</button>;
          })}
          {totalPg>10&&<span className="text-xs self-center" style={{color:'var(--textSub)'}}>z {totalPg}</span>}
        </div>
        <Btn cls="text-sm" style={{color:'var(--textSub)'}} onClick={()=>setPage(Math.min(totalPg-1,page+1))} disabled={page>=totalPg-1}>Ďalšia →</Btn>
      </div>
    )}
  </div>

  {/* Add/Edit Modal */}
  {showModal&&<QEditModal q={editQ} onSave={saveQ} onClose={()=>{setShowModal(false);setEditQ(null)}} allCats={allCats} groups={groups}/>}

  </div>)}
</div>
);
}

/* ── Question Edit Modal ── */
function QEditModal({q,onSave,onClose,allCats,groups}){
const isNew=!q||!q.id;
const _groups=groups||loadGroups();
const[form,setForm]=useState({
  question:q?.question||'',answer:q?.answer||'',
  category:q?.category||'zaujimavosti_sk',difficulty:q?.difficulty||'level1',
  scope:q?.scope||'sk',type:q?.type||'normal',img:q?.img||'',
  group:q?.group||null,
});
const set=(k,v)=>setForm(f=>({...f,[k]:v}));
const valid=form.question.trim()&&form.answer.trim();
const submit=(e)=>{e.preventDefault();if(!valid)return;
  const out={...form,question:form.question.trim(),answer:form.answer.trim()};
  if(!out.img)delete out.img;
  if(!out.group){delete out.group;if(out.scope==='group')out.scope='sk';}
  else{out.scope='group';}
  onSave(out);
};
const isGroupQ=!!form.group;
const selGrp=_groups.find(g=>g.id===form.group);
/* Available categories based on scope */
const scopeCats=isGroupQ?(selGrp?.cats||[]).map(c=>c.key):(form.scope==='sk'?SK_CATS:SVET_CATS);
return(
<div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.7)'}}>
  <form onSubmit={submit} className="w-full max-w-lg rounded-2xl p-6 border shadow-2xl" style={{background:'var(--bg)',borderColor:'var(--border)',maxHeight:'90vh',overflowY:'auto'}}>
    <h3 className="text-xl font-bold mb-4">{isNew?'➕ Nová otázka':'✏️ Upraviť otázku'}{!isNew&&<span className="text-sm font-mono ml-2" style={{color:'var(--textSub)'}}>#{q.id}</span>}</h3>

    {/* Group assignment */}
    {_groups.length>0&&(
    <div className="mb-3 p-3 rounded-xl border" style={{borderColor:isGroupQ?'rgb(147 51 234 / .5)':'var(--border)',background:isGroupQ?'rgb(147 51 234 / .1)':'transparent'}}>
      <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>📦 Skupina (voliteľné)</label>
      <select value={form.group||''} onChange={e=>{
        const gid=e.target.value?+e.target.value:null;
        set('group',gid);
        if(gid){set('scope','group');const g=_groups.find(x=>x.id===gid);if(g&&g.cats.length&&!g.cats.some(c=>c.key===form.category))set('category',g.cats[0].key)}
        else{set('scope','sk')}
      }} className="w-full rounded-xl px-3 py-2 outline-none text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}>
        <option value="">— Bez skupiny (SK/Svet) —</option>
        {_groups.map(g=><option key={g.id} value={g.id}>📦 {g.name}</option>)}
      </select>
    </div>)}

    <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>Otázka *</label>
    <textarea value={form.question} onChange={e=>set('question',e.target.value)} rows="3"
      className="w-full rounded-xl px-3 py-2 mb-3 outline-none focus:ring-2 ring-accent text-sm" style={{background:'var(--inputBg)',color:'var(--text)',resize:'vertical'}} autoFocus/>

    <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>Odpoveď *</label>
    <input value={form.answer} onChange={e=>set('answer',e.target.value)}
      className="w-full rounded-xl px-3 py-2 mb-3 outline-none focus:ring-2 ring-accent text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}/>

    <div className="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>{isGroupQ?'Téma skupiny':'Rozsah'}</label>
        {isGroupQ?(
          <select value={form.category} onChange={e=>set('category',e.target.value)}
            className="w-full rounded-xl px-3 py-2 outline-none text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}>
            {scopeCats.map(c=><option key={c} value={c}>{CAT_ICONS[c]||'📦'} {CAT_LABELS[c]||c}</option>)}
            {scopeCats.length===0&&<option value="">— Najprv pridaj tému —</option>}
          </select>
        ):(
          <select value={form.scope} onChange={e=>{set('scope',e.target.value);if(!scopeCats.includes(form.category))set('category',e.target.value==='sk'?'zaujimavosti_sk':'zaujimavosti_svet')}}
            className="w-full rounded-xl px-3 py-2 outline-none text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}>
            <option value="sk">🇸🇰 Slovensko</option><option value="svet">🌍 Svet</option>
          </select>
        )}
      </div>
      <div>
        <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>Obtiažnosť</label>
        <select value={form.difficulty} onChange={e=>set('difficulty',e.target.value)}
          className="w-full rounded-xl px-3 py-2 outline-none text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}>
          <option value="junior">🟢 Junior (7–12)</option><option value="level1">🟡 Level 1 (13–18)</option><option value="level2">🔴 Level 2 (18–99)</option>
        </select>
      </div>
    </div>

    {!isGroupQ&&<div className="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>Kategória</label>
        <select value={form.category} onChange={e=>set('category',e.target.value)}
          className="w-full rounded-xl px-3 py-2 outline-none text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}>
          {scopeCats.map(c=><option key={c} value={c}>{CAT_ICONS[c]||''} {CAT_LABELS[c]||c}</option>)}
          {!scopeCats.includes(form.category)&&<option value={form.category}>{CAT_LABELS[form.category]||form.category}</option>}
        </select>
      </div>
      <div>
        <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>Typ</label>
        <select value={form.type} onChange={e=>set('type',e.target.value)}
          className="w-full rounded-xl px-3 py-2 outline-none text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}>
          <option value="normal">Normálna</option><option value="tiebreaker">⚡ Rozstrel</option>
        </select>
      </div>
    </div>}

    {isGroupQ&&<div className="mb-3">
      <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>Typ</label>
      <select value={form.type} onChange={e=>set('type',e.target.value)}
        className="w-full rounded-xl px-3 py-2 outline-none text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}>
        <option value="normal">Normálna</option><option value="tiebreaker">⚡ Rozstrel</option>
      </select>
    </div>}

    <label className="block text-xs mb-1 font-semibold" style={{color:'var(--textSub)'}}>Obrázok URL (voliteľné)</label>
    <input value={form.img} onChange={e=>set('img',e.target.value)} placeholder="https://..."
      className="w-full rounded-xl px-3 py-2 mb-1 outline-none focus:ring-2 ring-accent text-sm" style={{background:'var(--inputBg)',color:'var(--text)'}}/>
    {form.img&&<img src={form.img} className="h-16 rounded-lg mb-3 mt-1" alt="Preview" onError={e=>{e.target.style.display='none'}}/>}

    <div className="flex gap-2 mt-4">
      <Btn cls="flex-1 bg-accent text-black hover:bg-yellow-400 font-bold" disabled={!valid}>{isNew?'Pridať otázku':'Uložiť zmeny'}</Btn>
      <Btn cls="px-6 border" type="button" style={{borderColor:'var(--border)',color:'var(--textSub)'}} onClick={onClose}>Zrušiť</Btn>
    </div>
  </form>
</div>
);
}

/* ════════════ APP ════════════ */
function App(){
const{st}=use$();
const content=(()=>{
switch(st.screen){
    case 'home':return <HomeScreen/>;
    case 'players':return <PlayersScreen/>;
    case 'setup':return <SetupScreen/>;
    case 'game':return <GameScreen/>;
    case 'results':return <ResultsScreen/>;
    case 'leaderboard':return <LeaderboardScreen/>;
    case 'hist':return <HistoryScreen/>;
    case 'settings':return <SettingsScreen/>;
    case 'qeditor':return <QuestionEditorScreen/>;
    default:return <HomeScreen/>;
}
})();
return <div key={st.screen} className="screen-enter">{content}</div>;
}
/* ═══════════════ LOGIN SCREEN ═══════════════ */
function LoginScreen({onLogin}){

const[pass,setPass]=useState('');
const[err,setErr]=useState('');
const[show,setShow]=useState(false);

e.preventDefault();
if(user==='mgrega'&&pass==='Nowire2086*'){sessionStorage.setItem('quiz_auth','1');onLogin();}
else{setErr('Nesprávne meno alebo heslo!');setTimeout(()=>setErr(''),2500);}

return(
<div style={{background:'linear-gradient(135deg,#0f172a,#1e293b)',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter,system-ui,sans-serif'}}>

/* ═══════════════ ERROR BOUNDARY ═══════════════ */
class ErrorBoundary extends React.Component{
constructor(p){super(p);this.state={err:null}}
static getDerivedStateFromError(e){return{err:e}}
render(){
if(this.state.err)return(
<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f172a',color:'#fff',fontFamily:'Inter,system-ui,sans-serif'}}>
<div style={{textAlign:'center',padding:'48px',background:'#1e293b',borderRadius:'24px',maxWidth:'500px',boxShadow:'0 25px 60px rgba(0,0,0,.5)'}}>
<div style={{fontSize:'64px',marginBottom:'16px'}}>⚠️</div>
<h2 style={{fontSize:'24px',fontWeight:800,marginBottom:'8px'}}>Nastala chyba</h2>
<p style={{color:'#94a3b8',marginBottom:'24px',fontSize:'14px',wordBreak:'break-all'}}>{this.state.err.message}</p>
<button onClick={()=>location.reload()} style={{padding:'14px 32px',borderRadius:'12px',background:'linear-gradient(135deg,#eab308,#f59e0b)',color:'#0f172a',fontSize:'18px',fontWeight:800,border:'none',cursor:'pointer'}}>🔄 Reštartovať</button>
</div></div>);
return this.props.children;
}}

/* ═══════════════ ROOT WITH AUTH GATE ═══════════════ */
function Root(){
const[auth,setAuth]=useState(()=>sessionStorage.getItem('quiz_auth')==='1');
if(!auth)return <LoginScreen onLogin={()=>setAuth(true)}/>;
return <Provider><App/></Provider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
<script>
/* ── Force SW update on load ── */
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!refreshing){refreshing=true;console.log('[PWA] New SW, reloading…');window.location.reload()}
  });
  /* Immediately try to update any existing SW */
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg){console.log('[PWA] Forcing SW update check…');reg.update();}
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      console.log('[PWA] SW registered, scope:',reg.scope);
      reg.update(); /* force check right away */
      setInterval(()=>reg.update(),60000);
    }).catch(err=>console.warn('[PWA] SW failed:',err));
  });
}
</script>
