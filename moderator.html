  s(k,v){
    try{localStorage.setItem('duel_'+k,JSON.stringify(v))}catch(e){console.warn(e)}

    try{db.collection('quiz_data').doc(k).set({value:JSON.parse(JSON.stringify(v)),ts:firebase.firestore.FieldValue.serverTimestamp()})
      .then(()=>console.log('[Cloud] Saved:',k))

  },
  /* Subscribe to Firestore changes (called once at app start) */
  _subs:{},
  listen(k,cb){
    if(this._subs[k])return;
    this._subs[k]=db.collection('quiz_data').doc(k).onSnapshot(snap=>{
      if(!snap.exists){
        /* Firestore empty → bootstrap from localStorage */
        const local=this.g(k);
        if(local&&(Array.isArray(local)?local.length>0:Object.keys(local).length>0)){
          console.log('[Cloud] Bootstrap: pushing local',k,'to Firestore');
          db.collection('quiz_data').doc(k).set({value:JSON.parse(JSON.stringify(local)),ts:firebase.firestore.FieldValue.serverTimestamp()});
        }
        return;
      }
      const d=snap.data();
      if(d&&d.value!==undefined){
        console.log('[Cloud] Received:',k);
        try{localStorage.setItem('duel_'+k,JSON.stringify(d.value))}catch(e){}
        if(cb)cb(d.value);
      }
    },e=>console.warn('[Cloud] Listen error:',k,e));
  }
};

const SFX=(()=>{
let c=null;
const i=()=>{if(!c)c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==='suspended')c.resume();return c};
const osc=(freq,type,dur,vol=.15,t=0)=>{
    const x=i(),o=x.createOscillator(),g=x.createGain();
    o.connect(g);g.connect(x.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,x.currentTime+t);
    g.gain.exponentialRampToValueAtTime(.001,x.currentTime+t+dur);
    o.start(x.currentTime+t);o.stop(x.currentTime+t+dur);
};
return{
    enabled:true,
    tick(){if(!this.enabled)return;osc(880,'sine',.06,.12)},
    tickLow(){if(!this.enabled)return;osc(440,'sine',.12,.25)},
    buzzer(){if(!this.enabled)return;osc(120,'sawtooth',.8,.35)},
    correct(){if(!this.enabled)return;[523,659,784].forEach((f,j)=>osc(f,'sine',.25,.18,j*.1))},
    wrong(){if(!this.enabled)return;const x=i(),o=x.createOscillator(),g=x.createGain();
        o.connect(g);g.connect(x.destination);o.type='square';o.frequency.value=200;
        g.gain.setValueAtTime(.2,x.currentTime);o.frequency.linearRampToValueAtTime(80,x.currentTime+.35);
        g.gain.exponentialRampToValueAtTime(.001,x.currentTime+.4);o.start();o.stop(x.currentTime+.4)},
    fanfare(){if(!this.enabled)return;[392,494,587,784,1047].forEach((f,j)=>osc(f,'triangle',.45,.2,j*.13))},
    gameStart(){if(!this.enabled)return;
        const scale=[262,294,330,349,392,440,494,523,587,659,784,880,1047];
        scale.forEach((f,j)=>{osc(f,'sine',.45,.12+j*.014,j*.38);osc(f/2,'triangle',.5,.06,j*.38)});
        [523,659,784,1047].forEach((f,k)=>osc(f,'sine',1.2,.2,5+k*.04));
        [262,330,392].forEach(f=>osc(f,'triangle',1.2,.1,5));
    },
    roundEnd(){if(!this.enabled)return;
        [523,659,784,1047,1319].forEach((f,j)=>osc(f,'sine',.35,.16,j*.12));
        [523,784,1047].forEach(f=>osc(f,'sine',.9,.14,.7));
        [262,392].forEach(f=>osc(f,'triangle',.9,.08,.7));
    },
    winner(){if(!this.enabled)return;
        const m=[[523,.18],[523,.1],[523,.1],[659,.28],[587,.18],[659,.18],[784,.45]];
        let t=0;m.forEach(([f,d])=>{osc(f,'sine',d+.1,.22,t);osc(f/2,'triangle',d+.1,.1,t);t+=d+.04});

};

/* ─── TTS (Text-to-Speech – slovenský hlas) ─── */
const TTS=(()=>{
let _on=false,_tmr=null,_vc=null,_audio=null,_gender='male';
const _pick=()=>{
    if(_vc)return _vc;
    const vs=speechSynthesis.getVoices();
    if(vs.length)console.log('[TTS] Dostupné hlasy:',vs.map(v=>`${v.name} (${v.lang})`).join(', '));
    if(_gender==='female'){
        _vc=vs.find(v=>/^sk/i.test(v.lang)&&/female|žen|zen|woman|zuzana/i.test(v.name))
            ||vs.find(v=>/^sk/i.test(v.lang))
            ||vs.find(v=>/^cs/i.test(v.lang)&&/female|žen|zen|woman/i.test(v.name))
            ||vs.find(v=>/^cs/i.test(v.lang))
            ||null;
    } else {
        _vc=vs.find(v=>/^sk/i.test(v.lang)&&/male|mu[zž]/i.test(v.name)&&!/female/i.test(v.name))
            ||vs.find(v=>/^sk/i.test(v.lang))
            ||vs.find(v=>/^cs/i.test(v.lang)&&/male|mu[zž]|zden[eě]k/i.test(v.name)&&!/female/i.test(v.name))
            ||vs.find(v=>/^cs/i.test(v.lang))
            ||null;
    }
    if(_vc)console.log('[TTS] Vybraný hlas:',_vc.name,_vc.lang,'('+_gender+')');
    return _vc;
};
if(typeof speechSynthesis!=='undefined'){
    speechSynthesis.onvoiceschanged=()=>{_vc=null;_pick()};
    try{speechSynthesis.getVoices();_pick()}catch(e){}
}
const speak=(text)=>{
    if(!_on||!text)return;
    /* Stop any running audio/speech */
    _stopCurrent();
    const u=new SpeechSynthesisUtterance(text);
    const v=_pick();if(v)u.voice=v;
    u.lang='sk-SK';u.rate=0.92;u.pitch=0.8;u.volume=1;
    speechSynthesis.speak(u);
};
const after=(fn,ms=2000)=>{_cancelTimer();_tmr=setTimeout(()=>{const t=typeof fn==='function'?fn():fn;speak(t)},ms)};
const _cancelTimer=()=>{if(_tmr){clearTimeout(_tmr);_tmr=null}};
const _stopCurrent=()=>{
    _cancelTimer();
    if(typeof speechSynthesis!=='undefined')speechSynthesis.cancel();
    if(_audio){try{_audio.pause();_audio.currentTime=0}catch(e){}_audio=null}
};
const stop=_stopCurrent;
return{get enabled(){return _on},set enabled(v){_on=!!v;if(!v)stop()},speak,after,stop,cancel:_cancelTimer,
    setGender(g){_gender=g||'male';_vc=null;_pick()}};
})();

    _tvThrottle=setTimeout(()=>{
        db.collection('quiz_data').doc('game_state').set({type,data:data||{},ts:firebase.firestore.FieldValue.serverTimestamp()})
          .catch(e=>console.warn('[Cloud TV] Write failed:',e));
    },80);
};

/* ─── QUESTION HELPERS ─── */
function getRecentUsedIds(){
const hist=S.g('history',[]);
const ids=new Set();
hist.slice(-10).forEach(h=>{if(h.usedQIds)h.usedQIds.forEach(id=>ids.add(id))});
return ids;
}
function pickQ(diff,usedIds,cat=null,type=null,scope='sk'){
/* Primárny pool: správna obtiažnosť + nepoužité */
let pool=QUESTIONS_DB.filter(q=>q.difficulty===diff&&q.scope===scope&&!usedIds.has(q.id)&&(cat?q.category===cat:true)&&(type?q.type===type:q.type!=='tiebreaker'));
/* Ak v danej obtiažnosti nie sú, skús ľubovoľnú obtiažnosť (ale stále nepoužité!) */
if(!pool.length)pool=QUESTIONS_DB.filter(q=>q.scope===scope&&!usedIds.has(q.id)&&(cat?q.category===cat:true)&&(type?q.type===type:q.type!=='tiebreaker'));
if(!pool.length){console.warn('[QUIZ] Žiadne nové otázky pre:',{diff,cat,type,scope});return null;}
return pool[Math.floor(Math.random()*pool.length)];
}
function getCats(diff,round,roundCats,scope){
if(roundCats&&roundCats.length)return roundCats.filter(c=>QUESTIONS_DB.some(q=>q.difficulty===diff&&q.category===c&&q.scope===scope&&q.type!=='tiebreaker'));
const base=SCOPE_CATS[scope||'sk']||SK_CATS;
return base.filter(c=>QUESTIONS_DB.some(q=>q.difficulty===diff&&q.category===c&&q.scope===scope&&q.type!=='tiebreaker'));
}
function applyTheme(t){
if(t==='light')document.body.classList.add('light');
else document.body.classList.remove('light');
}

/* ═══════════════ REDUCER ═══════════════ */
const init={
screen:'home',players:S.g('players',[]),history:S.g('history',[]),
settings:S.g('settings',{timer:15,sound:true,r2count:10,r3count:20,theme:'dark'}),
testMode:false,
gameDate:new Date().toISOString().slice(0,10),p1:null,p2:null,diff:'junior',scope:'sk',voiceGender:'male',
round:1,qNum:0,curQ:null,usedIds:new Set(),
s1:0,s2:0,active:1,tRun:false,tSec:15,
pts:10,revealed:false,answered:false,
gameOn:false,over:false,winner:null,selCat:null,
tb1:'',tb2:'',
r1phase:1,r1qCount:0,r1timer:R1_TIME,r1tRun:false,
showRoundSummary:false,summaryRound:null,
usedCats:[],
roundCats:[], /* 10 kategórií pre aktuálne kolo */
catQCounts:{}, /* R3: koľko otázok už bolo v každej kategórii */
passing:false, /* "odpoveď super" – opponent answering */
originalActive:1, /* who originally had the question */
tbWinner:null, /* víťaz rozstrelu pred zobrazením výsledkov */
feedback:null, /* 'correct' | 'wrong' | null – TV feedback overlay */
stats:{r1:{p1c:0,p1w:0,p2c:0,p2w:0},r2:{p1c:0,p1w:0,p2c:0,p2w:0},r3:{p1c:0,p1w:0,p2c:0,p2w:0}},
};

function reducer(st,a){
const r2c=R2_COUNT;
const r3c=R3_COUNT;
switch(a.type){
case 'NAV':return{...st,screen:a.to};
case 'SET_TEST':return{...st,testMode:a.v};
case 'ADD_P':{const ps=[...st.players,{id:Date.now(),name:a.name,age:a.age,ts:new Date().toISOString()}];S.s('players',ps);return{...st,players:ps}}
case 'EDIT_P':{const ps=st.players.map(p=>p.id===a.id?{...p,name:a.name,age:a.age}:p);S.s('players',ps);return{...st,players:ps}}
case 'DEL_P':{const ps=st.players.filter(p=>p.id!==a.id);S.s('players',ps);return{...st,players:ps}}
case 'SETUP':return{...st,...a.d};

/* ── START GAME ── */
case 'START_GAME':{
const u=new Set(getRecentUsedIds());
const q=pickQ('junior',u,null,null,st.scope);if(q)u.add(q.id);
return{...st,screen:'game',gameOn:true,over:false,
    round:1,qNum:0,curQ:q,usedIds:u,
    s1:0,s2:0,active:1,tRun:false,tSec:R2_TIMER,
    pts:10,revealed:false,answered:false,
    winner:null,selCat:null,tb1:'',tb2:'',
    r1phase:1,r1qCount:0,r1timer:R1_TIME,r1tRun:false,
    showRoundSummary:false,summaryRound:null,
    usedCats:[],roundCats:[],catQCounts:{},passing:false,originalActive:1,tbWinner:null,
    stats:{r1:{p1c:0,p1w:0,p2c:0,p2w:0},r2:{p1c:0,p1w:0,p2c:0,p2w:0},r3:{p1c:0,p1w:0,p2c:0,p2w:0}}}}

/* ── START GAME at Round 2 ── */
case 'START_GAME_R2':{
const u=new Set(getRecentUsedIds());
const rc2=pickRoundCats(st.diff||'junior',st.scope||'sk',10);
return{...st,screen:'game',gameOn:true,over:false,
    round:2,qNum:0,curQ:null,usedIds:u,
    s1:0,s2:0,active:1,originalActive:1,tRun:false,tSec:R2_TIMER,
    pts:10,revealed:false,answered:false,
    winner:null,selCat:null,tb1:'',tb2:'',
    r1phase:2,r1qCount:0,r1timer:0,r1tRun:false,
    showRoundSummary:false,summaryRound:null,
    usedCats:[],roundCats:rc2,catQCounts:{},passing:false,tbWinner:null,
    stats:{r1:{p1c:0,p1w:0,p2c:0,p2w:0},r2:{p1c:0,p1w:0,p2c:0,p2w:0},r3:{p1c:0,p1w:0,p2c:0,p2w:0}}}}

/* ── R1 Timer ── */
case 'R1_START':return{...st,r1tRun:true};
case 'R1_TICK':{
const n=st.r1timer-1;
if(n<=0){
    /* Time's up for this player */
    if(st.r1phase===1){
        const u2=new Set(st.usedIds),q=pickQ('junior',u2,null,null,st.scope);if(q)u2.add(q.id);
        return{...st,r1timer:R1_TIME,r1tRun:false,r1phase:2,r1qCount:0,active:2,curQ:q,usedIds:u2,answered:false,revealed:false,pts:10}
    }
    return{...st,r1timer:0,r1tRun:false,showRoundSummary:true,summaryRound:1,curQ:null,answered:false,revealed:false}
}
return{...st,r1timer:n}
}

case 'SET_PTS':return{...st,pts:a.v};
case 'REVEAL':return{...st,revealed:true};

/* ── CORRECT ── */
case 'CORRECT':{
const p=st.active;
const rk=st.round===1?'r1':st.round===2?'r2':'r3';
const sk=p===1?'p1c':'p2c';
const newStats={...st.stats,[rk]:{...st.stats[rk],[sk]:st.stats[rk][sk]+1}};
if(st.round===1){
    return{...st,s1:p===1?st.s1+10:st.s1,s2:p===2?st.s2+10:st.s2,answered:true,stats:newStats}
}
const pv=st.pts;
return{...st,s1:p===1?st.s1+pv:st.s1,s2:p===2?st.s2+pv:st.s2,answered:true,tRun:false,passing:false,stats:newStats,feedback:'correct',revealed:true}
}

/* ── WRONG ── */
case 'WRONG':{
const p=st.active;
const rk=st.round===1?'r1':st.round===2?'r2':'r3';
const sk=p===1?'p1w':'p2w';
const newStats={...st.stats,[rk]:{...st.stats[rk],[sk]:st.stats[rk][sk]+1}};
if(st.round===1){
    return{...st,answered:true,stats:newStats}
}
const pv=st.pts;
return{...st,s1:p===1?st.s1-pv:st.s1,s2:p===2?st.s2-pv:st.s2,answered:true,tRun:false,passing:false,stats:newStats,feedback:'wrong',revealed:true}
}

/* ── SKIP (R1 "Ďalej" / no points) ── */
case 'SKIP':return{...st,answered:true,tRun:false,passing:false};

/* ── PASS SUPER: original player loses pts, opponent gets a chance ── */
case 'PASS_SUPER':{
const opp=st.active===1?2:1;
const pv=st.pts;
const rk=st.round===2?'r2':'r3';
const wk=st.active===1?'p1w':'p2w';
const ns={...st.stats,[rk]:{...st.stats[rk],[wk]:st.stats[rk][wk]+1}};
return{...st,passing:true,originalActive:st.active,active:opp,
    s1:st.active===1?st.s1-pv:st.s1,s2:st.active===2?st.s2-pv:st.s2,
    tRun:true,tSec:R2_TIMER,revealed:false,stats:ns}
}

/* ── R2/R3 Timer ── */
case 'T_START':return{...st,tRun:true,tSec:R2_TIMER};
case 'T_TICK':{const n=st.tSec-1;return n<=0?{...st,tSec:0,tRun:false}:{...st,tSec:n}}
case 'T_STOP':return{...st,tRun:false};

/* ── NEXT QUESTION ── */
case 'NEXT_Q':{
if(st.showRoundSummary) return st;
/* === Round 1 === */
if(st.round===1){
    const nc=st.r1qCount+1;
    if(st.r1timer<=0||nc>=R1_MAX_Q){
        /* Time ran out or question limit reached */
        if(st.r1phase===1){
            const u2=new Set(st.usedIds),q=pickQ('junior',u2,null,null,st.scope);if(q)u2.add(q.id);
            return{...st,r1phase:2,r1qCount:0,r1timer:R1_TIME,r1tRun:false,active:2,curQ:q,usedIds:u2,answered:false,revealed:false,pts:10}
        }
        return{...st,showRoundSummary:true,summaryRound:1,r1tRun:false,curQ:null,answered:false,revealed:false}
    }
    const u2=new Set(st.usedIds),q=pickQ('junior',u2,null,null,st.scope);if(q)u2.add(q.id);
    return{...st,r1qCount:nc,curQ:q,usedIds:u2,answered:false,revealed:false,pts:10}
}
/* === Round 2 === */
if(st.round===2){
    const nq=st.qNum+1;
    if(nq>=r2c){
        return{...st,showRoundSummary:true,summaryRound:2,tRun:false,curQ:null,answered:false,revealed:false,selCat:null,passing:false}
    }
    const na=nq%2===0?1:2;
    return{...st,qNum:nq,curQ:null,usedIds:st.usedIds,active:na,originalActive:na,tRun:false,
        tSec:R2_TIMER,revealed:false,answered:false,selCat:null,pts:10,passing:false}
}
/* === Round 3 (2 otázky na kategóriu, kategória zmizne po 2) === */
if(st.round===3){
    /* Aktualizuj catQCounts pre práve zodpovedanú kategóriu */
    const cqc={...st.catQCounts};
    if(st.selCat)cqc[st.selCat]=(cqc[st.selCat]||0)+1;
    /* Ak kategória dosiahla 2, pridaj do usedCats */
    const uc=[...st.usedCats];
    if(st.selCat&&(cqc[st.selCat]||0)>=R3_Q_PER_CAT&&!uc.includes(st.selCat))uc.push(st.selCat);
    const nq=st.qNum+1;
    if(nq>=r3c){
        return{...st,showRoundSummary:true,summaryRound:3,tRun:false,curQ:null,answered:false,revealed:false,selCat:null,passing:false,catQCounts:cqc,usedCats:uc}
    }
    const na=nq%2===0?2:1;
    return{...st,qNum:nq,curQ:null,usedIds:st.usedIds,active:na,originalActive:na,tRun:false,
        tSec:R2_TIMER,revealed:false,answered:false,selCat:null,pts:10,passing:false,catQCounts:cqc,usedCats:uc}
}
return st;
}

/* ── NEXT ROUND (from summary) ── */
case 'NEXT_ROUND':{
if(st.summaryRound===1){
    const rc2=pickRoundCats(st.diff,st.scope,10);
    return{...st,round:2,qNum:0,curQ:null,active:1,originalActive:1,showRoundSummary:false,summaryRound:null,
        tRun:false,tSec:R2_TIMER,revealed:false,answered:false,selCat:null,pts:10,usedCats:[],roundCats:rc2,catQCounts:{},passing:false}
}
if(st.summaryRound===2){
    const rc3=pickRoundCats(st.diff,st.scope,10);
    return{...st,round:3,qNum:0,curQ:null,active:2,originalActive:2,showRoundSummary:false,summaryRound:null,
        tRun:false,tSec:R2_TIMER,revealed:false,answered:false,selCat:null,pts:10,usedCats:[],roundCats:rc3,catQCounts:{},passing:false}
}
if(st.summaryRound===3){
    if(st.s1===st.s2){
        const u2=new Set(st.usedIds),q=pickQ(st.diff,u2,null,'tiebreaker',st.scope);if(q)u2.add(q.id);
        return{...st,round:'tiebreaker',qNum:0,curQ:q,usedIds:u2,active:1,
            showRoundSummary:false,summaryRound:null,
            tRun:false,tSec:R2_TIMER,pts:10,revealed:false,answered:false,selCat:null,tb1:'',tb2:'',passing:false}
    }
    const w=st.s1>st.s2?1:2;
    return{...st,over:true,gameOn:false,winner:w,screen:'results',showRoundSummary:false,summaryRound:null}
}
return st;
}

/* ── Category selection (R2/R3) ── */
case 'SEL_CAT':{
const u2=new Set(st.usedIds),q=pickQ(st.diff,u2,a.cat,null,st.scope);if(q)u2.add(q.id);
/* R2: 1 otázka na kategóriu → hneď odstrániť. R3: 2 otázky → sledujeme cez catQCounts */
const uc=st.round===2?[...st.usedCats,a.cat]:[...st.usedCats];
return{...st,curQ:q,usedIds:u2,selCat:a.cat,usedCats:uc}}

/* ── Confirm pts & auto-start timer (R2/R3) ── */
case 'CONFIRM_PTS':return{...st,tRun:true,tSec:R2_TIMER};

/* ── Tiebreaker ── */
case 'TB_GUESS':return{...st,[a.p===1?'tb1':'tb2']:a.v};
case 'TB_RESOLVE':{
const correct=parseFloat(st.curQ.answer),g1=parseFloat(st.tb1),g2=parseFloat(st.tb2);
const d1=Math.abs(g1-correct),d2=Math.abs(g2-correct);
let w;if(d1<d2)w=1;else if(d2<d1)w=2;else w=Math.random()<.5?1:2;
/* Najprv ukáž víťaza rozstrelu, potom celkový výsledok */
return{...st,tbWinner:w,winner:w,revealed:true}}

/* ── TB → Go to final results ── */
case 'TB_TO_RESULTS':
return{...st,over:true,gameOn:false,screen:'results'}

/* ── Save/End ── */
case 'SAVE':{
const r={id:Date.now(),date:st.gameDate,p1:st.p1,p2:st.p2,s1:st.s1,s2:st.s2,
    diff:st.diff,winner:st.winner===1?st.p1?.name:st.p2?.name,winnerId:st.winner===1?st.p1?.id:st.p2?.id,
    stats:{...st.stats},usedQIds:[...st.usedIds]};
const h=[...st.history,r];S.s('history',h);return{...st,history:h}}
case 'END_GAME':
return{...st,gameOn:false,over:false,screen:'home',curQ:null,tRun:false,r1tRun:false,testMode:false,showRoundSummary:false,passing:false,feedback:null};
case 'CLEAR_FEEDBACK':return{...st,feedback:null};
case 'UPD_SETTINGS':{
const s={...st.settings,...a.s};S.s('settings',s);SFX.enabled=s.sound;
if(a.s.theme!==undefined)applyTheme(a.s.theme);
return{...st,settings:s}}
case 'DEL_HIST':{const h=st.history.filter(x=>x.id!==a.id);S.s('history',h);return{...st,history:h}}
case 'CLR_HIST':{S.s('history',[]);return{...st,history:[]}}

/* ── JUMP to any round (manual override) ── */
case 'JUMP_ROUND':{
const target=a.round; /* 1, 2, 3, or 'tiebreaker' */
const base={...st,screen:'game',gameOn:true,over:false,winner:null,tbWinner:null,
    showRoundSummary:false,summaryRound:null,tRun:false,tSec:R2_TIMER,r1tRun:false,
    selCat:null,usedCats:[],catQCounts:{},pts:10,revealed:false,answered:false,passing:false};
if(target===1){
    const u2=new Set(st.usedIds),q=pickQ('junior',u2,null,null,st.scope);if(q)u2.add(q.id);
    return{...base,round:1,qNum:0,curQ:q,usedIds:u2,active:1,originalActive:1,
        r1phase:1,r1qCount:0,r1timer:R1_TIME,roundCats:[]}
}
if(target===2){
    const rc2=pickRoundCats(st.diff,st.scope,10);
    return{...base,round:2,qNum:0,curQ:null,active:1,originalActive:1,r1phase:2,r1qCount:0,r1timer:0,roundCats:rc2}
}
if(target===3){
    const rc3=pickRoundCats(st.diff,st.scope,10);
    return{...base,round:3,qNum:0,curQ:null,active:2,originalActive:2,r1phase:2,r1qCount:0,r1timer:0,roundCats:rc3}
}
if(target==='tiebreaker'){
    const u2=new Set(st.usedIds),q=pickQ(st.diff,u2,null,'tiebreaker',st.scope);if(q)u2.add(q.id);
    return{...base,round:'tiebreaker',qNum:0,curQ:q,usedIds:u2,active:1,
        r1phase:2,r1qCount:0,r1timer:0,tb1:'',tb2:''}
}
return st;
}

/* Force end R1 – fallback when auto-advance fails */
case 'FORCE_R1_END':
return{...st,showRoundSummary:true,summaryRound:1,r1tRun:false,curQ:null,answered:false,revealed:false};

/* ── Cloud sync incoming ── */
case '_CLOUD_PLAYERS':return st.gameOn?st:{...st,players:a.v||[]};
case '_CLOUD_HISTORY':return st.gameOn?st:{...st,history:a.v||[]};
case '_CLOUD_SETTINGS':{
    const s=a.v||st.settings;
    SFX.enabled=s.sound;
    if(s.theme!==undefined)applyTheme(s.theme);
    return{...st,settings:s};
}

default:return st;
}
}

/* ═══════════════ CONTEXT ═══════════════ */
const Ctx=createContext();
function Provider({children}){
const[st,dp]=useReducer(reducer,init);
const r1Ref=useRef(null);
const timerRef=useRef(null);

/* R1 90-second timer */
useEffect(()=>{
    if(st.r1tRun&&st.round===1){
        r1Ref.current=setInterval(()=>dp({type:'R1_TICK'}),1000);
        return()=>clearInterval(r1Ref.current);
    }else{if(r1Ref.current){clearInterval(r1Ref.current);r1Ref.current=null}}
},[st.r1tRun,st.round]);

/* R1 timer sounds */
useEffect(()=>{
    if(!st.r1tRun||st.round!==1)return;
    if(st.r1timer>5)SFX.tick();else if(st.r1timer>0)SFX.tickLow();else if(st.r1timer===0)SFX.buzzer();
},[st.r1timer,st.r1tRun,st.round]);

/* R2/R3 Timer */
useEffect(()=>{
    if(st.tRun&&st.round!==1){
        timerRef.current=setInterval(()=>dp({type:'T_TICK'}),1000);
        return()=>clearInterval(timerRef.current);
    }else{if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null}}
},[st.tRun,st.round]);

/* R2/R3 Timer sounds */
useEffect(()=>{
    if(!st.tRun||st.round===1)return;
    if(st.tSec>3)SFX.tick();else if(st.tSec>0)SFX.tickLow();else if(st.tSec===0)SFX.buzzer();
},[st.tSec,st.tRun,st.round]);

/* Round-end & winner sounds */
useEffect(()=>{if(st.showRoundSummary)SFX.roundEnd()},[st.showRoundSummary]);
useEffect(()=>{if(st.over)SFX.winner()},[st.over]);
/* Auto-clear feedback overlay after 2.5s */
useEffect(()=>{
    if(st.feedback){const t=setTimeout(()=>dp({type:'CLEAR_FEEDBACK'}),2500);return()=>clearTimeout(t)}
},[st.feedback]);

/* TV sync */
useEffect(()=>{
    if(st.testMode)return;
    if(!st.gameOn&&st.screen!=='results'&&!st.showRoundSummary){
        sendTV('WAITING',{});return;
    }
    const r2c=R2_COUNT,r3c=R3_COUNT;
    const allCats=getCats(st.diff,st.round,st.roundCats,st.scope);
    const availCats=allCats.filter(c=>!st.usedCats.includes(c));
    const showQOnTV=(st.round===1&&st.r1tRun)||st.tRun||st.answered||st.passing||st.tSec<R2_TIMER;
    const r3picker=st.round===3?(st.active===1?2:1):st.active;
    const payload={
        screen:st.screen,p1:st.p1,p2:st.p2,s1:st.s1,s2:st.s2,
        round:st.round,roundName:ROUND_NAMES[st.round],
        qNum:st.round===1?st.r1qCount+1:st.qNum+1,
        qTotal:st.round===1?R1_MAX_Q:st.round===2?r2c:r3c,
        q:showQOnTV&&st.curQ?{question:st.curQ.question,category:CAT_LABELS[st.curQ.category]||st.curQ.category,
            catKey:st.curQ.category,type:st.curQ.type}:null,
        answer:st.revealed?st.curQ?.answer:null,
        active:st.active,picker:r3picker,tRun:st.tRun,tSec:st.tSec,tDur:R2_TIMER,
        pts:st.pts,diff:st.diff,
        over:st.over,winner:st.winner,answered:st.answered,
        r1phase:st.r1phase,r1timer:st.r1timer,r1tRun:st.r1tRun,
        selCat:st.selCat,
        showRoundSummary:st.showRoundSummary,summaryRound:st.summaryRound,
        stats:st.stats,categories:availCats,usedCats:st.usedCats,catQCounts:st.catQCounts||{},
        passing:st.passing,originalActive:st.originalActive,
        tb1:st.tb1,tb2:st.tb2,tbWinner:st.tbWinner,tbQ:st.round==='tiebreaker'&&st.curQ?{question:st.curQ.question,answer:st.revealed?st.curQ.answer:null}:null,
        theme:st.settings.theme||'dark',
        feedback:st.feedback,
        scope:st.scope||'sk',
    };
    sendTV('UPDATE',payload);
});

useEffect(()=>{
    SFX.enabled=st.settings.sound;
    applyTheme(st.settings.theme||'dark');
},[]);

/* ── Cloud sync: listen for remote changes ── */
useEffect(()=>{
    console.log('[Cloud] Starting Firestore listeners…');
    S.listen('players',(val)=>{dp({type:'_CLOUD_PLAYERS',v:val})});
    S.listen('history',(val)=>{dp({type:'_CLOUD_HISTORY',v:val})});
    S.listen('settings',(val)=>{dp({type:'_CLOUD_SETTINGS',v:val})});
},[]);

return <Ctx.Provider value={{st,dp}}>{children}</Ctx.Provider>;
}

/* Category picker TV display */
if((st.round===2||st.round===3)&&!st.selCat)return(

                            {remaining}/{R3_Q_PER_CAT}
                        </span>}
                    </div>
                    );
                })}
            </div>}
        </div>
    </div>
);

/* Active game (question shown) */
const timerFrac=R2_TIMER>0?st.tSec/R2_TIMER:1;
const circ=2*Math.PI*42;
const dashOff=circ*(1-timerFrac);
const tCol=st.tSec<=3?'#ef4444':st.tSec<=6?'#eab308':'#22c55e';
/* R1 timer display */
const r1frac=st.r1timer/R1_TIME;
const r1dashOff=circ*(1-r1frac);
const r1Col=st.r1timer<=10?'#ef4444':st.r1timer<=20?'#eab308':'#22c55e';

return(
    <div className={`h-full flex flex-col ${isJunior?'junior-bg':'standard-bg'} overflow-hidden`}>
        <div className="flex items-center justify-between px-4 py-2 bg-black/30 text-xs">
            <div className="flex items-center gap-2">
                <span className="text-accent font-black text-sm">QUIZ 2026</span>
                <span className="text-slate-500">│</span>
                <span className="text-slate-300">{ROUND_NAMES[st.round]}</span>
            </div>
            <span className="text-slate-400">{st.round===1?`${st.r1phase===1?st.p1?.name:st.p2?.name}`:`Otázka ${qNum}/${qTotal}`}</span>
        </div>
        <div className="flex-1 flex items-center justify-between px-4 py-2 gap-4">
            {/* P1 */}
            <div className={`w-36 rounded-xl border-2 p-3 ${st.active===1?'border-p1 bg-blue-950/50 shadow-lg':'border-slate-800 bg-black/20'}`}>
                {st.active===1&&<div className="text-center mb-1"><span className="text-[10px] font-bold text-p1 animate-pulse">● ODPOVEDÁ</span></div>}
                <div className="text-center mb-1"><h3 className={`text-sm font-bold ${st.active===1?'text-white':'text-slate-400'}`}>{st.p1?.name}</h3></div>
                <div className="text-center"><div className={`text-4xl font-black ${st.s1<0?'text-red-400':'text-p1'}`}>{st.s1}</div></div>
            </div>
            {/* Center */}
            <div className="flex-1 flex flex-col items-center justify-center gap-4 max-w-2xl">
                {/* R1: 90s timer */}
                {st.round===1&&st.r1tRun&&(
                    <div className="relative flex items-center justify-center">
                        <svg width="80" height="80" viewBox="0 0 96 96" className={st.r1timer<=10?'anim-pulse':''}>
                            <circle cx="48" cy="48" r="42" fill="none" stroke="#1e293b" strokeWidth="4"/>
                            <circle cx="48" cy="48" r="42" fill="none" stroke={r1Col} strokeWidth="4"
                                strokeDasharray={circ} strokeDashoffset={r1dashOff} strokeLinecap="round" className="timer-ring" transform="rotate(-90 48 48)"/>
                        </svg>
                        <span className={`absolute text-2xl font-black ${st.r1timer<=10?'text-red-400':'text-white'}`}>{st.r1timer}</span>
                    </div>
                )}
                {/* R2/R3 timer */}
                {st.round!==1&&st.round!=='tiebreaker'&&(st.tRun||st.tSec<R2_TIMER)&&(
                    <div className="relative flex items-center justify-center">
                        <svg width="80" height="80" viewBox="0 0 96 96" className={st.tRun&&st.tSec<=3?'anim-pulse':''}>
                            <circle cx="48" cy="48" r="42" fill="none" stroke="#1e293b" strokeWidth="4"/>
                            <circle cx="48" cy="48" r="42" fill="none" stroke={tCol} strokeWidth="4"
                                strokeDasharray={circ} strokeDashoffset={dashOff} strokeLinecap="round" className="timer-ring" transform="rotate(-90 48 48)"/>
                        </svg>
                        <span className={`absolute text-2xl font-black ${st.tSec<=3?'text-red-400':'text-white'}`}>{st.tSec}</span>
                    </div>

                {st.round===1&&<div className="text-center text-sm text-slate-400">{st.r1phase===1?st.p1?.name:st.p2?.name} odpovedá · 10 bodov</div>}
                {st.round!==1&&st.curQ&&<div className="flex items-center gap-1"><span className="text-accent font-black text-xl">{st.pts}</span><span className="text-slate-400 text-xs">b</span></div>}
                {st.passing&&<div className="text-center text-yellow-400 font-bold text-sm animate-pulse">⚡ ODPOVEĎ SUPER</div>}
                {embShowQ&&st.curQ?(
                    <div className="anim-slide text-center w-full">
                        <span className={`text-base font-semibold uppercase tracking-widest mb-2 block ${isJunior?'text-purple-400':'text-accent/70'}`}>
                            {CAT_LABELS[st.curQ.category]||st.curQ.category}
                        </span>
                        <div className={`bg-black/40 border ${isJunior?'border-purple-500/30':'border-accent/20'} rounded-2xl p-6`}>
                            <p className="font-bold text-3xl leading-relaxed">{st.curQ.question}</p>
                        </div>
                    </div>
                ):<div className="text-slate-600 text-base">Čakám na otázku…</div>}
                {st.revealed&&st.curQ&&(
                    <div className="anim-pop"><div className="bg-ok/10 border border-ok/30 rounded-xl px-5 py-3"><span className="text-ok font-bold text-xl">✓ {st.curQ.answer}</span></div></div>

            </div>
            {/* P2 */}
            <div className={`w-36 rounded-xl border-2 p-3 ${st.active===2?'border-p2 bg-red-950/50 shadow-lg':'border-slate-800 bg-black/20'}`}>

                <div className="text-center mb-1"><h3 className={`text-sm font-bold ${st.active===2?'text-white':'text-slate-400'}`}>{st.p2?.name}</h3></div>

            </div>
        </div>
    </div>
);
}

/* ════════════ GAME SCREEN ════════════ */
function GameScreen(){
/* ═══ ALL HOOKS – MUST be at the very top, NEVER after a conditional return ═══ */
const{st,dp}=use$();
const[ptsConfirmed,setPtsConfirmed]=useState(false);
const[showRoundSwitcher,setShowRoundSwitcher]=useState(false);
const[ttsOn,setTtsOn]=useState(false);
const stRef=useRef(st);stRef.current=st;
const allCats=useMemo(()=>getCats(st.diff,st.round,st.roundCats,st.scope),[st.diff,st.round,st.roundCats,st.scope]);
useEffect(()=>{setPtsConfirmed(false)},[st.qNum,st.round,st.selCat]);
useEffect(()=>{
    TTS.enabled=ttsOn;
    if(ttsOn){/* unlock speech synthesis (Safari) */
        try{const u=new SpeechSynthesisUtterance('');u.volume=0;speechSynthesis.speak(u);speechSynthesis.cancel()}catch(e){}
    }
    return()=>TTS.stop();
},[ttsOn]);
/* ═══ END OF HOOKS – no more useState/useEffect/useMemo below this line ═══ */

const openTVWindow=()=>{const L=window.screen.width;window.open('tv.html','QUIZ_TV',`width=1920,height=1080,left=${L},top=0,menubar=no,toolbar=no`)};
const isTB=st.round==='tiebreaker';
const isR1=st.round===1;
const isR2=st.round===2;
const isR3=st.round===3;
const qTotal=isR1?R1_MAX_Q:isR2?R2_COUNT:R3_COUNT;
const qDisplay=isR1?st.r1qCount+1:st.qNum+1;
const availCats=allCats.filter(c=>!st.usedCats.includes(c));

/* ── Handlers ── */
const r1Start=()=>{dp({type:'R1_START'});TTS.speak(st.curQ?.question)};
const r1Correct=()=>{SFX.correct();dp({type:'CORRECT'});dp({type:'NEXT_Q'});
    TTS.after(()=>{const s=stRef.current;return s.round===1&&s.r1tRun?s.curQ?.question:null},1000)};
const r1Wrong=()=>{SFX.wrong();dp({type:'WRONG'});dp({type:'NEXT_Q'});
    TTS.after(()=>{const s=stRef.current;return s.round===1&&s.r1tRun?s.curQ?.question:null},1000)};
const r1Skip=()=>{dp({type:'SKIP'});dp({type:'NEXT_Q'});
    TTS.after(()=>{const s=stRef.current;return s.round===1&&s.r1tRun?s.curQ?.question:null},1000)};
const r2Correct=()=>{SFX.correct();dp({type:'CORRECT'})};
const r2Wrong=()=>{SFX.wrong();dp({type:'WRONG'})};
const r2Super=()=>{TTS.stop();dp({type:'PASS_SUPER'})};
const forceEndR1=()=>{TTS.stop();dp({type:'FORCE_R1_END'})};
const jumpTo=(r)=>{
    TTS.stop();
    dp({type:'JUMP_ROUND',round:r});
    setShowRoundSwitcher(false);
};

/* ── Reusable jump buttons ── */
const jumpBtns=(
    <div className="mt-4 flex flex-wrap gap-2 justify-center">
        <span className="text-xs w-full text-center mb-1" style={{color:'var(--textSub)'}}>Preskočiť na:</span>
        <Btn cls="text-xs py-1 px-3 hover:opacity-80" style={{background:'var(--card2)'}} onClick={()=>jumpTo(1)}>⚡ 1. kolo</Btn>
        <Btn cls="text-xs py-1 px-3 hover:opacity-80" style={{background:'var(--card2)'}} onClick={()=>jumpTo(2)}>🎯 2. kolo</Btn>
        <Btn cls="text-xs py-1 px-3 hover:opacity-80" style={{background:'var(--card2)'}} onClick={()=>jumpTo(3)}>🏁 3. kolo</Btn>
        <Btn cls="text-xs py-1 px-3 hover:opacity-80" style={{background:'var(--card2)'}} onClick={()=>jumpTo('tiebreaker')}>⚔️ Rozstrel</Btn>
    </div>
);

/* ── Stuck detection ── */
const r1StuckDetected=isR1&&!st.showRoundSummary&&!st.r1tRun&&(
    (st.r1phase===2&&(st.r1timer<=0||(st.r1qCount>=R1_MAX_Q-1&&st.answered)))||
    (!st.curQ&&!st.answered)
);

/* ═══════════════════════════════════════════════════════
   DETERMINE WHAT TO SHOW (no early returns!)
   ═══════════════════════════════════════════════════════ */

let gameView=null;

/* ── A) R1 Stuck Recovery ── */
if(r1StuckDetected){
    const rd=st.stats.r1;
    gameView=(
        <div className="flex flex-col items-center justify-center min-h-[60vh] p-6">
            <div className="anim-pop text-center">
                <h2 className="text-2xl font-bold mb-1" style={{color:'var(--textSub)'}}>Koniec 1. kola</h2>
                <h3 className="text-3xl font-black text-accent mb-6">{ROUND_NAMES[1]}</h3>
                <div className="flex items-center justify-center gap-12 mb-6">
                    <div className="text-center">
                        <div className="text-sm text-p1 font-semibold mb-1">🔵 {st.p1?.name}</div>
                        <div className="text-6xl font-black text-p1">{st.s1}</div>
                        <div className="text-xs mt-2"><span className="text-green-400 font-bold">{rd.p1c}✓</span> <span className="text-red-400 font-bold">{rd.p1w}✗</span></div>
                    </div>
                    <div className="text-4xl font-bold" style={{color:'var(--border)'}}>:</div>
                    <div className="text-center">
                        <div className="text-sm text-p2 font-semibold mb-1">🔴 {st.p2?.name}</div>
                        <div className="text-6xl font-black text-p2">{st.s2}</div>
                        <div className="text-xs mt-2"><span className="text-green-400 font-bold">{rd.p2c}✓</span> <span className="text-red-400 font-bold">{rd.p2w}✗</span></div>
                    </div>
                </div>
                {st.s1>st.s2&&<p className="text-p1 font-bold text-lg mb-4">🔵 {st.p1?.name} vedie!</p>}
                {st.s2>st.s1&&<p className="text-p2 font-bold text-lg mb-4">🔴 {st.p2?.name} vedie!</p>}
                {st.s1===st.s2&&<p className="text-accent font-bold text-lg mb-4">⚖️ Remíza!</p>}
                <Btn cls="bg-gradient-to-r from-yellow-500 to-amber-500 text-black hover:from-yellow-400 hover:to-amber-400 text-lg py-3 px-8 shadow-lg shadow-yellow-500/20"
                    onClick={()=>jumpTo(2)}>
                    ▶ Pokračovať do 2. kola
                </Btn>
                {jumpBtns}
            </div>
        </div>
    );
}

/* ── B) Round Summary ── */
else if(st.showRoundSummary){
    const rk=st.summaryRound===1?'r1':st.summaryRound===2?'r2':'r3';
    const rd=st.stats[rk]||{p1c:0,p1w:0,p2c:0,p2w:0};
    gameView=(
        <div className="flex flex-col items-center justify-center min-h-[60vh] p-6">
            <div className="anim-pop text-center">
                <h2 className="text-2xl font-bold mb-1" style={{color:'var(--textSub)'}}>Koniec {st.summaryRound}. kola</h2>
                <h3 className="text-3xl font-black text-accent mb-6">{ROUND_NAMES[st.summaryRound]}</h3>
                <div className="flex items-center justify-center gap-12 mb-6">
                    <div className="text-center">
                        <div className="text-sm text-p1 font-semibold mb-1">🔵 {st.p1?.name}</div>
                        <div className="text-6xl font-black text-p1">{st.s1}</div>
                        <div className="text-xs mt-2"><span className="text-green-400 font-bold">{rd.p1c}✓</span> <span className="text-red-400 font-bold">{rd.p1w}✗</span></div>
                    </div>
                    <div className="text-4xl font-bold" style={{color:'var(--border)'}}>:</div>
                    <div className="text-center">
                        <div className="text-sm text-p2 font-semibold mb-1">🔴 {st.p2?.name}</div>
                        <div className="text-6xl font-black text-p2">{st.s2}</div>
                        <div className="text-xs mt-2"><span className="text-green-400 font-bold">{rd.p2c}✓</span> <span className="text-red-400 font-bold">{rd.p2w}✗</span></div>
                    </div>
                </div>
                {st.s1>st.s2&&<p className="text-p1 font-bold text-lg mb-4">🔵 {st.p1?.name} vedie!</p>}
                {st.s2>st.s1&&<p className="text-p2 font-bold text-lg mb-4">🔴 {st.p2?.name} vedie!</p>}
                {st.s1===st.s2&&<p className="text-accent font-bold text-lg mb-4">⚖️ Remíza!</p>}
                <Btn cls="bg-gradient-to-r from-yellow-500 to-amber-500 text-black hover:from-yellow-400 hover:to-amber-400 text-lg py-3 px-8 shadow-lg shadow-yellow-500/20"
                    onClick={()=>dp({type:'NEXT_ROUND'})}>
                    {st.summaryRound<3?`▶ Pokračovať do ${st.summaryRound+1}. kola`:'🏁 Výsledky'}
                </Btn>
                {jumpBtns}
            </div>
        </div>
    );
}

/* ── C) Normal Game ── */
else{
    /* Header */
    const header=(
        <div className="px-4 py-2 flex items-center justify-between border-b" style={{background:'var(--card)',borderColor:'var(--border)'}}>
            <div className="flex items-center gap-4">
                <button onClick={()=>{if(confirm('Ukončiť hru?')){TTS.stop();dp({type:'END_GAME'})}}}
                    style={{color:'var(--textSub)'}} className="hover:text-red-400 text-sm">✕ Koniec</button>
                {st.testMode&&<span className="bg-purple-600/30 text-purple-300 text-xs px-2 py-0.5 rounded-lg font-bold">🧪 TEST</span>}
                <span className="text-accent font-bold">{typeof st.round==='number'?`Kolo ${st.round}/3: `:''}{ROUND_NAMES[st.round]}</span>
                {isR1&&<span className="text-sm" style={{color:'var(--textSub)'}}>Fáza: {st.r1phase===1?st.p1?.name:st.p2?.name}</span>}
                {!isR1&&!isTB&&<span style={{color:'var(--textSub)'}} className="text-sm">Otázka {qDisplay}/{qTotal}</span>}
            </div>
            <div className="flex items-center gap-3">
                {st.testMode&&<Btn cls="text-xs py-1 px-2" style={{background:'var(--card2)'}} onClick={()=>dp({type:'SET_TEST',v:false})}>📺 Produkcia</Btn>}
                {!st.testMode&&<Btn cls="text-xs py-1 px-2 hover:opacity-80" style={{background:'var(--card2)'}} onClick={openTVWindow}>🖥️ TV okno</Btn>}
                <Btn cls={`text-xs py-1 px-2 ${ttsOn?'bg-accent text-black font-bold':'hover:opacity-80'}`}
                    style={!ttsOn?{background:'var(--card2)'}:{}} onClick={()=>setTtsOn(v=>!v)}>
                    {ttsOn?'🔊 TTS':'🔇 TTS'}</Btn>
                <span className="text-sm" style={{color:'var(--textSub)'}}>{DIFF_LABELS[st.diff]}</span>
            </div>
        </div>
    );

    /* Player Card */
    const playerCard=(num,name,score,isActive)=>{
    const isActiveAndR1=isR1&&isActive&&!st.answered;
    const isActiveR23=(isR2||isR3)&&isActive&&st.curQ&&!st.answered;
    return(
        <div className={`rounded-2xl p-4 border-2 transition-all duration-300 ${
            isActive?(num===1?'border-p1 bg-blue-500/10 shadow-lg shadow-blue-500/20':'border-p2 bg-red-500/10 shadow-lg shadow-red-500/20')
            :''}`} style={!isActive?{background:'var(--card)',borderColor:'var(--border)'}:{}}>
            <div className="flex items-center gap-2 mb-2">
                <span className={`w-3 h-3 rounded-full ${num===1?'bg-p1':'bg-p2'} ${isActive?'animate-pulse':''}`}/>
                <span className="font-bold">{name}</span>
                {isActive&&<span className="text-[10px] bg-accent/20 text-accent px-2 py-0.5 rounded-lg font-bold">ODPOVEDÁ</span>}
                {st.passing&&isActive&&<span className="text-[10px] bg-yellow-500/20 text-yellow-400 px-2 py-0.5 rounded-lg font-bold">SUPER</span>}
            </div>
            <div className={`text-4xl font-black ${score<0?'text-red-400':num===1?'text-p1':'text-p2'}`}>{score}</div>
            <div className="text-xs" style={{color:'var(--textSub)'}}>bodov</div>
            {isActiveAndR1&&st.r1tRun&&(
                <div className="flex gap-2 mt-3 flex-wrap">
                    <Btn cls="bg-ok/20 text-ok hover:bg-ok/30 text-sm py-2 px-3 flex-1" onClick={r1Correct}>✓ Správne</Btn>
                    <Btn cls="bg-red-500/20 text-red-400 hover:bg-red-500/30 text-sm py-2 px-3 flex-1" onClick={r1Wrong}>✗ Zle</Btn>
                    <Btn cls="text-sm py-2 px-3 flex-1" style={{background:'var(--card2)',color:'var(--textSub)'}} onClick={r1Skip}>→ Ďalej</Btn>
                </div>
            )}
            {isActiveR23&&(
                <div className="flex gap-2 mt-3 flex-wrap">
                    <Btn cls="bg-ok/20 text-ok hover:bg-ok/30 text-sm py-2 px-3 flex-1" onClick={r2Correct}>✓ Správne</Btn>
                    <Btn cls="bg-red-500/20 text-red-400 hover:bg-red-500/30 text-sm py-2 px-3 flex-1" onClick={r2Wrong}>✗ Zle</Btn>
                    {!st.passing&&<Btn cls="bg-yellow-500/20 text-yellow-400 hover:bg-yellow-500/30 text-sm py-2 px-3 flex-1" onClick={r2Super}>⚡ Super</Btn>}
                </div>
            )}
        </div>
    );
    };

                <h3 className="text-2xl font-black text-accent">Víťaz rozstrelu</h3>

                    <span>🔵 {st.p1?.name}: {st.tb1}</span>

                    <Btn cls={`text-sm py-2 px-4 ${st.round===1?'bg-accent text-black font-bold':'hover:opacity-80'}`}

                    <Btn cls={`text-sm py-2 px-4 ${st.round===3?'bg-accent text-black font-bold':'hover:opacity-80'}`}

                    <Btn cls={`text-sm py-2 px-4 ${st.round==='tiebreaker'?'bg-accent text-black font-bold':'hover:opacity-80'}`}

if(st.testMode){
    const isCentered=r1StuckDetected||st.showRoundSummary;
    return(
        <div className="h-screen flex flex-col">
            <div className="bg-purple-900/50 border-b border-purple-500/30 px-4 py-1 flex items-center justify-between">
                <span className="text-purple-300 font-bold text-sm">🧪 TESTOVACÍ REŽIM</span>

                    onClick={()=>dp({type:'SET_TEST',v:false})}>📺 Produkcia</Btn>
            </div>
            <div className="flex-1 flex overflow-hidden">
                <div className={`w-1/2 ${isCentered?'flex items-center justify-center':'flex flex-col'} overflow-y-auto border-r`} style={{background:'var(--bg)',borderColor:'var(--border)'}}>
                    {gameView}
                </div>
                <div className="w-1/2 relative overflow-hidden">
                    <EmbeddedTV/>
                    {st.feedback&&(
                        <div className={`absolute inset-0 z-50 flex flex-col items-center justify-center pointer-events-none ${st.feedback==='correct'?'bg-green-500/85':'bg-red-500/85'}`}
                            style={{animation:'scale-pop .4s ease-out'}}>
                            <span className="text-[80px]">{st.feedback==='correct'?'✓':'✗'}</span>
                            <h1 className="text-3xl font-black text-white">{st.feedback==='correct'?'SPRÁVNE!':'NESPRÁVNE!'}</h1>
                            {st.curQ&&<p className="text-xl text-white/90 font-bold mt-2">{st.curQ.answer}</p>}
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

if(r1StuckDetected||st.showRoundSummary){
    return <div className="min-h-screen flex items-center justify-center">{gameView}</div>;
}
return gameView;
}

/* ════════════ LEADERBOARD ════════════ */
function LeaderboardScreen(){
const{st,dp}=use$();
const[filterDiff,setFilter]=useState('all');
const filtered=filterDiff==='all'?st.history:st.history.filter(h=>h.diff===filterDiff);
const wins={};
filtered.forEach(h=>{wins[h.winner]=(wins[h.winner]||0)+1});
const sorted=Object.entries(wins).sort((a,b)=>b[1]-a[1]);
const exportXLS=()=>{
    const data=sorted.map(([name,count],i)=>({'Poradie':i+1,'Hráč':name,'Víťazstvá':count}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Rebríček');
    XLSX.writeFile(wb,`DUEL_Rebricek_${new Date().toISOString().slice(0,10)}.xlsx`);
};
return(
<div className="max-w-xl mx-auto p-6">
    <button onClick={()=>dp({type:'NAV',to:'home'})} style={{color:'var(--textSub)'}} className="hover:text-accent mb-4">← Späť</button>
    <div className="flex items-center justify-between mb-6">
        <h2 className="text-3xl font-bold">🏆 Rebríček</h2>
        {sorted.length>0&&<Btn cls="bg-ok/20 text-ok hover:bg-ok/30 text-sm" onClick={exportXLS}>📥 Excel</Btn>}
    </div>
    <div className="flex gap-2 mb-4 flex-wrap">
        <button onClick={()=>setFilter('all')} className={`px-3 py-1 rounded-xl text-sm font-semibold ${filterDiff==='all'?'bg-accent text-black':''}`}
            style={filterDiff!=='all'?{background:'var(--card2)'}:{}}>Všetky</button>
        {Object.entries(DIFF_LABELS).map(([k,v])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`px-3 py-1 rounded-xl text-sm font-semibold ${filterDiff===k?'bg-accent text-black':''}`}
                style={filterDiff!==k?{background:'var(--card2)'}:{}}>{v}</button>
        ))}
    </div>
    {sorted.length===0?<p style={{color:'var(--textSub)'}} className="text-center py-8">Žiadne výsledky.</p>:
    <div className="space-y-2">{sorted.map(([name,count],i)=>(
        <div key={name} className="rounded-xl p-4 flex items-center justify-between border" style={{background:'var(--card)',borderColor:'var(--border)'}}>
            <div className="flex items-center gap-3">
                <span className={`text-2xl font-black w-10 text-center ${i===0?'text-yellow-400':i===1?'text-slate-300':i===2?'text-orange-400':''}`} style={i>2?{color:'var(--textSub)'}:{}}>
                    {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'.'}</span>
                <span className="font-semibold">{name}</span>
            </div>
            <span className="text-accent font-bold text-lg">{count} {count===1?'výhra':count<5?'výhry':'výhier'}</span>
        </div>
    ))}</div>}
</div>
);
}

return(

    <div className="flex items-center justify-between mb-6">
        <h2 className="text-3xl font-bold">📋 História hier</h2>
        {st.history.length>0&&<Btn cls="bg-red-500/20 text-red-400 hover:bg-red-500/30 text-sm" onClick={()=>{if(confirm('Vymazať celú históriu?'))dp({type:'CLR_HIST'})}}>🗑️ Všetko</Btn>}
    </div>
    {st.history.length===0?<p style={{color:'var(--textSub)'}} className="text-center py-8">Žiadne hry.</p>:
    <div className="space-y-2">{[...st.history].reverse().map(h=>(
        <div key={h.id} className="rounded-xl p-4 border" style={{background:'var(--card)',borderColor:'var(--border)'}}>
            <div className="flex items-center justify-between mb-2">
                <span className="text-sm" style={{color:'var(--textSub)'}}>{h.date} · {DIFF_LABELS[h.diff]||h.diff}</span>
                <button onClick={()=>dp({type:'DEL_HIST',id:h.id})} className="text-red-400/50 hover:text-red-400 text-xs">✕</button>
            </div>
            <div className="flex items-center gap-3">
                <span className={`font-bold ${h.winner===h.p1?.name?'text-accent':''}`}>{h.p1?.name}</span>
                <span className="text-p1 font-black text-lg">{h.s1}</span>
                <span style={{color:'var(--border)'}}>:</span>
                <span className="text-p2 font-black text-lg">{h.s2}</span>
                <span className={`font-bold ${h.winner===h.p2?.name?'text-accent':''}`}>{h.p2?.name}</span>
                <span className="ml-auto text-accent">🏆 {h.winner}</span>
            </div>
        </div>
    ))}</div>}
</div>
);
}

/* ════════════ APP ════════════ */
function App(){
const{st}=use$();
switch(st.screen){
    case 'home':return <HomeScreen/>;
    case 'players':return <PlayersScreen/>;
    case 'setup':return <SetupScreen/>;
    case 'game':return <GameScreen/>;
    case 'results':return <ResultsScreen/>;
    case 'leaderboard':return <LeaderboardScreen/>;
    case 'hist':return <HistoryScreen/>;
    case 'settings':return <SettingsScreen/>;
    default:return <HomeScreen/>;
}
}
/* ═══════════════ LOGIN SCREEN ═══════════════ */
function LoginScreen({onLogin}){
const[user,setUser]=useState('');
const[pass,setPass]=useState('');
const[err,setErr]=useState('');
const[show,setShow]=useState(false);
const handle=e=>{
e.preventDefault();
if(user==='mgrega'&&pass==='Nowire2086*'){sessionStorage.setItem('quiz_auth','1');onLogin();}
else{setErr('Nesprávne meno alebo heslo!');setTimeout(()=>setErr(''),2500);}
};
return(
<div style={{background:'linear-gradient(135deg,#0f172a,#1e293b)',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter,system-ui,sans-serif'}}>
<form onSubmit={handle} style={{background:'#1e293b',border:'2px solid #334155',borderRadius:'24px',padding:'48px',maxWidth:'400px',width:'100%',textAlign:'center',boxShadow:'0 25px 60px rgba(0,0,0,.5)'}}>
<div style={{fontSize:'64px',marginBottom:'12px'}}>🔐</div>
<h1 style={{color:'#eab308',fontSize:'28px',fontWeight:900,marginBottom:'8px'}}>QUIZ 2026</h1>
<p style={{color:'#94a3b8',marginBottom:'32px',fontSize:'14px'}}>Prihlás sa pre prístup</p>
{err&&<div style={{background:'#ef444420',border:'1px solid #ef4444',borderRadius:'12px',padding:'10px',color:'#ef4444',fontWeight:600,marginBottom:'16px',animation:'scale-pop .3s ease-out'}}>{err}</div>}
<input value={user} onChange={e=>setUser(e.target.value)} placeholder="Meno" autoComplete="username" style={{width:'100%',padding:'14px 18px',borderRadius:'12px',border:'2px solid #475569',background:'#334155',color:'#fff',fontSize:'16px',marginBottom:'12px',outline:'none',boxSizing:'border-box'}} autoFocus/>
<div style={{position:'relative',marginBottom:'24px'}}>
<input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Heslo" type={show?'text':'password'} autoComplete="current-password" style={{width:'100%',padding:'14px 18px',paddingRight:'50px',borderRadius:'12px',border:'2px solid #475569',background:'#334155',color:'#fff',fontSize:'16px',outline:'none',boxSizing:'border-box'}}/>
<span onClick={()=>setShow(!show)} style={{position:'absolute',right:'14px',top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:'20px',userSelect:'none'}}>{show?'🙈':'👁️'}</span>
</div>
<button type="submit" style={{width:'100%',padding:'14px',borderRadius:'12px',background:'linear-gradient(135deg,#eab308,#f59e0b)',color:'#0f172a',fontSize:'18px',fontWeight:800,border:'none',cursor:'pointer',transition:'transform .2s',boxSizing:'border-box'}} onMouseOver={e=>e.target.style.transform='translateY(-2px)'} onMouseOut={e=>e.target.style.transform='none'}>Prihlásiť sa</button>
</form>
</div>
);}

/* ═══════════════ ROOT WITH AUTH GATE ═══════════════ */
function Root(){
const[auth,setAuth]=useState(()=>sessionStorage.getItem('quiz_auth')==='1');
if(!auth)return <LoginScreen onLogin={()=>setAuth(true)}/>;
return <Provider><App/></Provider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
<script>
/* ── Force SW update on load ── */
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!refreshing){refreshing=true;console.log('[PWA] New SW, reloading…');window.location.reload()}
  });
  /* Immediately try to update any existing SW */
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg){console.log('[PWA] Forcing SW update check…');reg.update();}
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      console.log('[PWA] SW registered, scope:',reg.scope);
      reg.update(); /* force check right away */
      setInterval(()=>reg.update(),60000);
    }).catch(err=>console.warn('[PWA] SW failed:',err));
  });
}
</script>
