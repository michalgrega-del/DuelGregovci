<!DOCTYPE html>
<html lang="sk">
<head>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<style>
body{font-family:'Inter',system-ui,sans-serif;margin:0;transition:background .3s,color .3s}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--text:#fff;--textSub:#94a3b8;--border:#475569;--inputBg:#334155}
.light{--bg:#f1f5f9;--card:#ffffff;--card2:#e2e8f0;--text:#0f172a;--textSub:#64748b;--border:#cbd5e1;--inputBg:#e2e8f0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--card)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.timeline-bar{transition:width .95s linear}
@keyframes slide-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scale-pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes score-flash{0%{transform:scale(1)}25%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes timer-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes confetti-fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.3}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(234,179,8,.3)}50%{box-shadow:0 0 20px rgba(234,179,8,.6)}}
.anim-slide{animation:slide-up .5s ease-out}
.anim-pop{animation:scale-pop .4s ease-out}
.anim-score{animation:score-flash .5s ease-out}
.anim-pulse{animation:timer-pulse 1s ease-in-out infinite}
.anim-float{animation:float 3s ease-in-out infinite}
.anim-glow{animation:glow 2s ease-in-out infinite}
.confetti{position:fixed;width:10px;height:10px;border-radius:2px;animation:confetti-fall linear forwards}
.timer-ring{transition:stroke-dashoffset .95s linear}
.cat-card{transition:all .2s;cursor:pointer}
.cat-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.junior-bg{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.standard-bg{background:linear-gradient(180deg,#0a0a1a,#0f172a,#0a0a1a)}
</style>
<script>
tailwind.config={theme:{extend:{colors:{
bg:'var(--bg)',card:'var(--card)',card2:'var(--card2)',
accent:'#eab308',p1:'#3b82f6',p2:'#ef4444',ok:'#22c55e',err:'#ef4444',
}}}}
</script>
</head>
<body style="background:var(--bg);color:var(--text)" class="min-h-screen">
<div id="root"></div>
<script type="text/babel">
// ================================================================
//  DUEL v3.1 – Moderátor
// ================================================================
const{useState,useReducer,useContext,createContext,useEffect,useRef,useCallback,useMemo}=React;

/* ─── CONSTANTS ─── */
const ROUND_NAMES={1:'Rýchla runda',2:'Hlavná runda',3:'Finálová runda',tiebreaker:'Rozstrel'};
const DIFF_LABELS={junior:'Junior (7–12)',level1:'Level 1 (13–18)',level2:'Level 2 (18–99)'};
const CAT_LABELS={
dejiny:'Dejiny',veda:'Veda',sport:'Šport',kultura:'Kultúra',literatura:'Literatúra',
osobnosti:'Osobnosti',priroda:'Príroda',stroje:'Stroje & Technika',
doplnovacky:'Doplňovačky',presmycky:'Presmyčky',hudba:'Hudba',film:'Film',
matematika:'Matematika',historicke_podujatia:'Historické udalosti'
};
const CAT_ICONS={
dejiny:'📜',veda:'🔬',sport:'⚽',kultura:'🎭',literatura:'📚',
osobnosti:'👤',priroda:'🌿',stroje:'⚙️',doplnovacky:'✍️',
presmycky:'🔤',hudba:'🎵',film:'🎬',matematika:'🔢',
historicke_podujatia:'🏛️'
};
const CAT_COLORS={
dejiny:'from-amber-500/20 to-amber-600/5 border-amber-500/50',
veda:'from-cyan-500/20 to-cyan-600/5 border-cyan-500/50',
sport:'from-green-500/20 to-green-600/5 border-green-500/50',
kultura:'from-purple-500/20 to-purple-600/5 border-purple-500/50',
literatura:'from-rose-500/20 to-rose-600/5 border-rose-500/50',
osobnosti:'from-indigo-500/20 to-indigo-600/5 border-indigo-500/50',
priroda:'from-emerald-500/20 to-emerald-600/5 border-emerald-500/50',
stroje:'from-slate-500/20 to-slate-600/5 border-slate-500/50',
doplnovacky:'from-yellow-500/20 to-yellow-600/5 border-yellow-500/50',
presmycky:'from-pink-500/20 to-pink-600/5 border-pink-500/50',
hudba:'from-violet-500/20 to-violet-600/5 border-violet-500/50',
film:'from-red-500/20 to-red-600/5 border-red-500/50',
matematika:'from-blue-500/20 to-blue-600/5 border-blue-500/50',
historicke_podujatia:'from-orange-500/20 to-orange-600/5 border-orange-500/50',
};
const R2_PTS=[10,20,30,40,50];
const R3_PTS=Array.from({length:36},(_,i)=>i*10);
const R1_TIME=90;
const R1_MAX_Q=10;
const R2_TIMER=10;

/* ─── STORAGE ─── */
const S={
g(k,d=null){try{const v=localStorage.getItem('duel_'+k);return v?JSON.parse(v):d}catch{return d}},
s(k,v){try{localStorage.setItem('duel_'+k,JSON.stringify(v))}catch(e){console.warn(e)}}
};

/* ─── AUDIO ─── */
const SFX=(()=>{
let c=null;
const i=()=>{if(!c)c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==='suspended')c.resume();return c};
const osc=(freq,type,dur,vol=.15,t=0)=>{
    const x=i(),o=x.createOscillator(),g=x.createGain();
    o.connect(g);g.connect(x.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,x.currentTime+t);
    g.gain.exponentialRampToValueAtTime(.001,x.currentTime+t+dur);
    o.start(x.currentTime+t);o.stop(x.currentTime+t+dur);
};
return{
    enabled:true,
    tick(){if(!this.enabled)return;osc(880,'sine',.06,.12)},
    tickLow(){if(!this.enabled)return;osc(440,'sine',.12,.25)},
    buzzer(){if(!this.enabled)return;osc(120,'sawtooth',.8,.35)},
    correct(){if(!this.enabled)return;[523,659,784].forEach((f,j)=>osc(f,'sine',.25,.18,j*.1))},
    wrong(){if(!this.enabled)return;const x=i(),o=x.createOscillator(),g=x.createGain();
        o.connect(g);g.connect(x.destination);o.type='square';o.frequency.value=200;
        g.gain.setValueAtTime(.2,x.currentTime);o.frequency.linearRampToValueAtTime(80,x.currentTime+.35);
        g.gain.exponentialRampToValueAtTime(.001,x.currentTime+.4);o.start();o.stop(x.currentTime+.4)},
    fanfare(){if(!this.enabled)return;[392,494,587,784,1047].forEach((f,j)=>osc(f,'triangle',.45,.2,j*.13))},
};
})();

/* ─── BROADCAST ─── */
const tvCh=new BroadcastChannel('duel-game');
const sendTV=(type,data)=>tvCh.postMessage({type,data});

/* ─── QUESTION HELPERS ─── */
function getRecentUsedIds(){
const hist=S.g('history',[]);
const ids=new Set();
hist.slice(-10).forEach(h=>{if(h.usedQIds)h.usedQIds.forEach(id=>ids.add(id))});
return ids;
}
function pickQ(diff,usedIds,cat=null,type=null){
let pool=QUESTIONS_DB.filter(q=>q.difficulty===diff&&!usedIds.has(q.id)&&(cat?q.category===cat:true)&&(type?q.type===type:q.type!=='tiebreaker'));
if(!pool.length)pool=QUESTIONS_DB.filter(q=>q.difficulty===diff&&(cat?q.category===cat:true)&&(type?q.type===type:q.type!=='tiebreaker'));
return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}
function getCats(diff){
const s=new Set();
QUESTIONS_DB.filter(q=>q.difficulty===diff&&q.type!=='tiebreaker').forEach(q=>s.add(q.category));
return[...s];
}
function applyTheme(t){
if(t==='light')document.body.classList.add('light');
else document.body.classList.remove('light');
}

/* ═══════════════ REDUCER ═══════════════ */
const init={
screen:'home',players:S.g('players',[]),history:S.g('history',[]),
settings:S.g('settings',{timer:15,sound:true,r2count:10,r3count:20,theme:'dark'}),
testMode:false,
gameDate:new Date().toISOString().slice(0,10),p1:null,p2:null,diff:'junior',
round:1,qNum:0,curQ:null,usedIds:new Set(),
s1:0,s2:0,active:1,tRun:false,tSec:15,
pts:10,revealed:false,answered:false,
gameOn:false,over:false,winner:null,selCat:null,
tb1:'',tb2:'',
r1phase:1,r1qCount:0,r1timer:R1_TIME,r1tRun:false,
showRoundSummary:false,summaryRound:null,
usedCats:[],
passing:false, /* "odpoveď super" – opponent answering */
originalActive:1, /* who originally had the question */
stats:{r1:{p1c:0,p1w:0,p2c:0,p2w:0},r2:{p1c:0,p1w:0,p2c:0,p2w:0},r3:{p1c:0,p1w:0,p2c:0,p2w:0}},
};

function reducer(st,a){
const r2c=st.settings.r2count||10;
const r3c=st.settings.r3count||20;
switch(a.type){
case 'NAV':return{...st,screen:a.to};
case 'SET_TEST':return{...st,testMode:a.v};
case 'ADD_P':{const ps=[...st.players,{id:Date.now(),name:a.name,age:a.age,ts:new Date().toISOString()}];S.s('players',ps);return{...st,players:ps}}
case 'EDIT_P':{const ps=st.players.map(p=>p.id===a.id?{...p,name:a.name,age:a.age}:p);S.s('players',ps);return{...st,players:ps}}
case 'DEL_P':{const ps=st.players.filter(p=>p.id!==a.id);S.s('players',ps);return{...st,players:ps}}
case 'SETUP':return{...st,...a.d};

/* ── START GAME ── */
case 'START_GAME':{
const u=new Set(getRecentUsedIds());
const q=pickQ('junior',u);if(q)u.add(q.id);
return{...st,screen:'game',gameOn:true,over:false,
    round:1,qNum:0,curQ:q,usedIds:u,
    s1:0,s2:0,active:1,tRun:false,tSec:R2_TIMER,
    pts:10,revealed:false,answered:false,
    winner:null,selCat:null,tb1:'',tb2:'',
    r1phase:1,r1qCount:0,r1timer:R1_TIME,r1tRun:false,
    showRoundSummary:false,summaryRound:null,
    usedCats:[],passing:false,originalActive:1,
    stats:{r1:{p1c:0,p1w:0,p2c:0,p2w:0},r2:{p1c:0,p1w:0,p2c:0,p2w:0},r3:{p1c:0,p1w:0,p2c:0,p2w:0}}}}

/* ── R1 Timer ── */
case 'R1_START':return{...st,r1tRun:true};
case 'R1_TICK':{
const n=st.r1timer-1;
if(n<=0){
    /* Time's up for this player */
    if(st.r1phase===1){
        const u2=new Set(st.usedIds),q=pickQ('junior',u2);if(q)u2.add(q.id);
        return{...st,r1timer:R1_TIME,r1tRun:false,r1phase:2,r1qCount:0,active:2,curQ:q,usedIds:u2,answered:false,revealed:false,pts:10}
    }
    return{...st,r1timer:0,r1tRun:false,showRoundSummary:true,summaryRound:1,curQ:null,answered:false,revealed:false}
}
return{...st,r1timer:n}
}

case 'SET_PTS':return{...st,pts:a.v};
case 'REVEAL':return{...st,revealed:true};

/* ── CORRECT ── */
case 'CORRECT':{
const p=st.active;
const rk=st.round===1?'r1':st.round===2?'r2':'r3';
const sk=p===1?'p1c':'p2c';
const newStats={...st.stats,[rk]:{...st.stats[rk],[sk]:st.stats[rk][sk]+1}};
if(st.round===1){
    return{...st,s1:p===1?st.s1+10:st.s1,s2:p===2?st.s2+10:st.s2,answered:true,stats:newStats}
}
const pv=st.pts;
return{...st,s1:p===1?st.s1+pv:st.s1,s2:p===2?st.s2+pv:st.s2,answered:true,tRun:false,passing:false,stats:newStats}
}

/* ── WRONG ── */
case 'WRONG':{
const p=st.active;
const rk=st.round===1?'r1':st.round===2?'r2':'r3';
const sk=p===1?'p1w':'p2w';
const newStats={...st.stats,[rk]:{...st.stats[rk],[sk]:st.stats[rk][sk]+1}};
if(st.round===1){
    return{...st,answered:true,stats:newStats}
}
const pv=st.pts;
return{...st,s1:p===1?st.s1-pv:st.s1,s2:p===2?st.s2-pv:st.s2,answered:true,tRun:false,passing:false,stats:newStats}
}

/* ── SKIP (R1 "Ďalej" / no points) ── */
case 'SKIP':return{...st,answered:true,tRun:false,passing:false};

/* ── PASS SUPER: opponent gets a chance ── */
case 'PASS_SUPER':{
const opp=st.active===1?2:1;
return{...st,passing:true,originalActive:st.active,active:opp,tRun:true,tSec:R2_TIMER,revealed:false}
}

/* ── R2/R3 Timer ── */
case 'T_START':return{...st,tRun:true,tSec:R2_TIMER};
case 'T_TICK':{const n=st.tSec-1;return n<=0?{...st,tSec:0,tRun:false}:{...st,tSec:n}}
case 'T_STOP':return{...st,tRun:false};

/* ── NEXT QUESTION ── */
case 'NEXT_Q':{
/* === Round 1 === */
if(st.round===1){
    const nc=st.r1qCount+1;
    if(st.r1timer<=0||nc>=R1_MAX_Q){
        /* Time ran out or question limit reached */
        if(st.r1phase===1){
            const u2=new Set(st.usedIds),q=pickQ('junior',u2);if(q)u2.add(q.id);
            return{...st,r1phase:2,r1qCount:0,r1timer:R1_TIME,r1tRun:false,active:2,curQ:q,usedIds:u2,answered:false,revealed:false,pts:10}
        }
        return{...st,showRoundSummary:true,summaryRound:1,r1tRun:false,curQ:null,answered:false,revealed:false}
    }
    const u2=new Set(st.usedIds),q=pickQ('junior',u2);if(q)u2.add(q.id);
    return{...st,r1qCount:nc,curQ:q,usedIds:u2,answered:false,revealed:false,pts:10}
}
/* === Round 2 === */
if(st.round===2){
    const nq=st.qNum+1;
    if(nq>=r2c){
        return{...st,showRoundSummary:true,summaryRound:2,tRun:false,curQ:null,answered:false,revealed:false,selCat:null,passing:false}
    }
    const na=nq%2===0?1:2;
    return{...st,qNum:nq,curQ:null,usedIds:st.usedIds,active:na,originalActive:na,tRun:false,
        tSec:R2_TIMER,revealed:false,answered:false,selCat:null,pts:10,passing:false}
}
/* === Round 3 === */
if(st.round===3){
    const nq=st.qNum+1;
    if(nq>=r3c){
        return{...st,showRoundSummary:true,summaryRound:3,tRun:false,curQ:null,answered:false,revealed:false,selCat:null,passing:false}
    }
    const na=nq%2===0?2:1;
    return{...st,qNum:nq,curQ:null,usedIds:st.usedIds,active:na,originalActive:na,tRun:false,
        tSec:R2_TIMER,revealed:false,answered:false,selCat:null,pts:10,passing:false}
}
return st;
}

/* ── NEXT ROUND (from summary) ── */
case 'NEXT_ROUND':{
if(st.summaryRound===1){
    return{...st,round:2,qNum:0,curQ:null,active:1,originalActive:1,showRoundSummary:false,summaryRound:null,
        tRun:false,tSec:R2_TIMER,revealed:false,answered:false,selCat:null,pts:10,usedCats:[],passing:false}
}
if(st.summaryRound===2){
    return{...st,round:3,qNum:0,curQ:null,active:2,originalActive:2,showRoundSummary:false,summaryRound:null,
        tRun:false,tSec:R2_TIMER,revealed:false,answered:false,selCat:null,pts:10,usedCats:[],passing:false}
}
if(st.summaryRound===3){
    if(st.s1===st.s2){
        const u2=new Set(st.usedIds),q=pickQ(st.diff,u2,null,'tiebreaker');if(q)u2.add(q.id);
        return{...st,round:'tiebreaker',qNum:0,curQ:q,usedIds:u2,active:1,
            showRoundSummary:false,summaryRound:null,
            tRun:false,tSec:R2_TIMER,pts:10,revealed:false,answered:false,selCat:null,tb1:'',tb2:'',passing:false}
    }
    const w=st.s1>st.s2?1:2;
    return{...st,over:true,gameOn:false,winner:w,screen:'results',showRoundSummary:false,summaryRound:null}
}
return st;
}

/* ── Category selection (R2/R3) ── */
case 'SEL_CAT':{
const u2=new Set(st.usedIds),q=pickQ(st.diff,u2,a.cat);if(q)u2.add(q.id);
const uc=[...st.usedCats,a.cat];
return{...st,curQ:q,usedIds:u2,selCat:a.cat,usedCats:uc}}

/* ── Confirm pts & auto-start timer (R2/R3) ── */
case 'CONFIRM_PTS':return{...st,tRun:true,tSec:R2_TIMER};

/* ── Tiebreaker ── */
case 'TB_GUESS':return{...st,[a.p===1?'tb1':'tb2']:a.v};
case 'TB_RESOLVE':{
const correct=parseFloat(st.curQ.answer),g1=parseFloat(st.tb1),g2=parseFloat(st.tb2);
const d1=Math.abs(g1-correct),d2=Math.abs(g2-correct);
let w;if(d1<d2)w=1;else if(d2<d1)w=2;else w=Math.random()<.5?1:2;
return{...st,over:true,gameOn:false,winner:w,revealed:true,screen:'results'}}

/* ── Save/End ── */
case 'SAVE':{
const r={id:Date.now(),date:st.gameDate,p1:st.p1,p2:st.p2,s1:st.s1,s2:st.s2,
    diff:st.diff,winner:st.winner===1?st.p1.name:st.p2.name,winnerId:st.winner===1?st.p1.id:st.p2.id,
    stats:{...st.stats},usedQIds:[...st.usedIds]};
const h=[...st.history,r];S.s('history',h);return{...st,history:h}}
case 'END_GAME':
return{...st,gameOn:false,over:false,screen:'home',curQ:null,tRun:false,r1tRun:false,testMode:false,showRoundSummary:false,passing:false};
case 'UPD_SETTINGS':{
const s={...st.settings,...a.s};S.s('settings',s);SFX.enabled=s.sound;
if(a.s.theme!==undefined)applyTheme(a.s.theme);
return{...st,settings:s}}
case 'DEL_HIST':{const h=st.history.filter(x=>x.id!==a.id);S.s('history',h);return{...st,history:h}}
case 'CLR_HIST':{S.s('history',[]);return{...st,history:[]}}
default:return st;
}
}

/* ═══════════════ CONTEXT ═══════════════ */
const Ctx=createContext();
function Provider({children}){
const[st,dp]=useReducer(reducer,init);
const r1Ref=useRef(null);
const timerRef=useRef(null);
const autoAdvRef=useRef(null);

/* R1 90-second timer */
useEffect(()=>{
    if(st.r1tRun&&st.round===1){
        r1Ref.current=setInterval(()=>dp({type:'R1_TICK'}),1000);
        return()=>clearInterval(r1Ref.current);
    }else{if(r1Ref.current){clearInterval(r1Ref.current);r1Ref.current=null}}
},[st.r1tRun,st.round]);

/* R1 timer sounds */
useEffect(()=>{
    if(!st.r1tRun||st.round!==1)return;
    if(st.r1timer>5)SFX.tick();else if(st.r1timer>0)SFX.tickLow();else if(st.r1timer===0)SFX.buzzer();
},[st.r1timer,st.r1tRun,st.round]);

/* R1 auto-advance: when answered, auto-go to next question after 400ms */
useEffect(()=>{
    if(st.round===1&&st.answered&&st.r1tRun){
        autoAdvRef.current=setTimeout(()=>dp({type:'NEXT_Q'}),400);
        return()=>clearTimeout(autoAdvRef.current);
    }
},[st.answered,st.round,st.r1tRun]);

/* R2/R3 Timer */
useEffect(()=>{
    if(st.tRun&&st.round!==1){
        timerRef.current=setInterval(()=>dp({type:'T_TICK'}),1000);
        return()=>clearInterval(timerRef.current);
    }else{if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null}}
},[st.tRun,st.round]);

/* R2/R3 Timer sounds */
useEffect(()=>{
    if(!st.tRun||st.round===1)return;
    if(st.tSec>3)SFX.tick();else if(st.tSec>0)SFX.tickLow();else if(st.tSec===0)SFX.buzzer();
},[st.tSec,st.tRun,st.round]);

/* TV sync */
useEffect(()=>{
    if(st.testMode)return;
    if(!st.gameOn&&st.screen!=='results'&&!st.showRoundSummary){
        sendTV('WAITING',{});return;
    }
    const allCats=getCats(st.diff);
    const availCats=allCats.filter(c=>!st.usedCats.includes(c));
    const showQOnTV=st.round===1||st.tRun||st.answered||st.passing||st.tSec<R2_TIMER;
    const r3picker=st.round===3?(st.active===1?2:1):st.active;
    const payload={
        screen:st.screen,p1:st.p1,p2:st.p2,s1:st.s1,s2:st.s2,
        round:st.round,roundName:ROUND_NAMES[st.round],
        qNum:st.round===1?st.r1qCount+1:st.qNum+1,
        qTotal:st.round===1?R1_MAX_Q:st.round===2?r2c:r3c,
        q:showQOnTV&&st.curQ?{question:st.curQ.question,category:CAT_LABELS[st.curQ.category]||st.curQ.category,
            catKey:st.curQ.category,type:st.curQ.type}:null,
        answer:st.revealed?st.curQ?.answer:null,
        active:st.active,picker:r3picker,tRun:st.tRun,tSec:st.tSec,tDur:R2_TIMER,
        pts:st.pts,diff:st.diff,
        over:st.over,winner:st.winner,answered:st.answered,
        r1phase:st.r1phase,r1timer:st.r1timer,r1tRun:st.r1tRun,
        selCat:st.selCat,
        showRoundSummary:st.showRoundSummary,summaryRound:st.summaryRound,
        stats:st.stats,categories:availCats,usedCats:st.usedCats,
        passing:st.passing,originalActive:st.originalActive,
        tb1:st.tb1,tb2:st.tb2,tbQ:st.round==='tiebreaker'&&st.curQ?{question:st.curQ.question,answer:st.revealed?st.curQ.answer:null}:null,
        theme:st.settings.theme||'dark',
    };
    sendTV('UPDATE',payload);
});

useEffect(()=>{
    SFX.enabled=st.settings.sound;
    applyTheme(st.settings.theme||'dark');
},[]);

return <Ctx.Provider value={{st,dp}}>{children}</Ctx.Provider>;
}
const use$=()=>useContext(Ctx);

const r2c=st.settings.r2count||10,r3c=st.settings.r3count||20;
const qNum=st.round===1?st.r1qCount+1:st.qNum+1;
const qTotal=st.round===1?R1_MAX_Q:st.round===2?r2c:r3c;
const allCats=getCats(st.diff);
const availCats=allCats.filter(c=>!st.usedCats.includes(c));
const embIsR3=st.round===3;
const embPicker=embIsR3?(st.active===1?2:1):st.active;
const embPickerName=embPicker===1?st.p1?.name:st.p2?.name;
const embAnswererName=st.active===1?st.p1?.name:st.p2?.name;

if(!st.gameOn&&st.screen!=='results'&&!st.showRoundSummary)return(

                    <div className="text-5xl font-black text-red-400">{st.s2}</div>
                </div>
            </div>
            {st.s1>st.s2&&<p className="mt-4 text-blue-400 font-bold">🔵 {st.p1?.name} vedie!</p>}
            {st.s2>st.s1&&<p className="mt-4 text-red-400 font-bold">🔴 {st.p2?.name} vedie!</p>}

/* Results */
if(st.over||st.screen==='results'){

    const p2tc=ts.r1.p2c+ts.r2.p2c+ts.r3.p2c,p2tw=ts.r1.p2w+ts.r2.p2w+ts.r3.p2w;

/* Tiebreaker */
if(st.round==='tiebreaker'&&st.curQ)return(

                        </div>
                    </div>
                ))}
            </div>}
        </div>
    </div>
);

/* Active game (question shown) */
const timerFrac=R2_TIMER>0?st.tSec/R2_TIMER:1;
const circ=2*Math.PI*42;
const dashOff=circ*(1-timerFrac);
const tCol=st.tSec<=3?'#ef4444':st.tSec<=6?'#eab308':'#22c55e';
/* R1 timer display */
const r1frac=st.r1timer/R1_TIME;
const r1dashOff=circ*(1-r1frac);
const r1Col=st.r1timer<=10?'#ef4444':st.r1timer<=20?'#eab308':'#22c55e';

return(
    <div className={`h-full flex flex-col ${isJunior?'junior-bg':'standard-bg'} overflow-hidden`}>

            <div className="flex items-center gap-2">
                <span className="text-accent font-black text-sm">DUEL</span>
                <span className="text-slate-500">│</span>
                <span className="text-slate-300">{ROUND_NAMES[st.round]}</span>
            </div>
            <span className="text-slate-400">{st.round===1?`${st.r1phase===1?st.p1?.name:st.p2?.name}`:`Otázka ${qNum}/${qTotal}`}</span>

        <div className="flex-1 flex items-center justify-between px-4 py-2 gap-4">

                <div className="text-center"><div className={`text-4xl font-black ${st.s1<0?'text-red-400':'text-p1'}`}>{st.s1}</div></div>
            </div>
            {/* Center */}
            <div className="flex-1 flex flex-col items-center justify-center gap-3 max-w-lg">
                {/* R1: 90s timer */}
                {st.round===1&&st.r1tRun&&(
                    <div className="relative flex items-center justify-center">
                        <svg width="80" height="80" viewBox="0 0 96 96" className={st.r1timer<=10?'anim-pulse':''}>

                            <circle cx="48" cy="48" r="42" fill="none" stroke={r1Col} strokeWidth="4"

                        </svg>
                        <span className={`absolute text-2xl font-black ${st.r1timer<=10?'text-red-400':'text-white'}`}>{st.r1timer}</span>
                    </div>
                )}
                {/* R2/R3 timer */}
                {st.round!==1&&st.round!=='tiebreaker'&&(st.tRun||st.tSec<R2_TIMER)&&(
                    <div className="relative flex items-center justify-center">
                        <svg width="80" height="80" viewBox="0 0 96 96" className={st.tRun&&st.tSec<=3?'anim-pulse':''}>
                            <circle cx="48" cy="48" r="42" fill="none" stroke="#1e293b" strokeWidth="4"/>
                            <circle cx="48" cy="48" r="42" fill="none" stroke={tCol} strokeWidth="4"

                {st.revealed&&st.curQ&&(
                    <div className="anim-pop"><div className="bg-ok/10 border border-ok/30 rounded-lg px-4 py-2 text-sm"><span className="text-ok font-bold">✓ {st.curQ.answer}</span></div></div>

            </div>

            <div className={`w-36 rounded-xl border-2 p-3 ${st.active===2?'border-p2 bg-red-950/50 shadow-lg':'border-slate-800 bg-black/20'}`}>

);
}

return(

        {header}
        {dashboard}

            <div className="text-4xl font-bold" style={{color:'var(--border)'}}>:</div>
            <div className="text-center">
                <div className="text-sm text-p2 font-semibold mb-1">🔴 {st.p2?.name}</div>
                <div className={`text-6xl font-black ${st.winner===2?'text-p2':'text-p2/50'}`}>{st.s2}</div>
            </div>
        </div>
        <Card cls="mb-6 w-full">
            <h3 className="text-lg font-bold text-accent mb-3 text-center">📊 Štatistiky súťaže</h3>
            <table className="w-full text-sm">
                <thead>
                    <tr style={{color:'var(--textSub)'}} className="text-xs uppercase">
                        <th className="text-left py-2">Kolo</th>
                        <th className="py-2 text-center text-p1">{st.p1?.name}</th>
                        <th className="py-2 text-center text-p2">{st.p2?.name}</th>
                    </tr>
                </thead>
                <tbody>
                    {[{name:'1. Rýchla',k:'r1'},{name:'2. Hlavná',k:'r2'},{name:'3. Finálová',k:'r3'}].map(r=>(
                        <tr key={r.k} className="border-t" style={{borderColor:'var(--border)'}}>
                            <td className="py-2 font-semibold">{r.name}</td>
                            <td className="py-2 text-center"><span className="text-green-400 font-bold">{ts[r.k].p1c}✓</span>{' '}<span className="text-red-400 font-bold">{ts[r.k].p1w}✗</span></td>
                            <td className="py-2 text-center"><span className="text-green-400 font-bold">{ts[r.k].p2c}✓</span>{' '}<span className="text-red-400 font-bold">{ts[r.k].p2w}✗</span></td>
                        </tr>
                    ))}
                    <tr className="border-t-2 font-bold" style={{borderColor:'var(--border)'}}>
                        <td className="py-2">Celkovo</td>
                        <td className="py-2 text-center"><span className="text-green-400">{p1tc}✓</span>{' '}<span className="text-red-400">{p1tw}✗</span></td>
                        <td className="py-2 text-center"><span className="text-green-400">{p2tc}✓</span>{' '}<span className="text-red-400">{p2tw}✗</span></td>
                    </tr>
                </tbody>
            </table>
        </Card>
        <div className="flex gap-3 flex-wrap justify-center">
            {!saved?<Btn cls="bg-ok text-white hover:bg-green-600 py-3 px-6 shadow-lg shadow-green-500/20" onClick={doSave}>💾 Uložiť do tabuľky víťazov</Btn>
                :<span className="text-ok font-bold py-3 px-6">✓ Uložené!</span>}
            <Btn cls="py-3 px-6 border" style={{background:'var(--card)',borderColor:'var(--border)'}} onClick={()=>dp({type:'NAV',to:'setup'})}>🔄 Nová hra</Btn>
            <Btn cls="py-3 px-6 border" style={{background:'var(--card)',borderColor:'var(--border)'}} onClick={()=>dp({type:'END_GAME'})}>🏠 Domov</Btn>
        </div>
    </div>
</div>
);

if(st.testMode){
    return(
        <div className="h-screen flex">
            <div className="w-1/2 flex items-center justify-center overflow-y-auto border-r" style={{background:'var(--bg)',borderColor:'var(--border)'}}>{content}</div>
            <div className="w-1/2"><EmbeddedTV/></div>
        </div>
    );
}
return <div className="min-h-screen flex items-center justify-center overflow-y-auto py-8">{content}</div>;
}

/* ════════════ LEADERBOARD ════════════ */
function LeaderboardScreen(){
const{st,dp}=use$();
const[filterDiff,setFilter]=useState('all');
const filtered=filterDiff==='all'?st.history:st.history.filter(h=>h.diff===filterDiff);
const wins={};
filtered.forEach(h=>{wins[h.winner]=(wins[h.winner]||0)+1});
const sorted=Object.entries(wins).sort((a,b)=>b[1]-a[1]);
const exportXLS=()=>{
    const data=sorted.map(([name,count],i)=>({'Poradie':i+1,'Hráč':name,'Víťazstvá':count}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Rebríček');
    XLSX.writeFile(wb,`DUEL_Rebricek_${new Date().toISOString().slice(0,10)}.xlsx`);
};
return(
<div className="max-w-xl mx-auto p-6">
    <button onClick={()=>dp({type:'NAV',to:'home'})} style={{color:'var(--textSub)'}} className="hover:text-accent mb-4">← Späť</button>
    <div className="flex items-center justify-between mb-6">
        <h2 className="text-3xl font-bold">🏆 Rebríček</h2>
        {sorted.length>0&&<Btn cls="bg-ok/20 text-ok hover:bg-ok/30 text-sm" onClick={exportXLS}>📥 Excel</Btn>}
    </div>
    <div className="flex gap-2 mb-4 flex-wrap">
        <button onClick={()=>setFilter('all')} className={`px-3 py-1 rounded-xl text-sm font-semibold ${filterDiff==='all'?'bg-accent text-black':''}`}
            style={filterDiff!=='all'?{background:'var(--card2)'}:{}}>Všetky</button>
        {Object.entries(DIFF_LABELS).map(([k,v])=>(
            <button key={k} onClick={()=>setFilter(k)} className={`px-3 py-1 rounded-xl text-sm font-semibold ${filterDiff===k?'bg-accent text-black':''}`}
                style={filterDiff!==k?{background:'var(--card2)'}:{}}>{v}</button>
        ))}
    </div>
    {sorted.length===0?<p style={{color:'var(--textSub)'}} className="text-center py-8">Žiadne výsledky.</p>:
    <div className="space-y-2">{sorted.map(([name,count],i)=>(
        <div key={name} className="rounded-xl p-4 flex items-center justify-between border" style={{background:'var(--card)',borderColor:'var(--border)'}}>
            <div className="flex items-center gap-3">
                <span className={`text-2xl font-black w-10 text-center ${i===0?'text-yellow-400':i===1?'text-slate-300':i===2?'text-orange-400':''}`} style={i>2?{color:'var(--textSub)'}:{}}>
                    {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'.'}</span>
                <span className="font-semibold">{name}</span>
            </div>
            <span className="text-accent font-bold text-lg">{count} {count===1?'výhra':count<5?'výhry':'výhier'}</span>
        </div>
    ))}</div>}
</div>
);
}

/* ════════════ HISTORY ════════════ */
function HistoryScreen(){
const{st,dp}=use$();
return(
<div className="max-w-2xl mx-auto p-6">
    <button onClick={()=>dp({type:'NAV',to:'home'})} style={{color:'var(--textSub)'}} className="hover:text-accent mb-4">← Späť</button>
    <div className="flex items-center justify-between mb-6">
        <h2 className="text-3xl font-bold">📋 História hier</h2>
        {st.history.length>0&&<Btn cls="bg-red-500/20 text-red-400 hover:bg-red-500/30 text-sm" onClick={()=>{if(confirm('Vymazať celú históriu?'))dp({type:'CLR_HIST'})}}>🗑️ Všetko</Btn>}
    </div>
    {st.history.length===0?<p style={{color:'var(--textSub)'}} className="text-center py-8">Žiadne hry.</p>:
    <div className="space-y-2">{[...st.history].reverse().map(h=>(
        <div key={h.id} className="rounded-xl p-4 border" style={{background:'var(--card)',borderColor:'var(--border)'}}>
            <div className="flex items-center justify-between mb-2">
                <span className="text-sm" style={{color:'var(--textSub)'}}>{h.date} · {DIFF_LABELS[h.diff]||h.diff}</span>
                <button onClick={()=>dp({type:'DEL_HIST',id:h.id})} className="text-red-400/50 hover:text-red-400 text-xs">✕</button>
            </div>
            <div className="flex items-center gap-3">
                <span className={`font-bold ${h.winner===h.p1.name?'text-accent':''}`}>{h.p1.name}</span>
                <span className="text-p1 font-black text-lg">{h.s1}</span>
                <span style={{color:'var(--border)'}}>:</span>
                <span className="text-p2 font-black text-lg">{h.s2}</span>
                <span className={`font-bold ${h.winner===h.p2.name?'text-accent':''}`}>{h.p2.name}</span>
                <span className="ml-auto text-accent">🏆 {h.winner}</span>
            </div>
        </div>
    ))}</div>}
</div>
);
}

/* ════════════ SETTINGS ════════════ */
function SettingsScreen(){

const[r2c,setR2]=useState(st.settings.r2count||10);
const[r3c,setR3]=useState(st.settings.r3count||20);
const isDark=(st.settings.theme||'dark')==='dark';
return(
<div className="max-w-lg mx-auto p-6">
    <button onClick={()=>dp({type:'NAV',to:'home'})} style={{color:'var(--textSub)'}} className="hover:text-accent mb-4">← Späť</button>
    <h2 className="text-3xl font-bold mb-6">⚙️ Nastavenia</h2>
    <Card cls="space-y-5">
        <div className="flex items-center justify-between">
            <div>
                <span className="font-semibold">{isDark?'🌙 Tmavý režim':'☀️ Svetlý režim'}</span>
                <p className="text-xs" style={{color:'var(--textSub)'}}>Prepni vzhľad aplikácie</p>
            </div>
            <button onClick={()=>dp({type:'UPD_SETTINGS',s:{theme:isDark?'light':'dark'}})}
                className={`w-16 h-8 rounded-full transition-colors relative ${isDark?'bg-blue-600':'bg-amber-400'}`}>
                <span className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all shadow ${isDark?'left-1':'left-9'}`}/>
            </button>
        </div>
        <div className="rounded-xl p-3 border" style={{background:'var(--card2)',borderColor:'var(--border)'}}>
            <p className="font-semibold mb-1">Kolo 1 – Rýchla runda</p>
            <p className="text-xs" style={{color:'var(--textSub)'}}>90 sekúnd na hráča · neobmedzený počet otázok · 10 bodov · bez odpočtu</p>
        </div>
        <div className="rounded-xl p-3 border" style={{background:'var(--card2)',borderColor:'var(--border)'}}>
            <p className="font-semibold mb-1">Kolo 2 & 3 – Časovač</p>
            <p className="text-xs" style={{color:'var(--textSub)'}}>10 sekúnd na otázku · automatický štart po výbere stávky</p>
        </div>
        <div>
            <label className="text-sm block mb-2" style={{color:'var(--textSub)'}}>Počet otázok v 2. kole (párne, 10–20)</label>
            <div className="flex gap-2">
                {[10,12,14,16,18,20].map(v=>(
                    <button key={v} onClick={()=>setR2(v)}
                        className={`flex-1 py-2 rounded-xl text-sm font-bold ${r2c===v?'bg-accent text-black':''}`}
                        style={r2c!==v?{background:'var(--card2)'}:{}}>{v}</button>
                ))}
            </div>
        </div>
        <div>
            <label className="text-sm block mb-2" style={{color:'var(--textSub)'}}>Počet otázok v 3. kole (párne, 10–20)</label>
            <div className="flex gap-2">
                {[10,12,14,16,18,20].map(v=>(
                    <button key={v} onClick={()=>setR3(v)}
                        className={`flex-1 py-2 rounded-xl text-sm font-bold ${r3c===v?'bg-accent text-black':''}`}
                        style={r3c!==v?{background:'var(--card2)'}:{}}>{v}</button>
                ))}
            </div>
        </div>
        <Btn cls="bg-gradient-to-r from-yellow-500 to-amber-500 text-black hover:from-yellow-400 hover:to-amber-400 w-full py-3" onClick={()=>dp({type:'UPD_SETTINGS',s:{r2count:r2c,r3count:r3c}})}>Uložiť nastavenia</Btn>
        <div className="flex items-center justify-between">
            <span>Zvukové efekty</span>
            <button onClick={()=>dp({type:'UPD_SETTINGS',s:{sound:!st.settings.sound}})}
                className={`w-14 h-7 rounded-full transition-colors ${st.settings.sound?'bg-ok':'bg-slate-600'} relative`}>
                <span className={`absolute top-0.5 w-6 h-6 bg-white rounded-full transition-all shadow ${st.settings.sound?'left-7':'left-0.5'}`}/>
            </button>
        </div>
        <div className="pt-4 border-t" style={{borderColor:'var(--border)'}}>
            <p className="text-sm" style={{color:'var(--textSub)'}}>Databáza otázok</p>
            <p className="text-lg font-bold">{QUESTIONS_DB.length} otázok</p>
            <p className="text-xs" style={{color:'var(--textSub)'}}>
                Junior: {QUESTIONS_DB.filter(q=>q.difficulty==='junior').length} ·
                Level 1: {QUESTIONS_DB.filter(q=>q.difficulty==='level1').length} ·
                Level 2: {QUESTIONS_DB.filter(q=>q.difficulty==='level2').length}
            </p>
        </div>
    </Card>
</div>
);
}

/* ════════════ APP ════════════ */
function App(){
const{st}=use$();
switch(st.screen){
    case 'home':return <HomeScreen/>;
    case 'players':return <PlayersScreen/>;
    case 'setup':return <SetupScreen/>;
    case 'game':return <GameScreen/>;
    case 'results':return <ResultsScreen/>;
    case 'leaderboard':return <LeaderboardScreen/>;
    case 'hist':return <HistoryScreen/>;
    case 'settings':return <SettingsScreen/>;
    default:return <HomeScreen/>;
}
}
ReactDOM.createRoot(document.getElementById('root')).render(<Provider><App/></Provider>);
</script>
</body>
